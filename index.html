<script>
// エラーを画面に表示（無言で固まるのを防ぐ）
(function () {
  var box = null;
  function show(msg) {
    if (!box) box = document.getElementById("err-box");
    if (!box) return;
    box.style.display = "block";
    var div = document.createElement("div");
    div.textContent = "⚠️ " + msg;
    div.style.marginBottom = "6px";
    box.appendChild(div);
  }
  window.addEventListener("error", function (e) {
    show((e.message || "Unknown error") + (e.lineno ? "（" + e.lineno + "行目）" : ""));
  });
  window.addEventListener("unhandledrejection", function (e) {
    show("Promise: " + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });
  window.addEventListener("load", function () {
    setTimeout(function () {
      if (typeof React === "undefined" || typeof Babel === "undefined") {
        show("ライブラリの読み込みに失敗しました。通信環境を確認して再読み込みしてください。");
      } else {
        var root = document.getElementById("root");
        if (root && root.children.length === 0) {
          show("アプリの描画に失敗しました。このメッセージのスクリーンショットを開発者に送ってください。");
        }
      }
    }, 4000);
  });
})();
</script>

const { useState, useMemo, useEffect, useRef } = React;

// ─── constants ────────────────────────────────────────────────────────────────
function getResult(my, opp) {
  if (my > opp) return "win";
  if (my < opp) return "loss";
  return "draw";
}
const RESULT_LABEL = { win: "勝", loss: "負", draw: "分" };

// シーズン判定（7月1日起点）: 2025-06-01 → "2024-25", 2025-07-01 → "2025-26"
function seasonOf(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return "不明";
  const y = d.getFullYear();
  const startYear = d.getMonth() + 1 >= 7 ? y : y - 1;
  return `${startYear}-${String((startYear + 1) % 100).padStart(2, "0")}`;
}

// 移籍金テキストを€に変換（例: "€2M"/"2M"→2,000,000 / "500K"→500,000 / "1.5M"→1,500,000）
function parseFee(str) {
  if (!str) return 0;
  let s = String(str).replace(/[,€\s]/gi, "");
  const m = s.match(/([\d.]+)\s*M/i);
  if (m) return parseFloat(m[1]) * 1e6;
  const k = s.match(/([\d.]+)\s*K/i);
  if (k) return parseFloat(k[1]) * 1e3;
  const b = s.match(/([\d.]+)\s*B/i);
  if (b) return parseFloat(b[1]) * 1e9;
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

// €を「€XM / €XK」表記に整形（小数第1位まで・末尾0は省略）
function formatFee(eur) {
  if (!eur) return "€0";
  const sign = eur < 0 ? "−" : "";
  const v = Math.abs(eur);
  const fmt = (n) => {
    const r = Math.round(n * 10) / 10;
    return r % 1 === 0 ? String(Math.round(r)) : String(r);
  };
  if (v >= 1e9) return `${sign}€${fmt(v / 1e9)}B`;
  if (v >= 1e6) return `${sign}€${fmt(v / 1e6)}M`;
  if (v >= 1e3) return `${sign}€${fmt(v / 1e3)}K`;
  return `${sign}€${Math.round(v)}`;
}

// 試合配列から成績を集計
function calcStats(list) {
  const wins   = list.filter(m => getResult(m.myScore, m.opponentScore) === "win").length;
  const losses = list.filter(m => getResult(m.myScore, m.opponentScore) === "loss").length;
  const draws  = list.filter(m => getResult(m.myScore, m.opponentScore) === "draw").length;
  const gf = list.reduce((s, m) => s + m.myScore, 0);
  const ga = list.reduce((s, m) => s + m.opponentScore, 0);
  return { total: list.length, wins, losses, draws, gf, ga };
}

  const p = posNorm(pos);
  for (const [g, list] of Object.entries(POS_GROUPS)) if (list.includes(p)) return g;

// 評価点カラー: 1点刻みで10段階に変化（赤 → オレンジ → 黄 → 黄緑 → 緑 → 青）
const RATING_COLORS = {
  1:  "#D32F2F", // 赤
  2:  "#E64A19", // 濃いオレンジ
  3:  "#F57C00", // オレンジ
  4:  "#FFA726", // 明るいオレンジ
  5:  "#FFD93B", // 黄
  6:  "#D4E157", // 黄緑
  7:  "#9CCC65", // ライトグリーン
  8:  "#66DD6A", // 緑
  9:  "#26C6A6", // ティール
  10: "#4FC3F7", // スカイブルー（最高評価）
};
function ratingColorOf(s) {
  if (isNaN(s)) return null;
  const step = Math.min(10, Math.max(1, Math.floor(s)));
  return RATING_COLORS[step];
}

// 画像を正方形クロップ＆縮小して dataURL を返す（顔写真用）
function resizePhotoToDataURL(file, size = 96) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext("2d");
        // cover crop: 中央の正方形を切り出す
        const side = Math.min(img.width, img.height);
        const sx = (img.width - side) / 2;
        const sy = (img.height - side) / 2;
        ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
        resolve(canvas.toDataURL("image/jpeg", 0.82));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function FormationPitch({ starting, ratings = {}, subs = [], photoMap = {}, scorers = [], cardsMap = {}, onPlayerClick }) {
  // 得点・アシスト回数マップ
  const goalMap = {}, assistMap = {};
  scorers.forEach(sc => {
    if (sc.name && sc.type !== "og") goalMap[sc.name] = (goalMap[sc.name] || 0) + 1;
    if (sc.assist) assistMap[sc.assist] = (assistMap[sc.assist] || 0) + 1;
  });
  // 縦ライン別にグループ化（line 5=最前線 → 0=GK）し、各ライン内は 左→中央→右 に整列
  const lineMap = {};
  starting.forEach((p, idx) => {
    const line = POS_LINE[posNorm(p.pos)] ?? 3;
    if (!lineMap[line]) lineMap[line] = [];
    lineMap[line].push({ ...p, _idx: idx });
  });
  const rows = Object.keys(lineMap)
    .map(Number)
    .sort((a, b) => b - a) // 上＝最前線
    .map(line => ({
      line,
      players: lineMap[line].sort((a, b) => {
        const sa = POS_SIDE[posNorm(a.pos)] ?? 1;
        const sb = POS_SIDE[posNorm(b.pos)] ?? 1;
        return sa !== sb ? sa - sb : a._idx - b._idx; // 同サイドは入力順を維持
      }),
    }));

  // フォーメーション表記：GKを除き、後ろのラインから人数を並べる（例 4-2-3-1）
  const formation = Object.keys(lineMap)
    .map(Number)
    .filter(l => l > 0)
    .sort((a, b) => a - b)
    .map(l => lineMap[l].length)
    .join("-");

  const subOutMap = {};
  subs.forEach(s => { if (s.inFor && s.minute) subOutMap[s.inFor] = s.minute; });

  return (
    <div style={{
      background:"linear-gradient(180deg,#2E7D40 0%,#27713A 50%,#2E7D40 100%)",
      borderRadius:10, padding:"16px 8px 16px", position:"relative", overflow:"hidden",
      border:"1px solid #1A5028",
    }}>
      {/* ピッチの線 */}
      <div style={{position:"absolute",inset:0,pointerEvents:"none"}}>
        {/* 芝のストライプ */}
        {[...Array(5)].map((_,i)=>(
          <div key={i} style={{position:"absolute",left:0,right:0,top:`${i*20}%`,height:"10%",background:"rgba(255,255,255,.025)"}} />
        ))}
        {/* センターサークル（上端） */}
        <div style={{position:"absolute",top:-34,left:"50%",transform:"translateX(-50%)",width:90,height:68,border:"1.5px solid rgba(255,255,255,.25)",borderRadius:"50%"}} />
        {/* ペナルティエリア（下端） */}
        <div style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:"55%",height:42,border:"1.5px solid rgba(255,255,255,.25)",borderBottom:"none",borderRadius:"4px 4px 0 0"}} />
        <div style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:"26%",height:18,border:"1.5px solid rgba(255,255,255,.2)",borderBottom:"none",borderRadius:"3px 3px 0 0"}} />
      </div>
      {/* フォーメーション表記 */}
      {formation && (
        <div style={{position:"absolute",top:5,right:9,fontSize:10,fontWeight:800,color:"rgba(255,255,255,.65)",letterSpacing:1}}>
          {formation}
        </div>
      )}
      {/* 選手配置 */}
      <div style={{position:"relative",display:"flex",flexDirection:"column",gap:18}}>
        {rows.map(({ line, players: row }, ri) => {
          const left   = row.filter(p => (POS_SIDE[posNorm(p.pos)] ?? 1) === 0);
          const center = row.filter(p => (POS_SIDE[posNorm(p.pos)] ?? 1) === 1);
          const right  = row.filter(p => (POS_SIDE[posNorm(p.pos)] ?? 1) === 2);

          // サイド選手の縦オフセット（行間の4分の1 ≈ 18px）
          // LW/RW（最前線 line5）→ 4分の1だけ下へ
          // LB/RB（DFライン line1）→ 4分の1だけ上へ
          const QUARTER = 18;
          const sideOffset = line === 5 ? QUARTER : line === 1 ? -QUARTER : 0;

          const renderP = (p, pi, off = 0) => (
            <div key={pi} style={off ? {transform:`translateY(${off}px)`} : undefined}>
              <PitchPlayer player={p} rating={ratings[p.name] ?? ""} subOutMinute={subOutMap[p.name]} photo={photoMap[p.name]} goals={goalMap[p.name] || 0} assists={assistMap[p.name] || 0} cards={cardsMap[p.name] || { y: 0, r: 0 }} onClick={onPlayerClick} />
            </div>
          );
          // サイドの選手がいる行は 左端/中央/右端 の3ゾーンに分けて配置
          if (left.length > 0 || right.length > 0) {
            return (
              <div key={ri} style={{display:"flex",alignItems:"flex-start"}}>
                <div style={{flex:"0 0 auto",display:"flex",justifyContent:"flex-start",paddingLeft:2}}>
                  {left.map((p,pi)=>renderP(p,pi,sideOffset))}
                </div>
                <div style={{flex:1,display:"flex",justifyContent:"space-evenly"}}>
                  {center.map((p,pi)=>renderP(p,pi,0))}
                </div>
                <div style={{flex:"0 0 auto",display:"flex",justifyContent:"flex-end",paddingRight:2}}>
                  {right.map((p,pi)=>renderP(p,pi,sideOffset))}
                </div>
              </div>
            );
          }
          // 中央のみの行は均等配置
          return (
            <div key={ri} style={{display:"flex",justifyContent:"space-evenly",alignItems:"flex-start"}}>
              {row.map((p,pi)=>renderP(p,pi,0))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── main ─────────────────────────────────────────────────────────────────────
function SoccerTracker() {
  // ── persistent state (localStorage) ────────────────────────────────────────
  const load = (key, fallback) => {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
  };

  // ── セーブデータ（複数スロット）管理 ─────────────────────────────────
  const keyFor = (saveId, k) => saveId === "legacy" ? `sct_${k}` : `sct_${saveId}_${k}`;

  const [saves, setSaves] = useState(() => {
    const idx = load("sct_saves", null) || [];
    // 旧形式データの救済: sct_matches 等の旧キーが残っていて、
    // まだ legacy スロットが登録されていなければ「マイチーム（旧データ）」として必ず表示する
    try {
      const hasLegacyData = localStorage.getItem("sct_matches") || localStorage.getItem("sct_roster");
      const hasLegacySlot = idx.some(s => s.id === "legacy");
      if (hasLegacyData && !hasLegacySlot) {
        return [{ id: "legacy", teamName: "マイチーム（旧データ）", createdAt: new Date().toISOString() }, ...idx];
      }
    } catch {}
    return idx;
  });
  const [currentSave, setCurrentSave] = useState(null);
  const [newTeamName, setNewTeamName] = useState("");
  const [deleteConfirmId, setDeleteConfirmId] = useState(null);
  const [profilePlayer, setProfilePlayer] = useState(null);
  const [profileScope, setProfileScope] = useState("official"); // official | all

  // プロフィールを開くたびにデフォルト（公式戦のみ）に戻す
  useEffect(() => { setProfileScope("official"); }, [profilePlayer]);

  useEffect(() => { try { localStorage.setItem("sct_saves", JSON.stringify(saves)); } catch{} }, [saves]);

  const [roster,    setRoster]    = useState([]);
  const [transfers, setTransfers] = useState([]);
  const [matches,   setMatches]   = useState([]);

  // 選択中のセーブにのみ書き込む
  useEffect(() => { if (!currentSave) return; try { localStorage.setItem(keyFor(currentSave.id,"roster"),    JSON.stringify(roster));    } catch{} }, [roster, currentSave]);
  useEffect(() => { if (!currentSave) return; try { localStorage.setItem(keyFor(currentSave.id,"transfers"), JSON.stringify(transfers)); } catch{} }, [transfers, currentSave]);
  useEffect(() => { if (!currentSave) return; try { localStorage.setItem(keyFor(currentSave.id,"matches"),   JSON.stringify(matches));   } catch{} }, [matches, currentSave]);

  // ── 元に戻す（Undo）履歴 ───────────────────────────────────────────────
  const historyRef = useRef([]);      // 直前までの状態スナップショット（最大10件）
  const prevSnapRef = useRef(null);   // 最後に記録した状態
  const skipHistoryRef = useRef(false); // Undo復元時・セーブ切替時は履歴に積まない
  const [undoCount, setUndoCount] = useState(0);

  useEffect(() => {
    if (!currentSave) return;
    const snap = JSON.stringify({ roster, transfers, matches });
    if (skipHistoryRef.current) {
      skipHistoryRef.current = false;
      prevSnapRef.current = snap;
      return;
    }
    if (prevSnapRef.current !== null && prevSnapRef.current !== snap) {
      historyRef.current.push(prevSnapRef.current);
      if (historyRef.current.length > 10) historyRef.current.shift();
      setUndoCount(historyRef.current.length);
    }
    prevSnapRef.current = snap;
  }, [roster, transfers, matches, currentSave]);

  const undoLast = () => {
    const last = historyRef.current.pop();
    if (!last) return;
    setUndoCount(historyRef.current.length);
    skipHistoryRef.current = true;
    try {
      const d = JSON.parse(last);
      setRoster(d.roster || []);
      setTransfers(d.transfers || []);
      setMatches(d.matches || []);
    } catch {}
  };

  // ── クラウド同期（Firebase Realtime Database / REST API） ──────────────
  const [cloud, setCloud] = useState(() => load("sct_cloud", { dbUrl: "", syncId: "" }));
  const [cloudDraft, setCloudDraft] = useState(() => load("sct_cloud", { dbUrl: "", syncId: "" }));
  const [showCloudSettings, setShowCloudSettings] = useState(false);
  const [syncStatus, setSyncStatus] = useState("off"); // off | syncing | synced | error

  useEffect(() => { try { localStorage.setItem("sct_cloud", JSON.stringify(cloud)); } catch{} }, [cloud]);

  const cloudEnabled = !!(cloud.dbUrl && cloud.syncId);
  const cloudPath = (p) => `${cloud.dbUrl.replace(/\/+$/,"")}/sct/${encodeURIComponent(cloud.syncId)}/${p}.json`;

  const cloudGet = async (p) => {
    try { const r = await fetch(cloudPath(p)); if (!r.ok) return null; return await r.json(); }
    catch { return null; }
  };
  const cloudPut = async (p, data) => {
    try { const r = await fetch(cloudPath(p), { method: "PUT", headers: {"Content-Type":"application/json"}, body: JSON.stringify(data) }); return r.ok; }
    catch { return false; }
  };
  const cloudDelete = (p) => { try { fetch(cloudPath(p), { method: "DELETE" }).catch(()=>{}); } catch {} };

  // 接続テスト（入力中の値で書き込み→読み出しを検証し、結果を表示）
  const [cloudTestResult, setCloudTestResult] = useState("");
  const runCloudTest = async () => {
    setCloudTestResult("テスト中…");
    const url = cloudDraft.dbUrl.replace(/\/+$/, "");
    if (!/^https:\/\//.test(url)) { setCloudTestResult("✗ URLは https:// から始まる必要があります"); return; }
    const testPath = `${url}/sct/${encodeURIComponent(cloudDraft.syncId)}/_ping.json`;
    try {
      const stamp = Date.now();
      const w = await fetch(testPath, { method: "PUT", headers: {"Content-Type":"application/json"}, body: JSON.stringify(stamp) });
      if (!w.ok) { setCloudTestResult(`✗ 書き込み失敗（HTTP ${w.status}）— Firebaseのルール設定を確認してください`); return; }
      const r = await fetch(testPath);
      const v = await r.json();
      if (v === stamp) setCloudTestResult("✓ 接続成功！この端末から同期できます");
      else setCloudTestResult("✗ 読み出し結果が一致しません");
    } catch (e) {
      setCloudTestResult("✗ 接続できません — 通信環境・URL・コンテンツブロッカーを確認してください");
    }
  };

  // クラウド上のセーブ一覧をローカル一覧にマージ（他端末で作ったセーブを表示）
  useEffect(() => {
    if (!cloudEnabled) { setSyncStatus("off"); return; }
    setSyncStatus("syncing");
    (async () => {
      const idx = await cloudGet("index");
      if (idx) {
        const arr = Object.values(idx).filter(a => a && a.id);
        setSaves(prev => {
          const ids = new Set(prev.map(p => p.id));
          const add = arr.filter(a => !ids.has(a.id)).map(a => ({ id: a.id, teamName: a.teamName || "クラウドセーブ", createdAt: a.createdAt || "" }));
          return add.length ? [...prev, ...add] : prev;
        });
        setSyncStatus("synced");
      } else {
        setSyncStatus(idx === null ? "synced" : "error");
      }
    })();
  }, [cloud]);

  // データ変更時にクラウドへ自動プッシュ（1.5秒デバウンス・最終書き込み優先）
  useEffect(() => {
    if (!currentSave) return;
    // ローカルの更新時刻は常に記録（後からクラウドを有効化した場合の比較用）
    try { localStorage.setItem(keyFor(currentSave.id, "updatedAt"), String(Date.now())); } catch {}
    if (!cloudEnabled) return;
    setSyncStatus("syncing");
    const t = setTimeout(async () => {
      const updatedAt = Date.now();
      try { localStorage.setItem(keyFor(currentSave.id, "updatedAt"), String(updatedAt)); } catch {}
      const ok = await cloudPut(`saves/${currentSave.id}`, {
        teamName: currentSave.teamName, roster, transfers, matches, updatedAt,
      });
      await cloudPut(`index/${currentSave.id}`, { id: currentSave.id, teamName: currentSave.teamName, createdAt: currentSave.createdAt || "", updatedAt });
      setSyncStatus(ok ? "synced" : "error");
    }, 1500);
    return () => clearTimeout(t);
  }, [roster, transfers, matches, currentSave, cloud]);

  // セーブを選択してアプリ本体へ進む（クラウドに新しいデータがあれば取得）
  const selectSave = async (s) => {
    let r = load(keyFor(s.id, "roster"), []);
    let t = load(keyFor(s.id, "transfers"), []);
    let m = load(keyFor(s.id, "matches"), []);
    if (cloudEnabled) {
      const localUpd = parseInt((() => { try { return localStorage.getItem(keyFor(s.id, "updatedAt")) || "0"; } catch { return "0"; } })());
      const c = await cloudGet(`saves/${s.id}`);
      if (c && (c.updatedAt || 0) > localUpd) {
        r = c.roster || []; t = c.transfers || []; m = c.matches || [];
        try {
          localStorage.setItem(keyFor(s.id, "roster"), JSON.stringify(r));
          localStorage.setItem(keyFor(s.id, "transfers"), JSON.stringify(t));
          localStorage.setItem(keyFor(s.id, "matches"), JSON.stringify(m));
          localStorage.setItem(keyFor(s.id, "updatedAt"), String(c.updatedAt));
        } catch {}
      }
    }
    historyRef.current = [];
    setUndoCount(0);
    skipHistoryRef.current = true;
    prevSnapRef.current = null;
    setRoster(r);
    setTransfers(t);
    setMatches(m);
    setCurrentSave(s);
    setMatchForm({ ...INITIAL_MATCH_FORM(), myTeam: s.teamName, starting: startingFromLastMatch(m) });
    setMainTab("matches");
    setSeasonFilter("all"); setPlayerSeason("all"); setPlayerMode("all"); setPlayerCategory("official"); setPlayerVenue("all"); setFilter("all"); setModeFilter("all"); setCategoryFilter("official"); setVenueFilter("all"); setTransferSeason("all");
    setShowMatchForm(false); setEditMatchId(null);
  };

  // 新規セーブ作成（withSample=true ならサンプルデータ入り）
  const createSave = (teamName, withSample = false) => {
    const name = teamName.trim();
    if (!name) return;
    const s = { id: String(Date.now()), teamName: name, createdAt: new Date().toISOString() };
    setSaves(prev => [...prev, s]);
    setRoster(withSample ? SAMPLE_ROSTER : []);
    setTransfers(withSample ? SAMPLE_TRANSFERS : []);
    setMatches(withSample ? SAMPLE_MATCHES.map(m => ({ ...m, myTeam: name })) : []);
    setCurrentSave(s);
    setMatchForm({ ...INITIAL_MATCH_FORM(), myTeam: name });
    setNewTeamName("");
  };

  // バックアップ書き出し（JSONファイルをダウンロード）
  const exportSave = (s) => {
    const data = {
      app: "soccer-tracker", version: 1,
      teamName: s.teamName,
      roster:    load(keyFor(s.id, "roster"), []),
      transfers: load(keyFor(s.id, "transfers"), []),
      matches:   load(keyFor(s.id, "matches"), []),
      exportedAt: new Date().toISOString(),
    };
    const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${s.teamName}_backup_${new Date().toISOString().split("T")[0]}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  // バックアップ復元（JSONファイルから新規セーブ作成）
  const importSave = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (data.app !== "soccer-tracker") { alert("このアプリのバックアップファイルではありません"); return; }
        const s = { id: String(Date.now()), teamName: (data.teamName || "復元チーム") + "", createdAt: new Date().toISOString() };
        setSaves(prev => [...prev, s]);
        // 直接ストレージへ書き込み（選択時に読み込まれる）
        try {
          localStorage.setItem(keyFor(s.id, "roster"),    JSON.stringify(data.roster || []));
          localStorage.setItem(keyFor(s.id, "transfers"), JSON.stringify(data.transfers || []));
          localStorage.setItem(keyFor(s.id, "matches"),   JSON.stringify(data.matches || []));
        } catch {}
        selectSave(s);
      } catch (e) {
        alert("ファイルの読み込みに失敗しました");
      }
    };
    reader.readAsText(file);
  };

  // セーブ削除（クラウドからも削除）
  const deleteSave = (saveId) => {
    setSaves(prev => prev.filter(s => s.id !== saveId));
    try {
      ["roster","transfers","matches","updatedAt"].forEach(k => localStorage.removeItem(keyFor(saveId, k)));
    } catch {}
    if (cloudEnabled) { cloudDelete(`saves/${saveId}`); cloudDelete(`index/${saveId}`); }
  };

  // セーブ選択画面用サマリー
  const saveSummaries = saves.map(s => {
    const ms = load(keyFor(s.id, "matches"), []);
    const st = calcStats(ms);
    const last = ms.length ? [...ms].sort((a,b)=>new Date(b.date)-new Date(a.date))[0].date : null;
    return { ...s, ...st, last };
  });

  // ── UI state ───────────────────────────────────────────────────────────────
  const [mainTab,     setMainTab]     = useState("matches");   // matches | roster | transfers
  const [showMatchForm,  setShowMatchForm]  = useState(false);
  const [showTransferForm, setShowTransferForm] = useState(false);
  const [matchFormTab, setMatchFormTab] = useState("basic");
  const [filter,      setFilter]      = useState("all");
  const [flash,       setFlash]       = useState(null);
  const [expandedMatchId, setExpandedMatchId] = useState(null);
  const [matchForm,   setMatchForm]   = useState(INITIAL_MATCH_FORM);
  const [tfForm,      setTfForm]      = useState(INITIAL_TRANSFER_FORM);
  const [editTransferId, setEditTransferId] = useState(null);
  const [rosterPosFilter, setRosterPosFilter] = useState("ALL");
  const [showAddPlayer, setShowAddPlayer] = useState(false);
  const [newPlayer, setNewPlayer] = useState({ name:"", position:"CM", number:"", photo:"" });
  const [isNewMode, setIsNewMode] = useState(false);
  const [editMatchId, setEditMatchId] = useState(null);
  const [seasonFilter, setSeasonFilter] = useState("all");
  const [modeFilter, setModeFilter] = useState("all");
  const [categoryFilter, setCategoryFilter] = useState("official"); // all | official | friendly
  const [venueFilter, setVenueFilter] = useState("all");       // all | home | away
  const [transferSeason, setTransferSeason] = useState("all");
  const [playerSeason, setPlayerSeason] = useState("all");
  const [playerMode, setPlayerMode] = useState("all");
  const [playerCategory, setPlayerCategory] = useState("official");
  const [playerVenue, setPlayerVenue] = useState("all");
  const [playerSort, setPlayerSort] = useState("goals");

  // ── derived ────────────────────────────────────────────────────────────────
  const activeRoster = roster.filter(p => p.status === "active");
  const allPlayerNames = activeRoster.map(p => p.name);

  // ローン中（ローン出の記録があり、現在非アクティブ）の選手 = ローンバック対象
  const loanedOutPlayers = useMemo(() => {
    const out = [...new Set(transfers.filter(t => t.type === "loan_out").map(t => t.playerName))];
    return out.filter(name => {
      const p = roster.find(r => r.name === name);
      return p && p.status !== "active";
    });
  }, [transfers, roster]);

  // レンタル中選手のロースター表示用データ（移籍先・開始日付き、FC26順）
  const loanedOutEntries = useMemo(() => {
    return loanedOutPlayers
      .map(name => {
        const p = roster.find(r => r.name === name);
        const tf = transfers
          .filter(t => t.type === "loan_out" && t.playerName === name)
          .sort((a, b) => new Date(b.date) - new Date(a.date))[0];
        return p ? { ...p, loanTo: tf?.fromTo || "", loanSince: tf?.date || "" } : null;
      })
      .filter(Boolean)
      .sort((a, b) => {
        const pa = ROSTER_ORDER.indexOf(posNorm(a.position));
        const pb = ROSTER_ORDER.indexOf(posNorm(b.position));
        if (pa !== pb) return (pa === -1 ? 99 : pa) - (pb === -1 ? 99 : pb);
        const na = parseInt(a.number), nb = parseInt(b.number);
        if (!isNaN(na) && !isNaN(nb)) return na - nb;
        return String(a.name).localeCompare(String(b.name), "ja");
      });
  }, [loanedOutPlayers, roster, transfers]);

  // カテゴリ別の使用済みモード一覧（試合数の多い順）
  const modesOfCategory = (cat) => {
    const list = matches.filter(m => catOf(m) === cat).map(m => m.mode).filter(Boolean);
    const count = {};
    list.forEach(x => { count[x] = (count[x] || 0) + 1; });
    return [...new Set(list)].sort((a, b) => (count[b] - count[a]) || String(a).localeCompare(String(b), "ja"));
  };

  // 選手名 → 顔写真 のマップ（フォーメーション表示用）
  const photoMap = useMemo(() => {
    const map = {};
    roster.forEach(p => { if (p.photo) map[p.name] = p.photo; });
    return map;
  }, [roster]);

  // 選手プロフィール用データ（試合履歴・通算/シーズン別集計・移籍歴）
  const profileData = useMemo(() => {
    if (!profilePlayer) return null;
    const name = profilePlayer;
    const rows = [];
    const scopedM = profileScope === "official" ? matches.filter(m => catOf(m) === "official") : matches;
    scopedM.forEach(m => {
      const started = (m.starting||[]).some(p => p.name === name);
      const subEntry = (m.subs||[]).find(s => s.name === name);
      const goals = (m.scorers||[]).filter(sc => sc.name === name && sc.type !== "og").length;
      const assists = (m.scorers||[]).filter(sc => sc.assist === name).length;
      const card = (m.cards||{})[name] || { y:0, r:0 };
      const ratingRaw = (m.ratings||{})[name];
      if (!started && !subEntry) return;
      // 出場時間
      const subOffAt = {}, subOnAt = {};
      (m.subs||[]).forEach(s => {
        const min = parseInt(s.minute);
        if (s.inFor) subOffAt[s.inFor] = isNaN(min) ? null : min;
        if (s.name)  subOnAt[s.name]   = isNaN(min) ? null : min;
      });
      let minutes = 0;
      if (started) {
        minutes = name in subOffAt ? (subOffAt[name] != null ? Math.min(subOffAt[name], 90) : 90) : 90;
      } else {
        const on = subOnAt[name];
        if (on != null) {
          const off = name in subOffAt && subOffAt[name] != null ? subOffAt[name] : 90;
          minutes = Math.max(0, off - Math.min(on, 90));
        }
      }
      rows.push({
        id: m.id, date: m.date, opponent: m.opponent,
        myScore: m.myScore, opponentScore: m.opponentScore, mode: m.mode,
        season: seasonOf(m.date), started, minutes, goals, assists,
        y: card.y||0, r: card.r||0,
        cs: m.opponentScore === 0,
        rating: ratingRaw !== undefined && ratingRaw !== "" ? parseFloat(ratingRaw) : null,
      });
    });
    rows.sort((a,b) => new Date(b.date) - new Date(a.date));
    const agg = (list) => {
      const rated = list.filter(r => r.rating != null);
      return {
        apps: list.length,
        starts: list.filter(r => r.started).length,
        minutes: list.reduce((s,r)=>s+r.minutes,0),
        goals: list.reduce((s,r)=>s+r.goals,0),
        assists: list.reduce((s,r)=>s+r.assists,0),
        y: list.reduce((s,r)=>s+r.y,0),
        r: list.reduce((s,r)=>s+r.r,0),
        cleanSheets: list.filter(r=>r.cs).length,
        avgRating: rated.length ? rated.reduce((s,r)=>s+r.rating,0)/rated.length : null,
      };
    };
    const total = agg(rows);
    const seasonsP = [...new Set(rows.map(r => r.season))].sort().reverse();
    const bySeason = seasonsP.map(s => ({ season: s, ...agg(rows.filter(r => r.season === s)) }));
    const tfs = transfers.filter(t => t.playerName === name).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const rosterEntry = roster.find(p => p.name === name);
    const grp = rosterEntry ? posGroup(rosterEntry.position) : null;
    const isDefensive = grp === "GK" || grp === "DF";
    return { name, rows, total, bySeason, tfs, rosterEntry, isDefensive };
  }, [profilePlayer, profileScope, matches, transfers, roster]);

  // 過去に入力されたモード一覧（デフォルト + 試合履歴のユニーク値）
  const MODE_LABELS = { ranked:"ランク戦", friendly:"フレンドリー", cup:"カップ戦" };
  const usedModes = useMemo(() => {
    // 実際に試合で使われたモードのみ（試合数が多い順、同数は名前順）
    const fromMatches = matches.map(m => m.mode).filter(Boolean);
    const all = [...new Set(fromMatches)];
    const count = {};
    fromMatches.forEach(m => { count[m] = (count[m] || 0) + 1; });
    return all.sort((a, b) => {
      const ca = count[a] || 0, cb = count[b] || 0;
      if (ca !== cb) return cb - ca;
      return String(a).localeCompare(String(b), "ja");
    });
  }, [matches]);

  const rosterByGroup = useMemo(() => {
    const groups = { GK:[], DF:[], MF:[], FW:[] };
    activeRoster.forEach(p => { const g = posGroup(p.position); if (groups[g]) groups[g].push(p); });
    return groups;
  }, [activeRoster]);

  const filteredRoster = useMemo(() => {
    const list = rosterPosFilter === "ALL"
      ? [...activeRoster]
      : activeRoster.filter(p => posGroup(p.position) === rosterPosFilter);
    // FC26準拠の順: GK→LB→CB→RB→CDM→CM→LM→CAM→RM→LW→ST→RW、同ポジションは背番号順
    return list.sort((a, b) => {
      const pa = ROSTER_ORDER.indexOf(posNorm(a.position));
      const pb = ROSTER_ORDER.indexOf(posNorm(b.position));
      if (pa !== pb) return (pa === -1 ? 99 : pa) - (pb === -1 ? 99 : pb);
      const na = parseInt(a.number), nb = parseInt(b.number);
      if (!isNaN(na) && !isNaN(nb)) return na - nb;
      if (!isNaN(na)) return -1;
      if (!isNaN(nb)) return 1;
      return String(a.name).localeCompare(String(b.name), "ja");
    });
  }, [activeRoster, rosterPosFilter]);

  // シーズン一覧（新しい順）
  const seasons = useMemo(() => {
    const set = new Set(matches.map(m => seasonOf(m.date)));
    return [...set].sort().reverse();
  }, [matches]);

  // 選択シーズンの試合
  const seasonMatches = useMemo(() => {
    if (seasonFilter === "all") return matches;
    return matches.filter(m => seasonOf(m.date) === seasonFilter);
  }, [matches, seasonFilter]);

  // カテゴリ → モード → ホーム/アウェイ で絞り込み（シーズン選択後に適用）
  const scopedMatches = useMemo(() => {
    let list = seasonMatches;
    if (categoryFilter !== "all") {
      list = list.filter(m => catOf(m) === categoryFilter);
      if (modeFilter !== "all") list = list.filter(m => m.mode === modeFilter);
    }
    if (venueFilter !== "all") list = list.filter(m => m.venue === venueFilter);
    return list;
  }, [seasonMatches, categoryFilter, modeFilter, venueFilter]);

  const stats = useMemo(() => calcStats(scopedMatches), [scopedMatches]);
  const winRate = stats.total > 0 ? Math.round(stats.wins/stats.total*100) : 0;

  // シーズン別の集計一覧（全シーズン表示用）
  const seasonBreakdown = useMemo(() =>
    seasons.map(s => ({ season: s, ...calcStats(matches.filter(m => seasonOf(m.date) === s)) })),
  [seasons, matches]);

  // 歴代全選手の個人成績（通算 / シーズン別）
  const playerStats = useMemo(() => {
    let scope = playerSeason === "all" ? matches : matches.filter(m => seasonOf(m.date) === playerSeason);
    if (playerCategory !== "all") {
      scope = scope.filter(m => catOf(m) === playerCategory);
      if (playerMode !== "all") scope = scope.filter(m => m.mode === playerMode);
    }
    if (playerVenue !== "all") scope = scope.filter(m => m.venue === playerVenue);
    const map = {};
    const ensure = (name) => {
      if (!map[name]) map[name] = { name, starts:0, subApps:0, goals:0, assists:0, yellows:0, reds:0, ratingSum:0, ratingCount:0, minutes:0, cleanSheets:0 };
      return map[name];
    };
    scope.forEach(m => {
      const subsArr = (m.subs||[]).filter(s => s.name);
      // 交代退場時間マップ: 選手名 → 退場した分
      const offAt = {};
      subsArr.forEach(s => { if (s.inFor && s.minute) offAt[s.inFor] = parseInt(s.minute); });

      const isCleanSheet = m.opponentScore === 0;
      (m.starting||[]).forEach(p => {
        if (!p.name) return;
        const e = ensure(p.name);
        e.starts++;
        if (isCleanSheet) e.cleanSheets++;
        // 先発: 交代退場していればその分まで、していなければ90分
        e.minutes += offAt[p.name] != null ? Math.min(offAt[p.name], 90) : 90;
      });
      subsArr.forEach(s => {
        const e = ensure(s.name);
        e.subApps++;
        // 途中出場: 投入分から90分まで（さらに交代退場していればそこまで）
        if (s.minute) {
          const on = parseInt(s.minute);
          const off = offAt[s.name] != null ? Math.min(offAt[s.name], 90) : 90;
          e.minutes += Math.max(0, off - Math.min(on, 90));
        }
      });
      (m.scorers||[]).forEach(sc => {
        if (sc.name && sc.type !== "og") ensure(sc.name).goals++;
        if (sc.assist) ensure(sc.assist).assists++;
      });
      Object.entries(m.cards||{}).forEach(([name, c]) => {
        if (!c) return;
        const e = ensure(name);
        e.yellows += c.y||0; e.reds += c.r||0;
      });
      Object.entries(m.ratings||{}).forEach(([name, v]) => {
        const n = parseFloat(v);
        if (!isNaN(n)) { const e = ensure(name); e.ratingSum += n; e.ratingCount++; }
      });
    });
    const list = Object.values(map).map(p => {
      const rp = roster.find(r => r.name === p.name);
      const grp = rp ? posGroup(rp.position) : null;
      return {
        ...p,
        apps: p.starts + p.subApps,
        avgRating: p.ratingCount > 0 ? (p.ratingSum / p.ratingCount) : null,
        isDefensive: grp === "GK" || grp === "DF",
      };
    });
    const sorters = {
      goals:   (a,b)=> b.goals - a.goals || b.assists - a.assists,
      assists: (a,b)=> b.assists - a.assists || b.goals - a.goals,
      apps:    (a,b)=> b.apps - a.apps || b.minutes - a.minutes,
      minutes: (a,b)=> b.minutes - a.minutes,
      rating:  (a,b)=> (b.avgRating??-1) - (a.avgRating??-1),
    };
    return list.sort(sorters[playerSort] || sorters.goals);
  }, [matches, playerSeason, playerCategory, playerMode, playerVenue, playerSort, roster]);

  const filteredMatches = useMemo(() => {
    let list = [...scopedMatches].sort((a,b) => new Date(b.date)-new Date(a.date));
    if (filter !== "all") list = list.filter(m => getResult(m.myScore,m.opponentScore) === filter);
    return list;
  }, [scopedMatches, filter]);

  // 移籍に存在するシーズン一覧（新しい順）
  const transferSeasons = useMemo(() => {
    const set = new Set(transfers.map(t => seasonOf(t.date)));
    return [...set].sort().reverse();
  }, [transfers]);

  // 選択シーズンの移籍
  const scopedTransfers = useMemo(() => {
    if (transferSeason === "all") return transfers;
    return transfers.filter(t => seasonOf(t.date) === transferSeason);
  }, [transfers, transferSeason]);

  const sortedTransfers = useMemo(() =>
    [...scopedTransfers].sort((a,b) => new Date(b.date)-new Date(a.date)),
  [scopedTransfers]);

  // 移籍収支（支出 = 加入・ローン入の移籍金 / 収入 = 放出・ローン出の移籍金）
  const feeBalance = useMemo(() => {
    const calc = (list) => {
      let spent = 0, earned = 0;
      list.forEach(t => {
        const fee = parseFee(t.fee);
        if (!fee) return;
        if (t.type === "in" || t.type === "loan_in") spent += fee;
        else if (t.type === "out" || t.type === "loan_out") earned += fee;
      });
      return { spent, earned, net: earned - spent };
    };
    const total = calc(scopedTransfers);
    const seasonSet = [...new Set(transfers.map(t => seasonOf(t.date)))].sort().reverse();
    const bySeason = seasonSet.map(s => ({ season: s, ...calc(transfers.filter(t => seasonOf(t.date) === s)) }));
    return { total, bySeason };
  }, [transfers, scopedTransfers]);

  // ── match form helpers ─────────────────────────────────────────────────────
  const matchStartingNames = matchForm.starting.filter(p=>p.name).map(p=>p.name);
  const matchSubNames      = matchForm.subs.filter(s=>s.name).map(s=>s.name);
  const matchAllNames      = [...new Set([...matchStartingNames,...matchSubNames])];

  const addScorer   = () => setMatchForm(f=>({...f, scorers:[...f.scorers,{id:Date.now(),name:"",assist:"",minute:"",type:"normal"}]}));
  const removeScorer = id => setMatchForm(f=>({...f, scorers:f.scorers.filter(s=>s.id!==id)}));
  const updateScorer = (id,k,v) => setMatchForm(f=>({...f, scorers:f.scorers.map(s=>s.id===id?{...s,[k]:v}:s)}));

  // スタメン選択用: 枠のポジションに合わせて候補選手を並べ替え
  // ① 同じポジション → ② 同じグループ（RBならDF全体など） → ③ その他
  // 各階層内は FC26順（ROSTER_ORDER）→ 背番号順
  const playersForSlot = (slotPos) => {
    const sp = posNorm(slotPos);
    const sg = posGroup(sp);
    const tier = (p) => {
      const pp = posNorm(p.position);
      if (pp === sp) return 0;
      if (posGroup(pp) === sg) return 1;
      return 2;
    };
    return [...activeRoster].sort((a, b) => {
      const ta = tier(a), tb = tier(b);
      if (ta !== tb) return ta - tb;
      const pa = ROSTER_ORDER.indexOf(posNorm(a.position));
      const pb = ROSTER_ORDER.indexOf(posNorm(b.position));
      if (pa !== pb) return (pa === -1 ? 99 : pa) - (pb === -1 ? 99 : pb);
      const na = parseInt(a.number), nb = parseInt(b.number);
      if (!isNaN(na) && !isNaN(nb)) return na - nb;
      if (!isNaN(na)) return -1;
      if (!isNaN(nb)) return 1;
      return String(a.name).localeCompare(String(b.name), "ja");
    });
  };

  // 直近の試合のフォーメーション（ポジション構成）を引き継いだ空のスタメン枠を作る
  const startingFromLastMatch = (sourceMatches = matches) => {
    const last = [...sourceMatches].sort((a, b) => new Date(b.date) - new Date(a.date))[0];
    if (last?.starting?.length === 11 && last.starting.every(p => p.pos)) {
      return last.starting.map((p, i) => ({ id: i, pos: posNorm(p.pos), name: "" }));
    }
    return EMPTY_STARTING();
  };

  const handleMatchSubmit = () => {
    if (!matchForm.myTeam||!matchForm.opponent||matchForm.myScore===""||matchForm.opponentScore==="") return;
    const m = {
      id: editMatchId || Date.now(),
      date: matchForm.date, myTeam: matchForm.myTeam, opponent: matchForm.opponent,
      myScore: parseInt(matchForm.myScore), opponentScore: parseInt(matchForm.opponentScore),
      category: matchForm.category || "official", venue: matchForm.venue || "home",
      mode: matchForm.mode, note: matchForm.note,
      starting: matchForm.starting, subs: matchForm.subs, scorers: matchForm.scorers, ratings: matchForm.ratings, cards: matchForm.cards,
    };
    if (editMatchId) {
      setMatches(prev => prev.map(x => x.id === editMatchId ? m : x));
    } else {
      setMatches(prev => [...prev, m]);
      setFlash(getResult(m.myScore, m.opponentScore));
      setTimeout(() => setFlash(null), 2000);
    }
    setMatchForm({
      ...INITIAL_MATCH_FORM(),
      myTeam: currentSave?.teamName || "",
      category: m.category || "official",
      venue: m.venue || "home",
      mode: m.mode || "",
      starting: m.starting?.length === 11 ? m.starting.map((p, i) => ({ id: i, pos: posNorm(p.pos), name: "" })) : EMPTY_STARTING(),
    });
    setMatchFormTab("basic");
    setIsNewMode(false);
    setEditMatchId(null);
    setShowMatchForm(false);
  };

  // 既存試合をフォームに読み込んで編集モードへ
  const startEditMatch = (match) => {
    // 古いデータ形式でも欠けがないように補完（交代枠9・各種マップ）
    const subs = [...(match.subs || [])];
    while (subs.length < 9) subs.push({ id: subs.length, name: "", inFor: "", minute: "" });
    setMatchForm({
      date: match.date,
      myTeam: match.myTeam, opponent: match.opponent,
      myScore: String(match.myScore), opponentScore: String(match.opponentScore),
      category: match.category || "official", venue: match.venue || "home",
      mode: match.mode || "", note: match.note || "",
      starting: match.starting?.length ? match.starting : EMPTY_STARTING(),
      subs,
      scorers: match.scorers || [],
      ratings: match.ratings || {},
      cards: match.cards || {},
    });
    setEditMatchId(match.id);
    setIsNewMode(false);
    setMatchFormTab("basic");
    setShowMatchForm(true);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  // ── transfer helpers ───────────────────────────────────────────────────────
  const handleTransferSubmit = () => {
    if (!tfForm.playerName || !tfForm.type) return;
    const tf = { ...tfForm, id: editTransferId || Date.now() };

    if (editTransferId) {
      setTransfers(prev => prev.map(t => t.id === editTransferId ? tf : t));
    } else {
      setTransfers(prev => [tf, ...prev]);
    }

    // sync roster
    if (tfForm.type === "in" || tfForm.type === "loan_in" || tfForm.type === "youth" || tfForm.type === "loan_back") {
      // add player if not exists
      const exists = roster.find(p => p.name === tfForm.playerName);
      if (!exists) {
        setRoster(prev => [...prev, {
          id: Date.now()+1, name: tfForm.playerName,
          position: tfForm.position, number: "", status: "active",
          photo: tfForm.photo || "",
        }]);
      } else {
        setRoster(prev => prev.map(p => p.name === tfForm.playerName
          ? {...p, status:"active", ...(tfForm.photo ? { photo: tfForm.photo } : {})}
          : p));
      }
    } else if (tfForm.type === "out" || tfForm.type === "loan_out") {
      setRoster(prev => prev.map(p => p.name === tfForm.playerName ? {...p, status:"inactive"} : p));
    }

    setTfForm(INITIAL_TRANSFER_FORM());
    setEditTransferId(null);
    setShowTransferForm(false);
  };

  const startEditTransfer = (tf) => {
    setTfForm({ ...tf });
    setEditTransferId(tf.id);
    setShowTransferForm(true);
  };

  const deleteTransfer = (id) => setTransfers(prev => prev.filter(t => t.id !== id));

  // ── roster helpers ─────────────────────────────────────────────────────────
  const handleTfPhoto = async (file) => {
    if (!file) return;
    try {
      const dataUrl = await resizePhotoToDataURL(file);
      setTfForm(f => ({ ...f, photo: dataUrl }));
    } catch (e) { console.error("photo error", e); }
  };

  const handleNewPlayerPhoto = async (file) => {
    if (!file) return;
    try {
      const dataUrl = await resizePhotoToDataURL(file);
      setNewPlayer(p => ({ ...p, photo: dataUrl }));
    } catch (e) { console.error("photo error", e); }
  };

  const handleRosterPhotoChange = async (playerId, file) => {
    if (!file) return;
    try {
      const dataUrl = await resizePhotoToDataURL(file);
      setRoster(prev => prev.map(p => p.id === playerId ? { ...p, photo: dataUrl } : p));
    } catch (e) { console.error("photo error", e); }
  };

  const addPlayerManually = () => {
    if (!newPlayer.name) return;
    setRoster(prev => [...prev, { id: Date.now(), ...newPlayer, status: "active" }]);
    setNewPlayer({ name:"", position:"CM", number:"", photo:"" });
    setShowAddPlayer(false);
  };
  const removeFromRoster = (id) => setRoster(prev => prev.map(p => p.id===id ? {...p,status:"inactive"} : p));

  // ── 選手編集 ──────────────────────────────────────────────────────────
  const [editingPlayerId, setEditingPlayerId] = useState(null);
  const [editPlayerForm, setEditPlayerForm] = useState({ name:"", position:"CM", number:"" });

  const startEditPlayer = (player) => {
    setEditingPlayerId(player.id);
    setEditPlayerForm({ name: player.name, position: posNorm(player.position), number: player.number || "" });
  };

  // 名前変更時は過去の試合データ・移籍記録の名前もすべて更新（戦績を維持）
  const savePlayerEdit = (player) => {
    const newName = editPlayerForm.name.trim();
    if (!newName) return;
    const oldName = player.name;

    setRoster(prev => prev.map(p => p.id === player.id
      ? { ...p, name: newName, position: editPlayerForm.position, number: editPlayerForm.number }
      : p));

    if (newName !== oldName) {
      const renameKeys = (obj) => {
        if (!obj || !(oldName in obj)) return obj;
        const next = { ...obj };
        next[newName] = next[oldName];
        delete next[oldName];
        return next;
      };
      setMatches(prev => prev.map(m => ({
        ...m,
        starting: (m.starting||[]).map(p => p.name === oldName ? { ...p, name: newName } : p),
        subs: (m.subs||[]).map(s => ({
          ...s,
          name: s.name === oldName ? newName : s.name,
          inFor: s.inFor === oldName ? newName : s.inFor,
        })),
        scorers: (m.scorers||[]).map(sc => ({
          ...sc,
          name: sc.name === oldName ? newName : sc.name,
          assist: sc.assist === oldName ? newName : sc.assist,
        })),
        ratings: renameKeys(m.ratings),
        cards: renameKeys(m.cards),
      })));
      setTransfers(prev => prev.map(t => t.playerName === oldName ? { ...t, playerName: newName } : t));
    }
    setEditingPlayerId(null);
  };

  // ── render: セーブ選択画面 ────────────────────────────────────────────────
  if (!currentSave) {
    return (
      <div style={{minHeight:"100vh",background:"transparent",color:"#fff",fontFamily:"'Inter','Helvetica Neue',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",padding:"0 16px"}}>
        <style>{`
          *{box-sizing:border-box}
          input{background:#1A3320;border:1px solid #2A4A30;color:#fff;border-radius:8px;padding:11px 13px;font-size:14px;width:100%;outline:none;font-family:inherit}
          input:focus{border-color:#C8F135;box-shadow:0 0 0 2px rgba(200,241,53,.12)}
          input::placeholder{color:#557055}
          button{cursor:pointer;font-family:inherit}
          @keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
        `}</style>

        <div style={{maxWidth:480,width:"100%",paddingTop:56,paddingBottom:48}}>
          {/* ロゴ */}
          <div style={{textAlign:"center",marginBottom:36}}>
            <div style={{fontSize:48,marginBottom:8}}>⚽</div>
            <div style={{fontSize:10,letterSpacing:4,color:"#C8F135",textTransform:"uppercase",marginBottom:5}}>Match Tracker</div>
            <h1 style={{margin:0,fontSize:26,fontWeight:800,letterSpacing:-1}}>試合結果ログ</h1>
          </div>

          {/* 既存セーブ一覧 */}
          {saveSummaries.length > 0 && (
            <div style={{marginBottom:24}}>
              <div style={{fontSize:10,fontWeight:700,color:"#7A9A7A",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>セーブデータを選択</div>
              {saveSummaries.map(s=>(
                <div key={s.id} style={{marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <button onClick={()=>selectSave(s)} style={{flex:1,background:"#122018",border:"1px solid #2A4A30",borderRadius:12,padding:"14px 16px",textAlign:"left",color:"inherit",transition:"all .15s"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:5}}>
                        <span style={{fontSize:16,fontWeight:800,color:"#E8F8E8"}}>{s.teamName}</span>
                        <span style={{fontSize:11,color:"#C8F135",fontWeight:700}}>進む →</span>
                      </div>
                      <div style={{display:"flex",gap:10,fontSize:11,color:"#557055",flexWrap:"wrap"}}>
                        <span>{s.total}試合</span>
                        <span><span style={{color:"#C8F135"}}>{s.wins}勝</span> <span style={{color:"#AAAAAA"}}>{s.draws}分</span> <span style={{color:"#FF5C5C"}}>{s.losses}敗</span></span>
                        {s.last && <span>最終: {s.last}</span>}
                      </div>
                    </button>
                    <button onClick={()=>exportSave(s)}
                      title="バックアップを書き出し" style={{background:"transparent",border:"1px solid #2A4A30",color:"#7A9A7A",borderRadius:8,padding:"8px 9px",fontSize:12,flexShrink:0}}>
                      📤
                    </button>
                    <button onClick={()=>setDeleteConfirmId(deleteConfirmId===s.id?null:s.id)}
                      title="セーブ削除" style={{background:deleteConfirmId===s.id?"#3A1A1A":"transparent",border:"1px solid #3A2A2A",color:deleteConfirmId===s.id?"#FF8080":"#7A5050",borderRadius:8,padding:"8px 9px",fontSize:12,flexShrink:0}}>
                      🗑
                    </button>
                  </div>
                  {/* アプリ内の削除確認（OSダイアログ非依存） */}
                  {deleteConfirmId===s.id && (
                    <div style={{display:"flex",alignItems:"center",gap:8,background:"#2A1414",border:"1px solid #5A2A2A",borderRadius:10,padding:"10px 12px",marginTop:6,animation:"slideDown .2s ease-out"}}>
                      <span style={{flex:1,fontSize:11,color:"#FFB0B0",lineHeight:1.5}}>
                        「{s.teamName}」を削除しますか？{s.id==="legacy"&&"（旧バージョンのデータも完全に削除されます）"}この操作は取り消せません。
                      </span>
                      <button onClick={()=>setDeleteConfirmId(null)} style={{background:"#1A2A1A",border:"1px solid #2A4A30",color:"#7A9A7A",borderRadius:8,padding:"8px 12px",fontSize:12,fontWeight:700,flexShrink:0}}>
                        やめる
                      </button>
                      <button onClick={()=>{deleteSave(s.id);setDeleteConfirmId(null);}} style={{background:"#E03A3A",border:"none",color:"#fff",borderRadius:8,padding:"8px 12px",fontSize:12,fontWeight:800,flexShrink:0}}>
                        削除する
                      </button>
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}

          {/* 新規作成 */}
          <div style={{background:"#0D1F10",border:"1px solid #1F4025",borderRadius:13,padding:"16px"}}>
            <div style={{fontSize:10,fontWeight:700,color:"#C8F135",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>+ 新しくはじめる</div>
            <div style={{fontSize:11,color:"#7A9A7A",marginBottom:5}}>チーム名</div>
            <input type="text" placeholder="例: レアルFC" value={newTeamName}
              onChange={e=>setNewTeamName(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter") createSave(newTeamName); }} />
            <button onClick={()=>createSave(newTeamName)} disabled={!newTeamName.trim()}
              style={{width:"100%",marginTop:10,background:"#C8F135",color:"#0A1A0C",border:"none",borderRadius:9,padding:12,fontWeight:800,fontSize:14,opacity:newTeamName.trim()?1:.35}}>
              このチームではじめる →
            </button>
            <button onClick={()=>createSave(newTeamName.trim()||"バルセロナ", true)}
              style={{width:"100%",marginTop:8,background:"transparent",color:"#557055",border:"1px dashed #2A4A30",borderRadius:9,padding:9,fontWeight:700,fontSize:11}}>
              サンプルで試す（バルセロナ 25-26 実データ）
            </button>
            <label style={{display:"block",width:"100%",marginTop:8,background:"transparent",color:"#66AACC",border:"1px dashed #2A4050",borderRadius:9,padding:9,fontWeight:700,fontSize:11,textAlign:"center",cursor:"pointer"}}>
              📥 バックアップファイルから復元
              <input type="file" accept=".json,application/json" style={{display:"none"}}
                onChange={e=>{importSave(e.target.files?.[0]); e.target.value="";}} />
            </label>
          </div>

          {/* クラウド同期設定 */}
          <div style={{background:"#0D1A24",border:"1px solid #1F3040",borderRadius:13,padding:"14px 16px",marginTop:16}}>
            <button onClick={()=>setShowCloudSettings(v=>!v)} style={{width:"100%",background:"transparent",border:"none",color:"#66AACC",fontSize:12,fontWeight:700,display:"flex",justifyContent:"space-between",alignItems:"center",padding:0}}>
              <span>☁ クラウド同期（iPhone・iPad間でデータ共有）</span>
              <span>{showCloudSettings?"▲":"▼"}</span>
            </button>
            {cloudEnabled && !showCloudSettings && (
              <div style={{fontSize:10,color:"#557080",marginTop:6}}>
                同期中：コード「{cloud.syncId}」 {syncStatus==="synced"?"✓":syncStatus==="syncing"?"…":syncStatus==="error"?"⚠ 接続エラー":""}
              </div>
            )}
            {showCloudSettings && (
              <div style={{marginTop:12,animation:"slideDown .2s ease-out"}}>
                <div style={{fontSize:10,color:"#557080",marginBottom:4}}>Firebase Database URL</div>
                <input type="text" placeholder="https://xxxx-default-rtdb.firebaseio.com" value={cloudDraft.dbUrl}
                  onChange={e=>setCloudDraft(d=>({...d,dbUrl:e.target.value.trim()}))} style={{marginBottom:8,fontSize:12}} />
                <div style={{fontSize:10,color:"#557080",marginBottom:4}}>同期コード（両方の端末で同じものを入力。推測されにくい文字列に）</div>
                <input type="text" placeholder="例: taro-soccer-2026-xyz" value={cloudDraft.syncId}
                  onChange={e=>setCloudDraft(d=>({...d,syncId:e.target.value.trim()}))} style={{marginBottom:10,fontSize:12}} />
                <button onClick={runCloudTest} disabled={!cloudDraft.dbUrl||!cloudDraft.syncId}
                  style={{width:"100%",marginBottom:8,background:"#0D2030",color:"#66AACC",border:"1px solid #2A4050",borderRadius:9,padding:9,fontWeight:700,fontSize:12,opacity:(cloudDraft.dbUrl&&cloudDraft.syncId)?1:.35}}>
                  🔌 接続テスト
                </button>
                {cloudTestResult && (
                  <div style={{fontSize:11,color:cloudTestResult.startsWith("✓")?"#7FE08A":cloudTestResult.startsWith("✗")?"#FF8080":"#66AACC",marginBottom:10,lineHeight:1.5}}>
                    {cloudTestResult}
                  </div>
                )}
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{setCloud(cloudDraft);setShowCloudSettings(false);}}
                    disabled={!cloudDraft.dbUrl||!cloudDraft.syncId}
                    style={{flex:2,background:"#66AACC",color:"#0A1A24",border:"none",borderRadius:9,padding:10,fontWeight:800,fontSize:12,opacity:(cloudDraft.dbUrl&&cloudDraft.syncId)?1:.35}}>
                    同期を有効にする
                  </button>
                  {cloudEnabled && (
                    <button onClick={()=>{setCloud({dbUrl:"",syncId:""});setCloudDraft({dbUrl:"",syncId:""});}}
                      style={{flex:1,background:"transparent",color:"#7A5050",border:"1px solid #3A2A2A",borderRadius:9,padding:10,fontWeight:700,fontSize:11}}>
                      無効化
                    </button>
                  )}
                </div>
                <div style={{fontSize:9,color:"#3A5060",marginTop:8,lineHeight:1.6}}>
                  ※ データ変更は自動でクラウドに保存され、セーブを開く時に最新版を取得します。両端末で同時に編集すると後から保存した方が優先されます。
                </div>
              </div>
            )}
          </div>

          <div style={{fontSize:10,color:"#3A5040",textAlign:"center",marginTop:20,lineHeight:1.7}}>
            セーブデータはこの端末のブラウザに保存されます。Safariとホーム画面アプリは保存領域が別なので、<span style={{color:"#557055"}}>必ず同じ開き方</span>で使ってください。<br/>
            📤でバックアップを書き出しておくと、機種変更や万一の時も📥から復元できます。
          </div>
        </div>
      </div>
    );
  }

  // ── render: アプリ本体 ───────────────────────────────────────────────────
  return (
    <div style={{minHeight:"100vh",background:"transparent",color:"#fff",fontFamily:"'Inter','Helvetica Neue',sans-serif",paddingBottom:60}}>

      {/* flash */}
      {flash && (
        <div style={{position:"fixed",inset:0,zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.75)",animation:"fadeOut 2s forwards",pointerEvents:"none"}}>
          <div style={{fontSize:88,fontWeight:900,color:RESULT_COLOR[flash],letterSpacing:-4,textShadow:`0 0 50px ${RESULT_COLOR[flash]}`,animation:"scaleIn .3s ease-out"}}>
            {flash==="win"?"WIN！":flash==="loss"?"LOSS":"DRAW"}
          </div>
        </div>
      )}

      <style>{`
        @keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
        @keyframes scaleIn{from{transform:scale(.4)}to{transform:scale(1)}}
        @keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
        *{box-sizing:border-box}
        input,select,textarea{background:#1A3320;border:1px solid #2A4A30;color:#fff;border-radius:8px;padding:8px 10px;font-size:13px;width:100%;outline:none;font-family:inherit}
        input:focus,select:focus,textarea:focus{border-color:#C8F135;box-shadow:0 0 0 2px rgba(200,241,53,.12)}
        input::placeholder,textarea::placeholder{color:#557055}
        select option{background:#1A3320}
        button{cursor:pointer;font-family:inherit}
      `}</style>

      {/* ── 選手プロフィールモーダル ───────────────────────────────────── */}
      {profileData && (
        <div onClick={()=>setProfilePlayer(null)} style={{position:"fixed",inset:0,zIndex:900,background:"rgba(0,0,0,.78)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:640,maxHeight:"88vh",overflowY:"auto",background:"#0E1E12",border:"1px solid #2A4A30",borderRadius:"18px 18px 0 0",padding:"18px 16px 28px",animation:"slideDown .25s ease-out"}}>
            {/* header */}
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
              {photoMap[profileData.name]
                ? <img src={photoMap[profileData.name]} alt={profileData.name} style={{width:64,height:64,borderRadius:"50%",objectFit:"cover",border:"3px solid #C8F135",flexShrink:0}} />
                : <div style={{width:64,height:64,borderRadius:"50%",background:"#1A3320",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:900,color:"#557055",flexShrink:0}}>{profileData.name[0]}</div>}
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:19,fontWeight:900,color:"#E8F8E8",marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{profileData.name}</div>
                <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                  {profileData.rosterEntry && (<>
                    <span style={{fontSize:10,fontWeight:700,color:"#C8F135",background:"#0D2010",border:"1px solid #2A4A22",borderRadius:4,padding:"2px 6px"}}>{posNorm(profileData.rosterEntry.position)}</span>
                    {profileData.rosterEntry.number && <span style={{fontSize:10,color:"#7A9A7A"}}>#{profileData.rosterEntry.number}</span>}
                    <span style={{fontSize:9,color:profileData.rosterEntry.status==="active"?"#C8F135":"#557055",background:"#1A2A1A",borderRadius:3,padding:"1px 5px"}}>{profileData.rosterEntry.status==="active"?"在籍中":"退団"}</span>
                  </>)}
                  {!profileData.rosterEntry && <span style={{fontSize:9,color:"#557055",background:"#1A2A1A",borderRadius:3,padding:"1px 5px"}}>退団</span>}
                </div>
              </div>
              <button onClick={()=>setProfilePlayer(null)} style={{background:"#1A3320",border:"1px solid #2A4A30",color:"#7A9A7A",borderRadius:9,padding:"7px 11px",fontSize:14,flexShrink:0}}>✕</button>
            </div>

            {/* スコープ切替: 公式戦のみ（デフォルト） / 全体 */}
            <div style={{display:"flex",gap:6,marginBottom:14}}>
              {[["official","公式戦のみ"],["all","全体（親善試合含む）"]].map(([k,l])=>(
                <button key={k} onClick={()=>setProfileScope(k)} style={{flex:1,background:profileScope===k?"#1E4028":"#0A1A0C",color:profileScope===k?"#C8F135":"#557055",border:"1px solid",borderColor:profileScope===k?"#2A5030":"#1A3320",borderRadius:8,padding:"7px 4px",fontSize:11,fontWeight:700}}>
                  {l}
                </button>
              ))}
            </div>

            {/* 通算成績 */}
            <div style={{fontSize:10,fontWeight:700,color:"#7A9A7A",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>通算成績{profileScope==="official"?"（公式戦）":"（全体）"}</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:6}}>
              {[
                {l:"出場",v:`${profileData.total.apps}`,sub:`先発${profileData.total.starts}`,c:"#E8F8E8"},
                {l:"出場時間",v:profileData.total.minutes,sub:"分",c:"#A0D0A0"},
                {l:"得点",v:profileData.total.goals,sub:"⚽",c:"#FFB830"},
                {l:"アシスト",v:profileData.total.assists,sub:"🅰",c:"#66CCFF"},
              ].map(x=>(
                <div key={x.l} style={{background:"#0A1A0C",borderRadius:9,padding:"9px 5px",textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:900,color:x.c,lineHeight:1}}>{x.v}</div>
                  <div style={{fontSize:9,color:"#557055",marginTop:3}}>{x.l}{x.sub?` (${x.sub})`:""}</div>
                </div>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:profileData.isDefensive?"repeat(4,1fr)":"repeat(3,1fr)",gap:6,marginBottom:16}}>
              {profileData.isDefensive && (
                <div style={{background:"#0A1A0C",borderRadius:8,padding:"8px 9px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:10,color:"#557055"}}>🧤 CS</span>
                  <span style={{fontSize:15,fontWeight:900,color:profileData.total.cleanSheets?"#7FE08A":"#3A5040"}}>{profileData.total.cleanSheets}</span>
                </div>
              )}
              <div style={{background:"#0A1A0C",borderRadius:8,padding:"8px 9px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:10,color:"#557055"}}>🟨</span>
                <span style={{fontSize:15,fontWeight:800,color:profileData.total.y?"#FFD93B":"#3A5040"}}>{profileData.total.y}</span>
              </div>
              <div style={{background:"#0A1A0C",borderRadius:8,padding:"8px 9px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:10,color:"#557055"}}>🟥</span>
                <span style={{fontSize:15,fontWeight:800,color:profileData.total.r?"#E03A3A":"#3A5040"}}>{profileData.total.r}</span>
              </div>
              <div style={{background:"#0A1A0C",borderRadius:8,padding:"8px 9px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:10,color:"#557055"}}>平均評価</span>
                <span style={{fontSize:15,fontWeight:900,color:profileData.total.avgRating!=null?ratingColorOf(profileData.total.avgRating):"#3A5040"}}>
                  {profileData.total.avgRating!=null?profileData.total.avgRating.toFixed(1):"−"}
                </span>
              </div>
            </div>

            {/* シーズン別 */}
            {profileData.bySeason.length > 0 && (<>
              <div style={{fontSize:10,fontWeight:700,color:"#7A9A7A",letterSpacing:2,textTransform:"uppercase",marginBottom:7}}>シーズン別成績</div>
              <div style={{background:"#0A1A0C",borderRadius:10,padding:"10px 11px",marginBottom:16}}>
                <div style={{display:"flex",fontSize:9,color:"#557055",paddingBottom:4,borderBottom:"1px solid #1A3320",marginBottom:3}}>
                  <span style={{flex:1.2}}>シーズン</span>
                  <span style={{flex:.9,textAlign:"center"}}>出場</span>
                  <span style={{flex:.8,textAlign:"center"}}>分</span>
                  <span style={{flex:.6,textAlign:"center"}}>⚽</span>
                  <span style={{flex:.6,textAlign:"center"}}>🅰</span>
                  <span style={{flex:.8,textAlign:"right"}}>評価</span>
                </div>
                {profileData.bySeason.map(sb=>(
                  <div key={sb.season} style={{display:"flex",fontSize:11,padding:"5px 0",borderBottom:"1px solid #122518",alignItems:"center"}}>
                    <span style={{flex:1.2,fontWeight:700,color:"#C8F135"}}>{sb.season}</span>
                    <span style={{flex:.9,textAlign:"center",color:"#D0E8D0"}}>{sb.apps}<span style={{fontSize:8,color:"#557055"}}>({sb.starts})</span></span>
                    <span style={{flex:.8,textAlign:"center",color:"#A0D0A0",fontSize:10}}>{sb.minutes}</span>
                    <span style={{flex:.6,textAlign:"center",color:"#FFB830",fontWeight:700}}>{sb.goals||"−"}</span>
                    <span style={{flex:.6,textAlign:"center",color:"#66CCFF",fontWeight:700}}>{sb.assists||"−"}</span>
                    <span style={{flex:.8,textAlign:"right",fontWeight:900,color:sb.avgRating!=null?ratingColorOf(sb.avgRating):"#3A5040"}}>{sb.avgRating!=null?sb.avgRating.toFixed(1):"−"}</span>
                  </div>
                ))}
              </div>
            </>)}

            {/* 移籍歴 */}
            {profileData.tfs.length > 0 && (<>
              <div style={{fontSize:10,fontWeight:700,color:"#7A9A7A",letterSpacing:2,textTransform:"uppercase",marginBottom:7}}>移籍歴</div>
              <div style={{marginBottom:16}}>
                {profileData.tfs.map(tf=>(
                  <div key={tf.id} style={{display:"flex",alignItems:"center",gap:8,background:"#0A1A0C",borderLeft:`3px solid ${TRANSFER_COLOR[tf.type]||"#aaa"}`,borderRadius:8,padding:"8px 11px",marginBottom:5,fontSize:11}}>
                    <span style={{fontSize:9,fontWeight:800,color:TRANSFER_COLOR[tf.type]||"#aaa"}}>{TRANSFER_TYPES[tf.type]||tf.type}</span>
                    <span style={{color:"#557055",fontSize:10}}>{tf.date}</span>
                    {tf.fromTo&&<span style={{color:"#7A9A7A"}}>{tf.type==="out"||tf.type==="loan_out"?"→":"←"} {tf.fromTo}</span>}
                    {tf.fee&&<span style={{color:"#FFB830",marginLeft:"auto"}}>{parseFee(tf.fee)?formatFee(parseFee(tf.fee)):tf.fee}</span>}
                  </div>
                ))}
              </div>
            </>)}

            {/* 出場試合 */}
            {profileData.rows.length > 0 ? (<>
              <div style={{fontSize:10,fontWeight:700,color:"#7A9A7A",letterSpacing:2,textTransform:"uppercase",marginBottom:7}}>出場試合（{profileData.rows.length}試合{profileScope==="official"?"・公式戦":""}）</div>
              {profileData.rows.map(r=>{
                const res = getResult(r.myScore, r.opponentScore);
                return (
                  <div key={r.id} style={{display:"flex",alignItems:"center",gap:8,background:"#0A1A0C",borderLeft:`3px solid ${RESULT_COLOR[res]}`,borderRadius:8,padding:"8px 11px",marginBottom:5,fontSize:11}}>
                    <span style={{fontSize:10,fontWeight:900,color:RESULT_COLOR[res],width:14}}>{RESULT_LABEL[res]}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{color:"#D0E8D0",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {r.myScore}–{r.opponentScore} vs {r.opponent}
                      </div>
                      <div style={{fontSize:9,color:"#557055"}}>{r.date}・{r.started?"先発":"途中出場"}・{r.minutes}分</div>
                    </div>
                    <div style={{display:"flex",gap:4,alignItems:"center",flexShrink:0}}>
                      {profileData.isDefensive&&r.cs&&<span style={{fontSize:10,color:"#7FE08A"}} title="クリーンシート">🧤</span>}
                      {r.goals>0&&<span style={{fontSize:10,color:"#FFB830"}}>⚽{r.goals>1?`×${r.goals}`:""}</span>}
                      {r.assists>0&&<span style={{fontSize:10,color:"#66CCFF"}}>🅰{r.assists>1?`×${r.assists}`:""}</span>}
                      {r.y>0&&<span style={{width:7,height:10,borderRadius:1.5,background:"#FFD93B",display:"inline-block"}} />}
                      {r.r>0&&<span style={{width:7,height:10,borderRadius:1.5,background:"#E03A3A",display:"inline-block"}} />}
                      {r.rating!=null&&<span style={{fontSize:12,fontWeight:900,color:ratingColorOf(r.rating)}}>{r.rating}</span>}
                    </div>
                  </div>
                );
              })}
            </>) : (
              <div style={{textAlign:"center",padding:"16px 0",color:"#3A6040",fontSize:12}}>出場記録がありません</div>
            )}
          </div>
        </div>
      )}

      {/* ── HEADER ──────────────────────────────────────────────────────────── */}
      <div style={{background:"linear-gradient(135deg,#0D2010,#1A3820)",borderBottom:"1px solid #1F4025",padding:"20px 16px 0"}}>
        <div style={{maxWidth:640,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0}}>
              <button onClick={undoLast} disabled={undoCount===0} title="ひとつ前に戻す"
                style={{background:undoCount>0?"#1E3A28":"#0D1F10",border:"1px solid",borderColor:undoCount>0?"#3A6040":"#1A2A1A",color:undoCount>0?"#C8F135":"#2A3A2A",borderRadius:9,padding:"8px 10px",fontSize:13,flexShrink:0,position:"relative"}}>
                ↩
                {undoCount>0 && (
                  <span style={{position:"absolute",top:-5,right:-5,fontSize:8,background:"#1E4028",color:"#C8F135",borderRadius:6,padding:"1px 4px",border:"1px solid #0A1A0C",fontWeight:800}}>
                    {undoCount}
                  </span>
                )}
              </button>
              <button onClick={()=>setCurrentSave(null)} title="セーブ選択に戻る"
                style={{background:"#0D1F10",border:"1px solid #2A4A30",color:"#7A9A7A",borderRadius:9,padding:"8px 10px",fontSize:13,flexShrink:0,position:"relative"}}>
                💾
                {cloudEnabled && (
                  <span style={{position:"absolute",top:-5,right:-5,fontSize:8,background:syncStatus==="synced"?"#1E4028":syncStatus==="error"?"#4A1A1A":"#2A3A4A",color:syncStatus==="synced"?"#C8F135":syncStatus==="error"?"#FF8080":"#66AACC",borderRadius:6,padding:"1px 4px",border:"1px solid #0A1A0C"}}>
                    {syncStatus==="synced"?"☁✓":syncStatus==="syncing"?"☁…":syncStatus==="error"?"☁!":"☁"}
                  </span>
                )}
              </button>
              <div style={{minWidth:0}}>
                <div style={{fontSize:10,letterSpacing:3,color:"#C8F135",textTransform:"uppercase",marginBottom:3}}>⚽ Match Tracker</div>
                <h1 style={{margin:0,fontSize:20,fontWeight:800,letterSpacing:-1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{currentSave.teamName}</h1>
              </div>
            </div>
            {/* context CTA */}
            {mainTab === "matches" && (
              <button onClick={()=>{
                  if (showMatchForm) { setShowMatchForm(false); }
                  else { setMatchForm({ ...INITIAL_MATCH_FORM(), myTeam: currentSave?.teamName || "", mode: modesOfCategory("official")[0] || "", starting: startingFromLastMatch() }); setShowMatchForm(true); }
                  setMatchFormTab("basic"); setIsNewMode(false); setEditMatchId(null);
                }}
                style={{background:showMatchForm?"#1A3320":"#C8F135",color:showMatchForm?"#C8F135":"#0A1A0C",border:showMatchForm?"1px solid #C8F135":"none",borderRadius:10,padding:"9px 14px",fontWeight:700,fontSize:12}}>
                {showMatchForm?(editMatchId?"✕ 編集を中止":"✕ 閉じる"):"+ 試合追加"}
              </button>
            )}

                        )}

                <button key={s} onClick={()=>setSeasonFilter(s)} style={{flexShrink:0,background:seasonFilter===s?"#C8F135":"#122018",color:seasonFilter===s?"#0A1A0C":"#7A9A7A",border:"1px solid",borderColor:seasonFilter===s?"#C8F135":"#1F4025",borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>

                return (
                  <div key={tf.id} style={{background:"#0E1E10",border:"1px solid #1A3320",borderLeft:`3px solid ${tc}`,borderRadius:11,padding:"11px 13px",marginBottom:7}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:34,height:34,borderRadius:7,background:`${tc}22`,border:`1px solid ${tc}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:tc,flexShrink:0}}>
                        {TRANSFER_TYPES[tf.type]}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:14,fontWeight:700,color:"#E8F8E8",marginBottom:2}}>
                          {tf.playerName}
                          <span style={{fontSize:9,fontWeight:700,color:tc,background:`${tc}18`,borderRadius:4,padding:"2px 5px",marginLeft:6}}>{tf.position}</span>
                        </div>
                        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",fontSize:10,color:"#557055"}}>
                          <span>{tf.date}</span>
                          <span style={{fontSize:9,background:"#0D2A14",color:"#5A8A5A",padding:"1px 5px",borderRadius:4,border:"1px solid #1A4020"}}>{seasonOf(tf.date)}</span>
                          {tf.fromTo&&<span style={{color:"#7A9A7A"}}>{tf.type==="out"||tf.type==="loan_out"?"→":"←"} {tf.fromTo}</span>}
                          {tf.type==="youth"&&!tf.fromTo&&<span style={{color:"#A78BFA"}}>🎓 育成チームから昇格</span>}
                          {tf.fee&&<span style={{color:"#FFB830"}}>{parseFee(tf.fee)?formatFee(parseFee(tf.fee)):tf.fee}</span>}
                        </div>
                        {tf.note&&<div style={{fontSize:10,color:"#557055",marginTop:3}}>📝 {tf.note}</div>}
                      </div>
                      <div style={{display:"flex",gap:4,flexShrink:0}}>
                        <button onClick={()=>startEditTransfer(tf)} style={{background:"transparent",border:"1px solid #2A4A30",color:"#7A9A7A",borderRadius:6,padding:"4px 7px",fontSize:10}}>✏️</button>
                        <button onClick={()=>deleteTransfer(tf.id)} style={{background:"transparent",border:"none",color:"#3A5040",fontSize:14,padding:"3px 4px"}}>✕</button>
                      </div>
                    </div>
                  </div>
                );
              })
            }
          </div>

          {/* 移籍収支 */}
          <div style={{background:"linear-gradient(135deg,#122018,#0E1A10)",border:"1px solid #1F4025",borderRadius:11,padding:"12px 14px",marginTop:12}}>
            <SecTitle color="#FFB830">€ 移籍収支{transferSeason==="all"?"（通算）":`（${transferSeason}）`}</SecTitle>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:(transferSeason==="all"&&feeBalance.bySeason.length>1)?10:0}}>
              <div style={{background:"#0A1A0C",borderRadius:8,padding:"9px 8px",textAlign:"center"}}>
                <div style={{fontSize:9,color:"#557055",marginBottom:3}}>支出</div>
                <div style={{fontSize:14,fontWeight:900,color:"#FF5C5C"}}>{formatFee(feeBalance.total.spent)}</div>
              </div>
              <div style={{background:"#0A1A0C",borderRadius:8,padding:"9px 8px",textAlign:"center"}}>
                <div style={{fontSize:9,color:"#557055",marginBottom:3}}>収入</div>
                <div style={{fontSize:14,fontWeight:900,color:"#C8F135"}}>{formatFee(feeBalance.total.earned)}</div>
              </div>
              <div style={{background:"#0A1A0C",borderRadius:8,padding:"9px 8px",textAlign:"center",border:`1px solid ${feeBalance.total.net>=0?"#2A5030":"#502A2A"}`}}>
                <div style={{fontSize:9,color:"#557055",marginBottom:3}}>収支</div>
                <div style={{fontSize:14,fontWeight:900,color:feeBalance.total.net>=0?"#C8F135":"#FF5C5C"}}>
                  {feeBalance.total.net>0?"+":""}{formatFee(feeBalance.total.net)}
                </div>
              </div>
            </div>
            {/* シーズン別収支 */}
            {transferSeason==="all" && feeBalance.bySeason.length > 1 && (<>
              <div style={{display:"flex",fontSize:9,color:"#557055",paddingBottom:4,borderBottom:"1px solid #1A3320",marginBottom:4}}>
                <span style={{flex:1.2}}>シーズン</span>
                <span style={{flex:1,textAlign:"right"}}>支出</span>
                <span style={{flex:1,textAlign:"right"}}>収入</span>
                <span style={{flex:1,textAlign:"right"}}>収支</span>
              </div>
              {feeBalance.bySeason.map(fb=>(
                <div key={fb.season} style={{display:"flex",fontSize:11,padding:"5px 0",borderBottom:"1px solid #122518",alignItems:"center"}}>
                  <span style={{flex:1.2,fontWeight:700,color:"#C8F135"}}>{fb.season}</span>
                  <span style={{flex:1,textAlign:"right",color:"#FF8080"}}>{fb.spent?formatFee(fb.spent):"−"}</span>
                  <span style={{flex:1,textAlign:"right",color:"#A0D880"}}>{fb.earned?formatFee(fb.earned):"−"}</span>
                  <span style={{flex:1,textAlign:"right",fontWeight:800,color:fb.net>=0?"#C8F135":"#FF5C5C"}}>{fb.net>0?"+":""}{formatFee(fb.net)}</span>
                </div>
              ))}
            </>)}
            <div style={{fontSize:9,color:"#3A5040",marginTop:7}}>※「€25M」「25M」「500K」のような表記の移籍金を自動計算します（M=百万, K=千）。育成昇格は対象外です。</div>
          </div>

          {/* summary */}
          <div style={{background:"#0D1F10",border:"1px solid #1F4025",borderRadius:11,padding:"12px 14px",marginTop:12}}>
            <SecTitle>移籍サマリー{transferSeason!=="all"&&`（${transferSeason}）`}</SecTitle>
            <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:6}}>
              {[["in","加入"],["out","放出"],["loan_in","ローン入"],["loan_out","ローン出"],["youth","育成昇格"],["loan_back","ローン復帰"]].map(([type,label])=>{
                const count=scopedTransfers.filter(t=>t.type===type).length;
                const c=TRANSFER_COLOR[type];
                return (
                  <div key={type} style={{background:"#0A1A0C",borderRadius:8,padding:"9px 11px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:11,color:"#557055"}}>{label}</span>
                    <span style={{fontSize:18,fontWeight:900,color:c}}>{count}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </>)}

      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<SoccerTracker />);
</script>
</body>
</html>
