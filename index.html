                  <button key={k} onClick={()=>setMatchFormTab(k)} style={{flex:1,padding:"7px 3px",borderRadius:7,border:"none",fontSize:11,fontWeight:700,background:matchFormTab===k?"#1E4028":"transparent",color:matchFormTab===k?"#C8F135":"#557055"}}>
                    {l}
                  </button>
                ))}
              </div>

              {/* basic */}
              {matchFormTab==="basic" && (<div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:9}}>
                  <div><Label>日付</Label><input type="date" value={matchForm.date} onChange={e=>setMatchForm(f=>({...f,date:e.target.value}))} /></div>
                  <div><Label>モード</Label>
                    <select
                      value={isNewMode ? "__new" : matchForm.mode}
                      onChange={e=>{
                        if (e.target.value === "__new") { setIsNewMode(true); setMatchForm(f=>({...f,mode:""})); }
                        else { setIsNewMode(false); setMatchForm(f=>({...f,mode:e.target.value})); }
                      }}
                    >
                      {usedModes.map(m=><option key={m} value={m}>{MODE_LABELS[m]||m}</option>)}
                      <option value="__new">＋ 新規入力...</option>
                    </select>
                    {isNewMode && (
                      <input type="text" placeholder="例: リーグ戦、PK戦大会" value={matchForm.mode}
                        onChange={e=>setMatchForm(f=>({...f,mode:e.target.value}))}
                        style={{marginTop:5}} autoFocus />
                    )}
                  </div>
                </div>
                <div style={{marginBottom:9}}><Label>自チーム名</Label><input type="text" placeholder="例: レアルFC" value={matchForm.myTeam} onChange={e=>setMatchForm(f=>({...f,myTeam:e.target.value}))} /></div>
                <div style={{marginBottom:9}}><Label>対戦相手</Label><input type="text" placeholder="例: バルサユナイテッド" value={matchForm.opponent} onChange={e=>setMatchForm(f=>({...f,opponent:e.target.value}))} /></div>
                <div style={{background:"#0D1F10",border:"1px solid #2A4A30",borderRadius:10,padding:"11px 13px",display:"flex",alignItems:"center",gap:9,marginBottom:9}}>
                  <div style={{flex:1,textAlign:"center"}}><div style={{fontSize:10,color:"#7A9A7A",marginBottom:5}}>自チーム得点</div>
                    <input type="number" min="0" max="99" placeholder="0" value={matchForm.myScore} onChange={e=>setMatchForm(f=>({...f,myScore:e.target.value}))} style={{textAlign:"center",fontSize:24,fontWeight:900,padding:5}} /></div>
                  <div style={{color:"#3A6040",fontSize:18,fontWeight:700}}>−</div>
                  <div style={{flex:1,textAlign:"center"}}><div style={{fontSize:10,color:"#7A9A7A",marginBottom:5}}>相手得点</div>
                    <input type="number" min="0" max="99" placeholder="0" value={matchForm.opponentScore} onChange={e=>setMatchForm(f=>({...f,opponentScore:e.target.value}))} style={{textAlign:"center",fontSize:24,fontWeight:900,padding:5}} /></div>
                </div>
                <div style={{marginBottom:12}}><Label>メモ</Label><textarea placeholder="試合のメモ..." value={matchForm.note} onChange={e=>setMatchForm(f=>({...f,note:e.target.value}))} style={{resize:"vertical",minHeight:48}} /></div>
                <button onClick={()=>setMatchFormTab("lineup")} style={{width:"100%",background:"#1E4028",color:"#C8F135",border:"1px solid #2A5030",borderRadius:9,padding:10,fontWeight:700,fontSize:13}}>次へ：スタメン/交代 →</button>
              </div>)}

              {/* lineup */}
              {matchFormTab==="lineup" && (<div>
                <SecTitle>🟢 スタメン（11人）</SecTitle>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:14}}>
                  {matchForm.starting.map((p,i)=>(
                    <div key={p.id} style={{display:"flex",alignItems:"center",gap:5}}>
                      <select
                        value={p.pos}
                        onChange={e=>setMatchForm(f=>({...f,starting:f.starting.map((x,j)=>j===i?{...x,pos:e.target.value}:x)}))}
                        style={{width:58,flexShrink:0,fontSize:9,fontWeight:700,color:"#C8F135",background:"#0D1F10",border:"1px solid #2A4A30",borderRadius:5,padding:"5px 2px",textAlign:"center"}}
                      >
                        {ALL_POSITIONS.filter((v,idx,arr)=>arr.indexOf(v)===idx).map(pos=>(
                          <option key={pos} value={pos}>{pos}</option>
                        ))}
                      </select>
                      {allPlayerNames.length > 0 ? (
                        <select value={p.name} onChange={e=>setMatchForm(f=>({...f,starting:f.starting.map((x,j)=>j===i?{...x,name:e.target.value}:x)}))}>
                          <option value="">未選択</option>
                          {allPlayerNames.map(n=><option key={n} value={n}>{n}</option>)}
                        </select>
                      ) : (
                        <input type="text" placeholder={`選手${i+1}`} value={p.name} onChange={e=>setMatchForm(f=>({...f,starting:f.starting.map((x,j)=>j===i?{...x,name:e.target.value}:x)}))} />
                      )}
                    </div>
                  ))}
                </div>
                <SecTitle color="#FFD066">🔄 交代選手</SecTitle>
                <div style={{display:"flex",gap:5,fontSize:10,color:"#557055",marginBottom:5}}>
                  <span style={{width:"32%"}}>入り</span><span style={{width:"32%"}}>出</span><span style={{width:"18%"}}>分</span>
                </div>
                {matchForm.subs.map((s,i)=>{
                  // 出られる選手 = スタメン + この行より前に交代で入った選手（既にこの行以前で交代退場した選手は除く）
                  const earlierSubs = matchForm.subs.slice(0,i);
                  const cameOn  = earlierSubs.filter(x=>x.name).map(x=>x.name);
                  const wentOff = earlierSubs.filter(x=>x.inFor).map(x=>x.inFor);
                  const onPitch = [...new Set([...matchStartingNames, ...cameOn])].filter(n=>!wentOff.includes(n));
                  return (
                  <div key={s.id} style={{display:"flex",gap:5,marginBottom:5}}>
                    {allPlayerNames.length > 0 ? (
                      <select value={s.name} style={{width:"32%",fontSize:12,padding:"6px 7px"}} onChange={e=>setMatchForm(f=>({...f,subs:f.subs.map((x,j)=>j===i?{...x,name:e.target.value}:x)}))}>
                        <option value="">未選択</option>
                        {allPlayerNames.map(n=><option key={n} value={n}>{n}</option>)}
                      </select>
                    ) : (
                      <input style={{width:"32%",fontSize:12,padding:"6px 7px"}} type="text" placeholder="選手名" value={s.name} onChange={e=>setMatchForm(f=>({...f,subs:f.subs.map((x,j)=>j===i?{...x,name:e.target.value}:x)}))} />
                    )}
                    {onPitch.length > 0 ? (
                      <select value={s.inFor} style={{width:"32%",fontSize:12,padding:"6px 7px"}} onChange={e=>setMatchForm(f=>({...f,subs:f.subs.map((x,j)=>j===i?{...x,inFor:e.target.value}:x)}))}>
                        <option value="">未選択</option>
                        {onPitch.map(n=><option key={n} value={n}>{n}</option>)}
                      </select>
                    ) : (
                      <input style={{width:"32%",fontSize:12,padding:"6px 7px"}} type="text" placeholder="誰と交代" value={s.inFor} onChange={e=>setMatchForm(f=>({...f,subs:f.subs.map((x,j)=>j===i?{...x,inFor:e.target.value}:x)}))} />
                    )}
                    <input style={{width:"18%",fontSize:12,padding:"6px 5px",textAlign:"center"}} type="number" min="1" max="120" placeholder="分" value={s.minute} onChange={e=>setMatchForm(f=>({...f,subs:f.subs.map((x,j)=>j===i?{...x,minute:e.target.value}:x)}))} />
                    <div style={{display:"flex",alignItems:"center",color:"#3A5040",fontSize:11,width:"12%",justifyContent:"center"}}>{i+1}</div>
                  </div>
                  );
                })}
                <div style={{display:"flex",gap:7,marginTop:12}}>
                  <button onClick={()=>setMatchFormTab("basic")} style={{flex:1,background:"#0D1F10",color:"#7A9A7A",border:"1px solid #2A4A30",borderRadius:9,padding:9,fontWeight:700,fontSize:12}}>← 戻る</button>
                  <button onClick={()=>setMatchFormTab("scorers")} style={{flex:2,background:"#1E4028",color:"#C8F135",border:"1px solid #2A5030",borderRadius:9,padding:9,fontWeight:700,fontSize:12}}>次へ：得点者 →</button>

                </div>
              </div>)}

              {/* scorers */}
              {matchFormTab==="scorers" && (<div>
                <SecTitle color="#FFB830">⚽ 得点者 / アシスト</SecTitle>
                {matchForm.scorers.length===0 && <div style={{textAlign:"center",padding:"14px 0",color:"#3A6040",fontSize:13}}>得点者を追加してください</div>}
                {matchForm.scorers.map((sc,idx)=>(
                  <div key={sc.id} style={{background:"#0D1F10",border:"1px solid #1A3A1A",borderRadius:9,padding:"9px 10px",marginBottom:8}}>
                    <div style={{display:"flex",gap:5,marginBottom:6,alignItems:"center"}}>
                      <div style={{fontSize:10,color:"#FFB830",fontWeight:700,width:16}}>{idx+1}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:9,color:"#557055",marginBottom:3}}>得点者</div>
                        {matchAllNames.length > 0 ? (
                          <select value={sc.name} onChange={e=>updateScorer(sc.id,"name",e.target.value)} style={{fontSize:12,padding:"5px 7px"}}>
                            <option value="">選手選択</option>
                            {matchAllNames.map(n=><option key={n} value={n}>{n}</option>)}
                          </select>
                        ) : (
                          <input type="text" placeholder="選手名" value={sc.name} onChange={e=>updateScorer(sc.id,"name",e.target.value)} style={{fontSize:12,padding:"5px 7px"}} />
                        )}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:9,color:"#557055",marginBottom:3}}>アシスト</div>
                        {matchAllNames.length > 0 ? (
                          <select value={sc.assist||""} onChange={e=>updateScorer(sc.id,"assist",e.target.value)} style={{fontSize:12,padding:"5px 7px"}}>
                            <option value="">なし</option>
                            {matchAllNames.map(n=><option key={n} value={n}>{n}</option>)}
                          </select>
                        ) : (
                          <input type="text" placeholder="アシスト選手" value={sc.assist||""} onChange={e=>updateScorer(sc.id,"assist",e.target.value)} style={{fontSize:12,padding:"5px 7px"}} />
                        )}
                      </div>
                      <button onClick={()=>removeScorer(sc.id)} style={{background:"transparent",border:"none",color:"#FF5C5C",fontSize:15,padding:"3px 4px",alignSelf:"flex-end",marginBottom:2}}>✕</button>
                    </div>
                    <div style={{display:"flex",gap:5,alignItems:"center"}}>
                      <div style={{fontSize:9,color:"#557055",width:16}}></div>
                      <div style={{flex:1}}>
                        <select value={sc.type} onChange={e=>updateScorer(sc.id,"type",e.target.value)} style={{fontSize:11,padding:"5px 6px"}}>
                          <option value="normal">通常</option><option value="pk">PK</option>
                          <option value="free_kick">FK</option><option value="header">ヘッド</option><option value="og">OG</option>
                        </select>
                      </div>
                      <div style={{flex:1}}>
                        <input type="number" min="1" max="120" placeholder="得点時間(分)" value={sc.minute} onChange={e=>updateScorer(sc.id,"minute",e.target.value)} style={{fontSize:12,padding:"5px 6px",textAlign:"center"}} />
                      </div>
                      <div style={{width:19}}></div>
                    </div>
                  </div>
                ))}
                <button onClick={addScorer} style={{width:"100%",background:"#0D1F10",color:"#FFB830",border:"1px dashed #3A4A20",borderRadius:9,padding:"8px",fontWeight:700,fontSize:12,marginBottom:12}}>+ 得点を追加</button>
                <div style={{display:"flex",gap:7}}>
                  <button onClick={()=>setMatchFormTab("lineup")} style={{flex:1,background:"#0D1F10",color:"#7A9A7A",border:"1px solid #2A4A30",borderRadius:9,padding:9,fontWeight:700,fontSize:12}}>← 戻る</button>
                  <button onClick={()=>setMatchFormTab("ratings")} style={{flex:2,background:"#1E4028",color:"#C8F135",border:"1px solid #2A5030",borderRadius:9,padding:9,fontWeight:700,fontSize:12}}>次へ：評価 →</button>
                </div>
              </div>)}

              {/* ratings */}
              {matchFormTab==="ratings" && (<div>
                <SecTitle color="#A78BFA">⭐ 選手評価（10点満点）/ カード</SecTitle>
                {matchAllNames.length === 0
                  ? <div style={{textAlign:"center",padding:"20px 0",color:"#3A6040",fontSize:13}}>スタメン/交代タブで選手を入力すると評価できます</div>
                  : matchAllNames.map(name => {
                    const val = matchForm.ratings[name] ?? "";
                    const score = parseFloat(val);
                    const ratingColor = isNaN(score) ? "#557055" : score >= 8 ? "#C8F135" : score >= 6 ? "#FFD066" : score >= 4 ? "#FF9966" : "#FF5C5C";
                    const setRating = (v) => {
                      // allow values like "7", "7.", "7.5" while typing; clamp to 1-10
                      if (v === "") { setMatchForm(f=>({...f,ratings:{...f.ratings,[name]:""}})); return; }
                      if (!/^\d{1,2}(\.\d?)?$/.test(v)) return;
                      const n = parseFloat(v);
                      if (!isNaN(n) && n > 10) v = "10";
                      setMatchForm(f=>({...f,ratings:{...f.ratings,[name]:v}}));
                    };
                    const pc = matchForm.cards[name] || { y: 0, r: 0 };
                    const setCards = (next) => setMatchForm(f=>({...f,cards:{...f.cards,[name]:next}}));
                    return (
                      <div key={name} style={{marginBottom:8,background:"#0D1F10",borderRadius:9,padding:"10px 12px"}}>
                        {/* 上段：選手名 + カード + 評価点入力 */}
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                          <span style={{flex:1,fontSize:13,fontWeight:700,color:"#D0E8D0",minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</span>
                          {/* カード入力：タップで 0→1→2→0 (黄) / 0→1→0 (赤) */}
                          <button onClick={()=>setCards({...pc, y:(pc.y+1)%3})} title="イエローカード"
                            style={{width:24,height:24,borderRadius:6,border:pc.y>0?"1px solid #B89500":"1px solid #2A4A30",background:pc.y>0?"#FFD93B":"#0A1A0C",color:pc.y>0?"#5A4A00":"#3A5040",fontSize:10,fontWeight:900,padding:0,flexShrink:0}}>
                            {pc.y>0?pc.y:"🟨"}
                          </button>
                          <button onClick={()=>setCards({...pc, r:(pc.r+1)%2})} title="レッドカード"
                            style={{width:24,height:24,borderRadius:6,border:pc.r>0?"1px solid #8F1818":"1px solid #2A4A30",background:pc.r>0?"#E03A3A":"#0A1A0C",color:pc.r>0?"#fff":"#3A5040",fontSize:10,fontWeight:900,padding:0,flexShrink:0}}>
                            {pc.r>0?pc.r:"🟥"}
                          </button>
                          <input
                            type="text" inputMode="decimal" placeholder="−" value={val}
                            onChange={e=>setRating(e.target.value)}
                            style={{width:46,flexShrink:0,textAlign:"center",fontSize:14,fontWeight:900,color:ratingColor,padding:"5px 3px",background:"#0A1A0C",border:`1px solid ${isNaN(score)?"#2A4A30":ratingColor+"66"}`}}
                          />
                        </div>
                        {/* 下段：ドットでクイック入力 */}
                        <div style={{display:"flex",gap:0,alignItems:"center",justifyContent:"space-between"}}>
                          {[...Array(10)].map((_,i)=>{
                            const dotVal = i + 1;
                            const full = !isNaN(score) && dotVal <= Math.floor(score);
                            const half = !isNaN(score) && dotVal === Math.ceil(score) && score % 1 !== 0;
                            return (
                              <button key={i}
                                onClick={()=>setMatchForm(f=>({...f,ratings:{...f.ratings,[name]: parseFloat(f.ratings[name])===dotVal ? "" : String(dotVal)}}))}
                                title={`${dotVal}点`}
                                style={{
                                  width:18,height:18,borderRadius:"50%",
                                  border:`1px solid ${(full||half)?ratingColor:"#2A4A30"}`,
                                  background: full ? ratingColor
                                    : half ? `linear-gradient(90deg, ${ratingColor} 50%, transparent 50%)`
                                    : "transparent",
                                  cursor:"pointer",padding:0,transition:"all .1s",flexShrink:0,
                                }} />
                            );
                          })}
                        </div>
                      </div>
                    );
                  })
                }
                <div style={{display:"flex",gap:7,marginTop:12}}>
                  <button onClick={()=>setMatchFormTab("scorers")} style={{flex:1,background:"#0D1F10",color:"#7A9A7A",border:"1px solid #2A4A30",borderRadius:9,padding:9,fontWeight:700,fontSize:12}}>← 戻る</button>
                  <button onClick={handleMatchSubmit} disabled={!matchForm.myTeam||!matchForm.opponent||matchForm.myScore===""||matchForm.opponentScore===""} style={{flex:2,background:"#C8F135",color:"#0A1A0C",border:"none",borderRadius:9,padding:10,fontWeight:800,fontSize:13,opacity:(!matchForm.myTeam||!matchForm.opponent||matchForm.myScore===""||matchForm.opponentScore==="")?.4:1}}>
                    {editMatchId ? "変更を保存する ✓" : "試合を記録する ✓"}
                  </button>
                </div>
              </div>)}
            </div>
          )}

          {/* season selector */}
          {seasons.length > 0 && (
            <div style={{display:"flex",gap:6,marginTop:12,overflowX:"auto",paddingBottom:2}}>
              <button onClick={()=>setSeasonFilter("all")} style={{flexShrink:0,background:seasonFilter==="all"?"#C8F135":"#122018",color:seasonFilter==="all"?"#0A1A0C":"#7A9A7A",border:"1px solid",borderColor:seasonFilter==="all"?"#C8F135":"#1F4025",borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>
                通算
              </button>
              {seasons.map(s=>(
                <button key={s} onClick={()=>setSeasonFilter(s)} style={{flexShrink:0,background:seasonFilter===s?"#C8F135":"#122018",color:seasonFilter===s?"#0A1A0C":"#7A9A7A",border:"1px solid",borderColor:seasonFilter===s?"#C8F135":"#1F4025",borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>
                  {s}
                </button>
              ))}
            </div>
          )}

          {/* mode selector */}
          {usedModes.length > 0 && (
            <div style={{display:"flex",gap:6,marginTop:8,overflowX:"auto",paddingBottom:2}}>
              <button onClick={()=>setModeFilter("all")} style={{flexShrink:0,background:modeFilter==="all"?"#1E4028":"#122018",color:modeFilter==="all"?"#C8F135":"#557055",border:"1px solid",borderColor:modeFilter==="all"?"#2A5030":"#1F4025",borderRadius:8,padding:"5px 11px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>
                全モード
              </button>
              {usedModes.map(m=>{
                const mc = modeColorOf(m);
                const active = modeFilter===m;
                return (
                  <button key={m} onClick={()=>setModeFilter(m)} style={{flexShrink:0,display:"flex",alignItems:"center",gap:5,background:active?`${mc}22`:"#122018",color:active?mc:"#557055",border:"1px solid",borderColor:active?mc:"#1F4025",borderRadius:8,padding:"5px 11px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>
                    <span style={{width:7,height:7,borderRadius:"50%",background:mc,flexShrink:0}} />
                    {MODE_LABELS[m]||m}
                  </button>
                );
              })}
            </div>
          )}

          {/* stats */}
          <div style={{background:"linear-gradient(135deg,#122018,#0E1A10)",border:"1px solid #1F4025",borderRadius:14,padding:"14px 16px",marginTop:10}}>
            <div style={{fontSize:10,color:"#7A9A7A",letterSpacing:2,marginBottom:10,textTransform:"uppercase"}}>
              {seasonFilter==="all" ? "通算成績" : `${seasonFilter} シーズン成績`}
              {modeFilter!=="all" && <span style={{color:modeColorOf(modeFilter)}}>（{MODE_LABELS[modeFilter]||modeFilter}）</span>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:8}}>
              {[{l:"試合",v:stats.total,c:"#fff"},{l:"勝利",v:stats.wins,c:"#C8F135"},{l:"引分",v:stats.draws,c:"#AAAAAA"},{l:"敗北",v:stats.losses,c:"#FF5C5C"}].map(s=>(
                <div key={s.l} style={{background:"#0A1A0C",borderRadius:9,padding:"9px 5px",textAlign:"center"}}>
                  <div style={{fontSize:24,fontWeight:900,color:s.c,lineHeight:1}}>{s.v}</div>
                  <div style={{fontSize:10,color:"#557055",marginTop:2}}>{s.l}</div>
                </div>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
              {[{l:"総得点",v:stats.gf},{l:"総失点",v:stats.ga},{l:"勝率",v:`${winRate}%`}].map(s=>(
                <div key={s.l} style={{background:"#0A1A0C",borderRadius:7,padding:"8px 9px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:10,color:"#557055"}}>{s.l}</span>
                  <span style={{fontSize:15,fontWeight:800,color:"#C8F135"}}>{s.v}</span>
                </div>
              ))}
            </div>
          </div>

          {/* season breakdown（通算表示時のみ） */}
          {seasonFilter==="all" && seasonBreakdown.length > 1 && (
            <div style={{background:"#0D1F10",border:"1px solid #1F4025",borderRadius:12,padding:"12px 14px",marginTop:10}}>
              <div style={{fontSize:10,color:"#7A9A7A",letterSpacing:2,marginBottom:9,textTransform:"uppercase"}}>シーズン別成績</div>
              <div style={{display:"flex",fontSize:9,color:"#557055",paddingBottom:5,borderBottom:"1px solid #1A3320",marginBottom:5}}>
                <span style={{flex:1.4}}>シーズン</span>

                <span style={{flex:.7,textAlign:"center"}}>負</span>
                <span style={{flex:.9,textAlign:"center"}}>得/失</span>
                <span style={{flex:.9,textAlign:"right"}}>勝率</span>

                  <button key={sb.season} onClick={()=>setSeasonFilter(sb.season)}

              <button key={k} onClick={()=>setFilter(k)} style={{flex:1,background:filter===k?"#C8F135":"#122018",color:filter===k?"#0A1A0C":"#7A9A7A",border:"1px solid",borderColor:filter===k?"#C8F135":"#1F4025",borderRadius:8,padding:"7px 3px",fontSize:11,fontWeight:700}}>

              </button>

          {/* match list */}
          <div style={{marginTop:9}}>
            {filteredMatches.length===0
              ? <div style={{textAlign:"center",padding:"40px 0",color:"#3A6040",fontSize:13}}>試合記録がありません</div>
              : filteredMatches.map(match=>{
                const result=getResult(match.myScore,match.opponentScore);
                const modeLabel=MODE_LABELS[match.mode]||match.mode;
                const isExp=expandedMatchId===match.id;
                const sf=match.starting?.filter(p=>p.name)||[];
                const subf=match.subs?.filter(s=>s.name)||[];
                const scf=match.scorers?.filter(s=>s.name)||[];
                const GT={normal:"",pk:"PK",free_kick:"FK",header:"HDR",og:"OG"};
                return (
                  <div key={match.id} style={{background:"#0E1E10",border:"1px solid #1A3320",borderLeft:`3px solid ${RESULT_COLOR[result]}`,borderTop:`2px solid ${modeColorOf(match.mode)}66`,borderRadius:12,marginBottom:7,overflow:"hidden"}}>
                    <div style={{padding:"12px 13px",display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:32,height:32,borderRadius:7,background:`${RESULT_COLOR[result]}22`,border:`1px solid ${RESULT_COLOR[result]}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:900,color:RESULT_COLOR[result],flexShrink:0}}>{RESULT_LABEL[result]}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"baseline",gap:5,marginBottom:2,flexWrap:"wrap"}}>
                          <span style={{fontSize:13,fontWeight:700,color:"#E8F8E8"}}>{match.myTeam}</span>
                          <span style={{fontSize:16,fontWeight:900,color:RESULT_COLOR[result],letterSpacing:-1}}>{match.myScore} – {match.opponentScore}</span>
                          <span style={{fontSize:12,color:"#7A9A7A"}}>{match.opponent}</span>
                        </div>
                        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                          <span style={{fontSize:10,color:"#557055"}}>{match.date}</span>
                          <span style={{fontSize:9,background:"#0D2A14",color:"#5A8A5A",padding:"2px 5px",borderRadius:4,border:"1px solid #1A4020"}}>{seasonOf(match.date)}</span>
                          <span style={{fontSize:9,fontWeight:700,background:`${modeColorOf(match.mode)}1E`,color:modeColorOf(match.mode),border:`1px solid ${modeColorOf(match.mode)}55`,padding:"2px 6px",borderRadius:4}}>{modeLabel}</span>

                        </div>
                      </div>
                      <div style={{display:"flex",gap:4,flexShrink:0}}>
                        {(sf.length>0||subf.length>0||scf.length>0)&&(
                          <button onClick={()=>setExpandedMatchId(isExp?null:match.id)} style={{background:isExp?"#1E4028":"#0D1F10",border:"1px solid #2A4A30",color:isExp?"#C8F135":"#557055",borderRadius:7,padding:"4px 7px",fontSize:10,fontWeight:700}}>

                        <button onClick={()=>setMatches(prev=>prev.filter(m=>m.id!==match.id))} style={{background:"transparent",border:"none",color:"#3A5040",fontSize:14,padding:"3px 4px"}}>✕</button>
                      </div>
                    </div>
                    {isExp&&(
                      <div style={{borderTop:"1px solid #1A3320",padding:"11px 13px",background:"#091510"}}>
                        {scf.length>0&&<div style={{marginBottom:10}}>

                          <div style={{display:"flex",flexDirection:"column",gap:4}}>
                            {scf.map((sc,i)=>(
                              <div key={i} style={{background:"#1A2E18",border:"1px solid #2A4A22",borderRadius:6,padding:"5px 9px",fontSize:11,display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                                <span style={{color:"#FFB830"}}>⚽</span>
                                <span onClick={()=>setProfilePlayer(sc.name)} style={{color:"#E8F8E8",fontWeight:700,cursor:"pointer",textDecoration:"underline",textDecorationColor:"#2A5030"}}>{sc.name}</span>
                                {GT[sc.type]&&<span style={{fontSize:9,color:"#C8F135",background:"#0D2010",borderRadius:3,padding:"1px 4px"}}>{GT[sc.type]}</span>}
                                {sc.minute&&<span style={{fontSize:9,color:"#557055"}}>{sc.minute}'</span>}
                                {sc.assist&&<><span style={{color:"#3A6040",fontSize:10}}>→</span><span style={{color:"#66CCFF",fontSize:10}}>🅰 {sc.assist}</span></>}
                              </div>
                            ))}
                          </div>
                        </div>}
                        {sf.length>0&&<div style={{marginBottom:10}}>
                          <SecTitle>🟢 スタメン</SecTitle>
                          <FormationPitch starting={sf} ratings={match.ratings||{}} subs={subf} photoMap={photoMap} scorers={scf} cardsMap={match.cards||{}} onPlayerClick={setProfilePlayer} />
                        </div>}
                        {subf.length>0&&<div>
                          <SecTitle color="#FFD066">🔄 交代</SecTitle>
                          {subf.map((s,i)=>{
                            const rv = match.ratings?.[s.name];
                            const rs = parseFloat(rv);
                            const rc2 = ratingColorOf(rs);
                            return (
                              <div key={i} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,marginBottom:3}}>
                                {s.minute&&<span style={{fontSize:10,color:"#557055",minWidth:22}}>{s.minute}'</span>}
                                <span onClick={()=>setProfilePlayer(s.name)} style={{color:"#C8F135",fontWeight:600,cursor:"pointer",textDecoration:"underline",textDecorationColor:"#2A5030"}}>↑ {s.name}</span>

                              </div>

                          })}

                        {match.ratings&&Object.keys(match.ratings).filter(k=>match.ratings[k]!=="").length>0&&<div style={{marginTop:10}}>
                          <SecTitle color="#A78BFA">⭐ 選手評価</SecTitle>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 10px"}}>
                            {Object.entries(match.ratings).filter(([,v])=>v!=="").sort((a,b)=>b[1]-a[1]).map(([name,score])=>{
                              const s=parseFloat(score);
                              const rc=s>=8?"#C8F135":s>=6?"#FFD066":s>=4?"#FF9966":"#FF5C5C";
                              return (
                                <div key={name} style={{display:"flex",alignItems:"center",gap:5,fontSize:11}}>
                                  <span style={{flex:1,color:"#D0E8D0"}}>{name}</span>

                                    {[...Array(10)].map((_,i)=>{
                                      const full=i+1<=Math.floor(s);
                                      const half=i+1===Math.ceil(s)&&s%1!==0;
                                      return <div key={i} style={{width:6,height:6,borderRadius:"50%",background:full?rc:half?`linear-gradient(90deg,${rc} 50%,#1A3320 50%)`:"#1A3320"}} />;

                                </div>

                          </div>
                        </div>}
                        {match.note&&<div style={{marginTop:9,fontSize:11,color:"#557055",borderTop:"1px solid #1A3320",paddingTop:7}}>📝 {match.note}</div>}
                      </div>

                  </div>

              </button>

              </button>

                  <button key={m} onClick={()=>setPlayerMode(m)} style={{flexShrink:0,display:"flex",alignItems:"center",gap:5,background:active?`${mc}22`:"#122018",color:active?mc:"#557055",border:"1px solid",borderColor:active?mc:"#1F4025",borderRadius:8,padding:"5px 11px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>
                    <span style={{width:7,height:7,borderRadius:"50%",background:mc,flexShrink:0}} />

            {[["goals","⚽ 得点"],["assists","🅰 アシ"],["apps","出場"],["minutes","⏱ 時間"],["rating","⭐ 評価"]].map(([k,l])=>(
              <button key={k} onClick={()=>setPlayerSort(k)} style={{flex:1,background:playerSort===k?"#1E4028":"#122018",color:playerSort===k?"#C8F135":"#557055",border:"1px solid",borderColor:playerSort===k?"#2A5030":"#1F4025",borderRadius:7,padding:"6px 2px",fontSize:10,fontWeight:700}}>
                {l}
              </button>
            ))}
          </div>

          {/* stats table */}
          <div style={{background:"#0D1F10",border:"1px solid #1F4025",borderRadius:12,padding:"12px 12px",marginTop:10}}>
            <div style={{fontSize:10,color:"#7A9A7A",letterSpacing:2,marginBottom:9,textTransform:"uppercase"}}>
              {playerSeason==="all" ? "歴代選手成績（通算）" : `選手成績（${playerSeason}）`}
              {playerMode!=="all" && <span style={{color:modeColorOf(playerMode)}}> / {MODE_LABELS[playerMode]||playerMode}</span>}
            </div>
            {playerStats.length === 0
              ? <div style={{textAlign:"center",padding:"30px 0",color:"#3A6040",fontSize:13}}>記録がありません</div>
              : (<>
                <div style={{display:"flex",fontSize:9,color:"#557055",paddingBottom:5,borderBottom:"1px solid #1A3320",marginBottom:4,gap:2}}>
                  <span style={{width:16}}></span>
                  <span style={{flex:1.5}}>選手</span>
                  <span style={{flex:.8,textAlign:"center"}}>出場</span>
                  <span style={{flex:.9,textAlign:"center"}}>分</span>

                  <span style={{flex:.6,textAlign:"center"}}>🅰</span>
                  <span style={{flex:.5,textAlign:"center"}}>🟨</span>
                  <span style={{flex:.5,textAlign:"center"}}>🟥</span>
                  <span style={{flex:.8,textAlign:"right"}}>評価</span>
                </div>
                {playerStats.map((p, i)=>{
                  const inRoster = activeRoster.some(r => r.name === p.name);
                  const avg = p.avgRating;

                    <div key={p.name} onClick={()=>setProfilePlayer(p.name)} style={{display:"flex",alignItems:"center",fontSize:11,padding:"6px 0",borderBottom:"1px solid #122518",gap:2,cursor:"pointer"}}>

                          : <span style={{width:20,height:20,borderRadius:"50%",background:"#1A3320",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#557055",flexShrink:0}}>{p.name[0]}</span>}
                        <span style={{fontWeight:700,color:inRoster?"#E8F8E8":"#7A8A7A",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</span>

              </>)
            }
          </div>
        </>)}

        {/* ══════════════════════ ROSTER TAB ═══════════════════════════════ */}
        {mainTab === "roster" && (<>
          {/* add player form */}
          {showAddPlayer&&(
            <div style={{background:"#122018",border:"1px solid #2A4A30",borderRadius:13,padding:15,marginTop:12,animation:"slideDown .25s ease-out"}}>
              <SecTitle>+ 選手を手動追加</SecTitle>
              {/* 顔写真（丸枠） */}

                <label style={{cursor:"pointer",position:"relative",display:"block"}}>
                  <input type="file" accept="image/*" style={{display:"none"}}
                    onChange={e=>{handleNewPlayerPhoto(e.target.files?.[0]); e.target.value="";}} />
                  {newPlayer.photo ? (
                    <img src={newPlayer.photo} alt="顔写真" style={{width:72,height:72,borderRadius:"50%",objectFit:"cover",border:"3px solid #C8F135",display:"block"}} />
                  ) : (
                    <div style={{width:72,height:72,borderRadius:"50%",background:"#0D1F10",border:"2px dashed #3A5040",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
                      <span style={{fontSize:20}}>📷</span>
                      <span style={{fontSize:8,color:"#557055"}}>写真追加</span>
                    </div>
                  )}
                  {newPlayer.photo && (
                    <div style={{position:"absolute",bottom:0,right:0,background:"#C8F135",borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,border:"2px solid #122018"}}>✏️</div>

                </label>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>

                <div><Label>背番号</Label><input type="number" min="1" max="99" placeholder="10" value={newPlayer.number} onChange={e=>setNewPlayer(p=>({...p,number:e.target.value}))} /></div>
              </div>
              <div style={{marginBottom:10}}><Label>ポジション</Label>
                <select value={newPlayer.position} onChange={e=>setNewPlayer(p=>({...p,position:e.target.value}))}>
                  {ALL_POSITIONS.map(pos=><option key={pos} value={pos}>{pos}</option>)}
                </select>
              </div>
              <button onClick={addPlayerManually} disabled={!newPlayer.name} style={{width:"100%",background:"#C8F135",color:"#0A1A0C",border:"none",borderRadius:9,padding:10,fontWeight:800,fontSize:13,opacity:newPlayer.name?.8:.3}}>
                ロースターに追加
              </button>
            </div>
          )}

          {/* position filter */}
          <div style={{display:"flex",gap:5,marginTop:12}}>
            {[["ALL","全員"],["GK","GK"],["DF","DF"],["MF","MF"],["FW","FW"]].map(([k,l])=>(
              <button key={k} onClick={()=>setRosterPosFilter(k)} style={{flex:1,background:rosterPosFilter===k?"#C8F135":"#122018",color:rosterPosFilter===k?"#0A1A0C":"#7A9A7A",border:"1px solid",borderColor:rosterPosFilter===k?"#C8F135":"#1F4025",borderRadius:7,padding:"7px 2px",fontSize:11,fontWeight:700}}>
                {l}
              </button>
            ))}
          </div>

          {/* roster cards */}
          <div style={{marginTop:10}}>
            {filteredRoster.length===0
              ? <div style={{textAlign:"center",padding:"40px 0",color:"#3A6040",fontSize:13}}>在籍選手がいません</div>
              : filteredRoster.map(player=>{
                const g=posGroup(player.position);
                const gColor={GK:"#66CCFF",DF:"#C8F135",MF:"#FFD066",FW:"#FF9966"}[g]||"#aaa";
                return (
                  <div key={player.id} style={{background:"#0E1E10",border:"1px solid #1A3320",borderLeft:`3px solid ${gColor}`,borderRadius:11,padding:"11px 13px",marginBottom:6,display:"flex",alignItems:"center",gap:10}}>
                    <label style={{cursor:"pointer",flexShrink:0,position:"relative",display:"block"}} title="タップで顔写真を設定">
                      <input type="file" accept="image/*" style={{display:"none"}}
                        onChange={e=>{handleRosterPhotoChange(player.id, e.target.files?.[0]); e.target.value="";}} />
                      {player.photo ? (
                        <img src={player.photo} alt={player.name} style={{width:38,height:38,borderRadius:"50%",objectFit:"cover",border:`2px solid ${gColor}88`,display:"block"}} />

                        <div style={{width:38,height:38,borderRadius:"50%",background:`${gColor}22`,border:`1px dashed ${gColor}55`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>

                            ? <span style={{fontSize:12,fontWeight:900,color:gColor}}>{player.number}</span>

                      )}
                    </label>
                    <div style={{flex:1,minWidth:0}}>
                      <div onClick={()=>setProfilePlayer(player.name)} style={{fontSize:14,fontWeight:700,color:"#E8F8E8",marginBottom:2,cursor:"pointer"}}>{player.name}</div>
                      <div style={{display:"flex",gap:5,alignItems:"center"}}>
                        <span style={{fontSize:10,fontWeight:700,color:gColor,background:`${gColor}18`,border:`1px solid ${gColor}33`,borderRadius:4,padding:"1px 5px"}}>{posNorm(player.position)}</span>
                        <span style={{fontSize:9,color:"#557055",background:"#1A3320",borderRadius:3,padding:"1px 5px"}}>{POS_GROUP_LABEL[g]}</span>
                      </div>
                    </div>
                    <button onClick={()=>removeFromRoster(player.id)} title="放出" style={{background:"transparent",border:"1px solid #3A4A30",color:"#557055",borderRadius:6,padding:"4px 7px",fontSize:11}}>放出</button>
                  </div>
                );
              })
            }
          </div>

          {/* summary */}
          <div style={{background:"#0D1F10",border:"1px solid #1F4025",borderRadius:11,padding:"12px 14px",marginTop:12}}>
            <SecTitle>ロースター構成</SecTitle>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
              {["GK","DF","MF","FW"].map(g=>{
                const count={GK:activeRoster.filter(p=>posGroup(p.position)==="GK").length,DF:activeRoster.filter(p=>posGroup(p.position)==="DF").length,MF:activeRoster.filter(p=>posGroup(p.position)==="MF").length,FW:activeRoster.filter(p=>posGroup(p.position)==="FW").length}[g];
                const c={GK:"#66CCFF",DF:"#C8F135",MF:"#FFD066",FW:"#FF9966"}[g];
                return (
                  <div key={g} style={{background:"#0A1A0C",borderRadius:8,padding:"9px 5px",textAlign:"center"}}>
                    <div style={{fontSize:20,fontWeight:900,color:c,lineHeight:1}}>{count}</div>
                    <div style={{fontSize:10,color:"#557055",marginTop:2}}>{g}</div>
                  </div>
                );
              })}
            </div>
            <div style={{marginTop:8,fontSize:11,color:"#557055",textAlign:"center"}}>
              合計 <span style={{color:"#C8F135",fontWeight:700}}>{activeRoster.length}</span> 人在籍
            </div>
          </div>
        </>)}

        {/* ══════════════════════ TRANSFERS TAB ════════════════════════════ */}
        {mainTab === "transfers" && (<>

          {/* season selector */}
          {transferSeasons.length > 0 && (
            <div style={{display:"flex",gap:6,marginTop:12,overflowX:"auto",paddingBottom:2}}>
              <button onClick={()=>setTransferSeason("all")} style={{flexShrink:0,background:transferSeason==="all"?"#C8F135":"#122018",color:transferSeason==="all"?"#0A1A0C":"#7A9A7A",border:"1px solid",borderColor:transferSeason==="all"?"#C8F135":"#1F4025",borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>
                通算
              </button>
              {transferSeasons.map(s=>(
                <button key={s} onClick={()=>setTransferSeason(s)} style={{flexShrink:0,background:transferSeason===s?"#C8F135":"#122018",color:transferSeason===s?"#0A1A0C":"#7A9A7A",border:"1px solid",borderColor:transferSeason===s?"#C8F135":"#1F4025",borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>
                  {s}
                </button>
              ))}
            </div>
          )}

          {/* transfer form */}
          {showTransferForm&&(
            <div style={{background:"#122018",border:"1px solid #2A4A30",borderRadius:13,padding:15,marginTop:12,animation:"slideDown .25s ease-out"}}>
              <SecTitle color="#C8F135">{editTransferId?"✏️ 移籍情報を編集":"+ 移籍情報を追加"}</SecTitle>
              {/* 加入・ローン入・育成昇格は顔写真を登録可能 */}
              {(tfForm.type==="in"||tfForm.type==="loan_in"||tfForm.type==="youth") && (
                <div style={{display:"flex",justifyContent:"center",marginBottom:12}}>
                  <label style={{cursor:"pointer",position:"relative",display:"block"}}>
                    <input type="file" accept="image/*" style={{display:"none"}}
                      onChange={e=>{handleTfPhoto(e.target.files?.[0]); e.target.value="";}} />
                    {tfForm.photo ? (
                      <img src={tfForm.photo} alt="顔写真" style={{width:72,height:72,borderRadius:"50%",objectFit:"cover",border:"3px solid #C8F135",display:"block"}} />
                    ) : (
                      <div style={{width:72,height:72,borderRadius:"50%",background:"#0D1F10",border:"2px dashed #3A5040",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
                        <span style={{fontSize:20}}>📷</span>
                        <span style={{fontSize:8,color:"#557055"}}>顔写真</span>
                      </div>
                    )}
                    {tfForm.photo && (
                      <div style={{position:"absolute",bottom:0,right:0,background:"#C8F135",borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,border:"2px solid #122018"}}>✏️</div>
                    )}
                  </label>
                </div>
              )}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                <div><Label>日付</Label><input type="date" value={tfForm.date} onChange={e=>setTfForm(f=>({...f,date:e.target.value}))} /></div>
                <div><Label>移籍タイプ</Label>
                  <select value={tfForm.type} onChange={e=>setTfForm(f=>({...f,type:e.target.value}))}>
                    <option value="in">加入</option><option value="out">放出</option>
                    <option value="loan_in">ローン（入）</option><option value="loan_out">ローン（出）</option>
                    <option value="youth">育成チーム昇格</option>
                  </select>
                </div>
              </div>
              <div style={{marginBottom:8}}><Label>選手名</Label>
                {(tfForm.type==="out"||tfForm.type==="loan_out") && allPlayerNames.length>0 ? (
                  <select value={tfForm.playerName} onChange={e=>setTfForm(f=>({...f,playerName:e.target.value}))}>
                    <option value="">選手を選択</option>
                    {allPlayerNames.map(n=><option key={n} value={n}>{n}</option>)}
                  </select>
                ) : (
                  <input type="text" placeholder="例: 三笘薫" value={tfForm.playerName} onChange={e=>setTfForm(f=>({...f,playerName:e.target.value}))} />
                )}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                <div><Label>ポジション</Label>
                  <select value={tfForm.position} onChange={e=>setTfForm(f=>({...f,position:e.target.value}))}>
                    {ALL_POSITIONS.map(p=><option key={p} value={p}>{p}</option>)}
                  </select>
                </div>
                <div><Label>移籍金（任意）</Label><input type="text" placeholder={tfForm.type==="youth"?"−（昇格は通常なし）":"例: €25M"} value={tfForm.fee} onChange={e=>setTfForm(f=>({...f,fee:e.target.value}))} disabled={tfForm.type==="youth"} style={tfForm.type==="youth"?{opacity:.4}:{}} /></div>
              </div>
              {tfForm.type !== "youth" ? (
                <div style={{marginBottom:8}}><Label>{tfForm.type==="in"||tfForm.type==="loan_in"?"前所属クラブ":"移籍先クラブ"}</Label>
                  <input type="text" placeholder="例: ブライトン" value={tfForm.fromTo} onChange={e=>setTfForm(f=>({...f,fromTo:e.target.value}))} />
                </div>
              ) : (
                <div style={{marginBottom:8}}><Label>出身（任意）</Label>
                  <input type="text" placeholder="例: U-18、ユースアカデミー" value={tfForm.fromTo} onChange={e=>setTfForm(f=>({...f,fromTo:e.target.value}))} />
                </div>
              )}
              <div style={{marginBottom:12}}><Label>メモ（任意）</Label><textarea placeholder="メモ..." value={tfForm.note} onChange={e=>setTfForm(f=>({...f,note:e.target.value}))} style={{resize:"vertical",minHeight:44}} /></div>
              <button onClick={handleTransferSubmit} disabled={!tfForm.playerName} style={{width:"100%",background:"#C8F135",color:"#0A1A0C",border:"none",borderRadius:9,padding:10,fontWeight:800,fontSize:13,opacity:tfForm.playerName?.8:.3}}>
                {editTransferId?"更新する":"移籍を記録してロースターに反映"}
              </button>
            </div>
          )}

          {/* transfer list */}
          <div style={{marginTop:12}}>
            {sortedTransfers.length===0
              ? <div style={{textAlign:"center",padding:"40px 0",color:"#3A6040",fontSize:13}}>移籍情報がありません</div>
              : sortedTransfers.map(tf=>{
                const tc=TRANSFER_COLOR[tf.type]||"#aaa";
                return (
                  <div key={tf.id} style={{background:"#0E1E10",border:"1px solid #1A3320",borderLeft:`3px solid ${tc}`,borderRadius:11,padding:"11px 13px",marginBottom:7}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:34,height:34,borderRadius:7,background:`${tc}22`,border:`1px solid ${tc}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:tc,flexShrink:0}}>
                        {TRANSFER_TYPES[tf.type]}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:14,fontWeight:700,color:"#E8F8E8",marginBottom:2}}>
                          {tf.playerName}
                          <span style={{fontSize:9,fontWeight:700,color:tc,background:`${tc}18`,borderRadius:4,padding:"2px 5px",marginLeft:6}}>{tf.position}</span>
                        </div>
                        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",fontSize:10,color:"#557055"}}>
                          <span>{tf.date}</span>
                          <span style={{fontSize:9,background:"#0D2A14",color:"#5A8A5A",padding:"1px 5px",borderRadius:4,border:"1px solid #1A4020"}}>{seasonOf(tf.date)}</span>
                          {tf.fromTo&&<span style={{color:"#7A9A7A"}}>{tf.type==="out"||tf.type==="loan_out"?"→":"←"} {tf.fromTo}</span>}
                          {tf.type==="youth"&&!tf.fromTo&&<span style={{color:"#A78BFA"}}>🎓 育成チームから昇格</span>}
                          {tf.fee&&<span style={{color:"#FFB830"}}>{parseFee(tf.fee)?formatFee(parseFee(tf.fee)):tf.fee}</span>}
                        </div>
                        {tf.note&&<div style={{fontSize:10,color:"#557055",marginTop:3}}>📝 {tf.note}</div>}
                      </div>
                      <div style={{display:"flex",gap:4,flexShrink:0}}>
                        <button onClick={()=>startEditTransfer(tf)} style={{background:"transparent",border:"1px solid #2A4A30",color:"#7A9A7A",borderRadius:6,padding:"4px 7px",fontSize:10}}>✏️</button>
                        <button onClick={()=>deleteTransfer(tf.id)} style={{background:"transparent",border:"none",color:"#3A5040",fontSize:14,padding:"3px 4px"}}>✕</button>
                      </div>
                    </div>
                  </div>
                );
              })
            }
          </div>

          {/* 移籍収支 */}
          <div style={{background:"linear-gradient(135deg,#122018,#0E1A10)",border:"1px solid #1F4025",borderRadius:11,padding:"12px 14px",marginTop:12}}>
            <SecTitle color="#FFB830">€ 移籍収支{transferSeason==="all"?"（通算）":`（${transferSeason}）`}</SecTitle>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:(transferSeason==="all"&&feeBalance.bySeason.length>1)?10:0}}>
              <div style={{background:"#0A1A0C",borderRadius:8,padding:"9px 8px",textAlign:"center"}}>
                <div style={{fontSize:9,color:"#557055",marginBottom:3}}>支出</div>
                <div style={{fontSize:14,fontWeight:900,color:"#FF5C5C"}}>{formatFee(feeBalance.total.spent)}</div>
              </div>
              <div style={{background:"#0A1A0C",borderRadius:8,padding:"9px 8px",textAlign:"center"}}>
                <div style={{fontSize:9,color:"#557055",marginBottom:3}}>収入</div>
                <div style={{fontSize:14,fontWeight:900,color:"#C8F135"}}>{formatFee(feeBalance.total.earned)}</div>
              </div>
              <div style={{background:"#0A1A0C",borderRadius:8,padding:"9px 8px",textAlign:"center",border:`1px solid ${feeBalance.total.net>=0?"#2A5030":"#502A2A"}`}}>
                <div style={{fontSize:9,color:"#557055",marginBottom:3}}>収支</div>
                <div style={{fontSize:14,fontWeight:900,color:feeBalance.total.net>=0?"#C8F135":"#FF5C5C"}}>
                  {feeBalance.total.net>0?"+":""}{formatFee(feeBalance.total.net)}
                </div>
              </div>
            </div>
            {/* シーズン別収支 */}
            {transferSeason==="all" && feeBalance.bySeason.length > 1 && (<>
              <div style={{display:"flex",fontSize:9,color:"#557055",paddingBottom:4,borderBottom:"1px solid #1A3320",marginBottom:4}}>
                <span style={{flex:1.2}}>シーズン</span>
                <span style={{flex:1,textAlign:"right"}}>支出</span>
                <span style={{flex:1,textAlign:"right"}}>収入</span>
                <span style={{flex:1,textAlign:"right"}}>収支</span>
              </div>
              {feeBalance.bySeason.map(fb=>(
                <div key={fb.season} style={{display:"flex",fontSize:11,padding:"5px 0",borderBottom:"1px solid #122518",alignItems:"center"}}>
                  <span style={{flex:1.2,fontWeight:700,color:"#C8F135"}}>{fb.season}</span>
                  <span style={{flex:1,textAlign:"right",color:"#FF8080"}}>{fb.spent?formatFee(fb.spent):"−"}</span>
                  <span style={{flex:1,textAlign:"right",color:"#A0D880"}}>{fb.earned?formatFee(fb.earned):"−"}</span>
                  <span style={{flex:1,textAlign:"right",fontWeight:800,color:fb.net>=0?"#C8F135":"#FF5C5C"}}>{fb.net>0?"+":""}{formatFee(fb.net)}</span>
                </div>
              ))}
            </>)}
            <div style={{fontSize:9,color:"#3A5040",marginTop:7}}>※「€25M」「25M」「500K」のような表記の移籍金を自動計算します（M=百万, K=千）。育成昇格は対象外です。</div>
          </div>

          {/* summary */}
          <div style={{background:"#0D1F10",border:"1px solid #1F4025",borderRadius:11,padding:"12px 14px",marginTop:12}}>
            <SecTitle>移籍サマリー{transferSeason!=="all"&&`（${transferSeason}）`}</SecTitle>
            <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:6}}>
              {[["in","加入"],["out","放出"],["loan_in","ローン入"],["loan_out","ローン出"],["youth","育成昇格"]].map(([type,label])=>{
                const count=scopedTransfers.filter(t=>t.type===type).length;
                const c=TRANSFER_COLOR[type];
                return (
                  <div key={type} style={{background:"#0A1A0C",borderRadius:8,padding:"9px 11px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:11,color:"#557055"}}>{label}</span>
                    <span style={{fontSize:18,fontWeight:900,color:c}}>{count}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </>)}

      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<SoccerTracker />);
</script>
</body>
</html>
