<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect, useRef } = React;

// ─── constants ────────────────────────────────────────────────────────────────
function getResult(my, opp) {
  if (my > opp) return "win";
  if (my < opp) return "loss";
  return "draw";
}
const RESULT_LABEL = { win: "勝", loss: "負", draw: "分" };

// シーズン判定（7月1日起点）: 2025-06-01 → "2024-25", 2025-07-01 → "2025-26"
// 生年月日(birth)と基準日(ref)から満年齢を計算
function ageAt(birth, ref) {
  if (!birth || !ref) return null;
  const b = new Date(birth), r = new Date(ref);
  if (isNaN(b) || isNaN(r)) return null;
  let age = r.getFullYear() - b.getFullYear();
  const m = r.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && r.getDate() < b.getDate())) age--;
  return age >= 0 && age < 120 ? age : null;
}

// 市場価値の更新窓（夏: 7/1-8/1、冬: 1/1-2/1）を判定。該当すれば窓キー（例 "2025-summer"）を返す
function marketWindowOf(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  if (isNaN(d)) return null;
  const y = d.getFullYear(), m = d.getMonth(), day = d.getDate();
  // 7/1〜8/1（8/1当日含む）
  if ((m === 6) || (m === 7 && day === 1)) return `${y}-summer`;
  // 1/1〜2/1（2/1当日含む）
  if ((m === 0) || (m === 1 && day === 1)) return `${y}-winter`;
  return null;
}
function marketWindowLabel(key) {
  if (!key) return "";
  const [y, s] = key.split("-");
  return `${y}年 ${s === "summer" ? "夏" : "冬"}`;
}

// 指定日にその選手が負傷中か判定（負傷日〜復帰日。復帰日が空なら以降ずっと負傷中）
function isInjuredOn(player, dateStr) {
  if (!player || !player.injuredFrom) return false;
  if (!dateStr) dateStr = new Date().toISOString().split("T")[0];
  if (dateStr < player.injuredFrom) return false;
  if (player.injuredUntil && dateStr >= player.injuredUntil) return false;
  return true;
}

function seasonOf(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return "不明";
  const y = d.getFullYear();
  const startYear = d.getMonth() + 1 >= 7 ? y : y - 1;
  return `${startYear}-${String((startYear + 1) % 100).padStart(2, "0")}`;
}

// 現在の日付が属するシーズンの開始日（7/1）を返す
function currentSeasonStart(today = new Date()) {
  const y = today.getFullYear();
  const startYear = today.getMonth() + 1 >= 7 ? y : y - 1;
  return `${startYear}-07-01`;
}

// 日付文字列に日数を加算（タイムゾーンに依存しない）
function addDays(dateStr, n) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  dt.setDate(dt.getDate() + n);
  const yy = dt.getFullYear();
  const mm = String(dt.getMonth() + 1).padStart(2, "0");
  const dd = String(dt.getDate()).padStart(2, "0");
  return `${yy}-${mm}-${dd}`;
}

// 移籍金テキストを€に変換（例: "€2M"/"2M"→2,000,000 / "500K"→500,000 / "1.5M"→1,500,000）
function parseFee(str) {
  if (!str) return 0;
  let s = String(str).replace(/[,€\s]/gi, "");
  const m = s.match(/([\d.]+)\s*M/i);
  if (m) return parseFloat(m[1]) * 1e6;
  const k = s.match(/([\d.]+)\s*K/i);
  if (k) return parseFloat(k[1]) * 1e3;
  const b = s.match(/([\d.]+)\s*B/i);
  if (b) return parseFloat(b[1]) * 1e9;
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

// €を「€XM / €XK」表記に整形（小数第1位まで・末尾0は省略）
function formatFee(eur) {
  if (!eur) return "€0";
  const sign = eur < 0 ? "−" : "";
  const v = Math.abs(eur);
  const fmt = (n) => {
    const r = Math.round(n * 10) / 10;
    return r % 1 === 0 ? String(Math.round(r)) : String(r);
  };
  if (v >= 1e9) return `${sign}€${fmt(v / 1e9)}B`;
  if (v >= 1e6) return `${sign}€${fmt(v / 1e6)}M`;
  if (v >= 1e3) return `${sign}€${fmt(v / 1e3)}K`;
  return `${sign}€${Math.round(v)}`;
}

// 試合配列から成績を集計
function calcStats(list) {
  const wins   = list.filter(m => getResult(m.myScore, m.opponentScore) === "win").length;
  const losses = list.filter(m => getResult(m.myScore, m.opponentScore) === "loss").length;
  const draws  = list.filter(m => getResult(m.myScore, m.opponentScore) === "draw").length;
  const gf = list.reduce((s, m) => s + m.myScore, 0);
  const ga = list.reduce((s, m) => s + m.opponentScore, 0);
  return { total: list.length, wins, losses, draws, gf, ga };
}

// 出場チーム数（2,4,8,16,32,64）から、トーナメントのラウンド構成を生成
// 返り値: ラウンドキーの配列（決勝に近い順とは逆。最初の対戦から）
const ROUND_BY_TEAMS = { 64: "r64", 32: "r32", 16: "r16", 8: "qf", 4: "sf", 2: "final" };
function bracketRoundsFor(teamCount) {
  // teamCount は 2 の累乗を想定
  const seq = [];
  let n = teamCount;
  while (n >= 2) {
    if (ROUND_BY_TEAMS[n]) seq.push(ROUND_BY_TEAMS[n]);
    n = n / 2;
  }
  return seq; // 例: 8チーム → ["qf","sf","final"]
}
// 空のトーナメント構造を生成: { rounds:[{key,label,matches:[{slot,teamA,teamB,scoreA,scoreB}]}], thirdPlace?:{...} }
function createEmptyBracket(teamCount, withThird = false, legsByRound = {}) {
  const roundKeys = bracketRoundsFor(teamCount);
  const rounds = roundKeys.map((key, ri) => {
    const numMatches = teamCount / Math.pow(2, ri + 1);
    const legs = legsByRound[key] || 1; // 1=一発勝負, 2=ホーム&アウェイ
    return {
      key, label: roundLabel(key), legs,
      matches: Array.from({ length: numMatches }, (_, s) => ({ slot: s, teamA: "", teamB: "", scoreA: "", scoreB: "", scoreA2: "", scoreB2: "" })),
    };
  });
  const bracket = { teamCount, rounds };
  if (withThird) bracket.thirdPlace = { teamA: "", teamB: "", scoreA: "", scoreB: "" };
  return bracket;
}
// トーナメント1試合の勝者を返す（legs=2なら2試合合計）
function bracketWinner(m, legs = 1) {
  if (!m.teamA || !m.teamB) return "";
  if (legs === 2) {
    // 2試合制: 合計得点で判定
    if (m.scoreA === "" || m.scoreB === "" || m.scoreA2 === "" || m.scoreB2 === "") return "";
    const aggA = parseInt(m.scoreA) + parseInt(m.scoreA2);
    const aggB = parseInt(m.scoreB) + parseInt(m.scoreB2);
    if (aggA > aggB) return m.teamA;
    if (aggB > aggA) return m.teamB;
    if (m.winner) return m.winner; // 合計同点はPK等
    return "";
  }
  if (m.scoreA !== "" && m.scoreB !== "") {
    const a = parseInt(m.scoreA), b = parseInt(m.scoreB);
    if (a > b) return m.teamA;
    if (b > a) return m.teamB;
    if (m.winner) return m.winner;
  }
  return "";
}

// 指定した試合群から 4-3-3 のベストイレブンを選出（ポジション別に平均評価上位）
// 返り値: { GK:[1名], DF:[4名], MF:[3名], FW:[3名], allRated:bool }
function computeBestEleven(matchList, rosterArr) {
  // 選手別に評価を集計
  const stat = {}; // name -> {sum, cnt}
  matchList.forEach(m => {
    Object.entries(m.ratings || {}).forEach(([name, v]) => {
      const n = parseFloat(v);
      if (isNaN(n)) return;
      if (!stat[name]) stat[name] = { sum: 0, cnt: 0 };
      stat[name].sum += n; stat[name].cnt++;
    });
  });
  const posOfName = {};
  rosterArr.forEach(p => { posOfName[p.name] = p.position; });
  // 評価のある選手を {name, avg, group} 化
  const players = Object.entries(stat).map(([name, s]) => ({
    name, avg: s.sum / s.cnt, cnt: s.cnt,
    group: posOfName[name] ? posGroup(posOfName[name]) : "MF",
  }));
  const pick = (grp, n) => players.filter(p => p.group === grp).sort((a, b) => b.avg - a.avg).slice(0, n);
  return {
    GK: pick("GK", 1),
    DF: pick("DF", 4),
    MF: pick("MF", 3),
    FW: pick("FW", 3),
    count: players.length,
  };
}

function posGroup(pos) {
  const p = posNorm(pos);
  for (const [g, list] of Object.entries(POS_GROUPS)) if (list.includes(p)) return g;
  return "MF";
}

const RATING_COLORS = {
  1:  "#D32F2F", // 赤
  2:  "#E64A19", // 濃いオレンジ
  3:  "#F57C00", // オレンジ
  4:  "#FFA726", // 明るいオレンジ
  5:  "#FFD93B", // 黄
  6:  "#D4E157", // 黄緑
  7:  "#9CCC65", // ライトグリーン
  8:  "#66DD6A", // 緑
  9:  "#26C6A6", // ティール
  10: "#4FC3F7", // スカイブルー（最高評価）
};
function ratingColorOf(s) {
  if (isNaN(s)) return null;
  const step = Math.min(10, Math.max(1, Math.floor(s)));
  return RATING_COLORS[step];
}

// 画像を正方形クロップ＆縮小して dataURL を返す（顔写真用）
function resizePhotoToDataURL(file, size = 96) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext("2d");
        // cover crop: 中央の正方形を切り出す
        const side = Math.min(img.width, img.height);
        const sx = (img.width - side) / 2;
        const sy = (img.height - side) / 2;
        ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
        resolve(canvas.toDataURL("image/jpeg", 0.82));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// エンブレム用: 周囲の背景色（四隅から推定）を透明化し、ロゴ部分だけを残してPNG化
function resizeEmblemToDataURL(file, size = 160) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        // いったん元画像をそのままcanvasに描く（縦横比保持で収める）
        const canvas = document.createElement("canvas");
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext("2d");
        const scale = Math.min(size / img.width, size / img.height);
        const w = img.width * scale, h = img.height * scale;
        const dx = (size - w) / 2, dy = (size - h) / 2;
        ctx.drawImage(img, 0, 0, img.width, img.height, dx, dy, w, h);

        try {
          const imageData = ctx.getImageData(0, 0, size, size);
          const d = imageData.data;
          // 四隅の色の平均を「背景色」と推定
          const corners = [
            0, // 左上
            (size - 1) * 4, // 右上
            (size * (size - 1)) * 4, // 左下
            (size * size - 1) * 4, // 右下
          ];
          let br = 0, bg = 0, bb = 0;
          corners.forEach(i => { br += d[i]; bg += d[i+1]; bb += d[i+2]; });
          br /= 4; bg /= 4; bb /= 4;

          // 背景色に近いピクセルを透明化（しきい値で許容差を設定）
          const TH = 42; // 色の許容差（大きいほど多く消す）
          const TH2 = TH * TH * 3;
          for (let i = 0; i < d.length; i += 4) {
            const dr = d[i] - br, dg = d[i+1] - bg, db = d[i+2] - bb;
            const dist2 = dr*dr + dg*dg + db*db;
            if (dist2 < TH2) {
              d[i+3] = 0; // 完全透明
            } else if (dist2 < TH2 * 2.2) {
              // 境界はなだらかに（ジャギー軽減）
              d[i+3] = Math.round(d[i+3] * ((dist2 - TH2) / (TH2 * 1.2)));
            }
          }
          ctx.putImageData(imageData, 0, 0);
        } catch (e) {
          // getImageDataが使えない場合などはそのまま
        }
        resolve(canvas.toDataURL("image/png"));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function FormationPitch({ starting, ratings = {}, subs = [], photoMap = {}, youthMap = {}, countryMap = {}, infoMap = {}, pitchMode = "none", scorers = [], cardsMap = {}, onPlayerClick }) {
  // 得点・アシスト回数マップ
  const goalMap = {}, assistMap = {};
  scorers.forEach(sc => {
    if (sc.name && sc.type !== "og") goalMap[sc.name] = (goalMap[sc.name] || 0) + 1;
    if (sc.assist) assistMap[sc.assist] = (assistMap[sc.assist] || 0) + 1;
  });
  // 縦ライン別にグループ化（line 5=最前線 → 0=GK）し、各ライン内は 左→中央→右 に整列
  const lineMap = {};
  starting.forEach((p, idx) => {
    const line = POS_LINE[posNorm(p.pos)] ?? 3;
    if (!lineMap[line]) lineMap[line] = [];
    lineMap[line].push({ ...p, _idx: idx });
  });
  const rows = Object.keys(lineMap)
    .map(Number)
    .sort((a, b) => b - a) // 上＝最前線
    .map(line => ({
      line,
      players: lineMap[line].sort((a, b) => {
        const sa = POS_SIDE[posNorm(a.pos)] ?? 1;
        const sb = POS_SIDE[posNorm(b.pos)] ?? 1;
        return sa !== sb ? sa - sb : a._idx - b._idx; // 同サイドは入力順を維持
      }),
    }));

  // フォーメーション表記：GKを除き、後ろのラインから人数を並べる（例 4-2-3-1）
  const formation = Object.keys(lineMap)
    .map(Number)
    .filter(l => l > 0)
    .sort((a, b) => a - b)
    .map(l => lineMap[l].length)
    .join("-");

  const subOutMap = {};
  subs.forEach(s => { if (s.inFor && s.minute) subOutMap[s.inFor] = s.minute; });

  return (
    <div style={{
      background:"linear-gradient(180deg,#2E7D40 0%,#27713A 50%,#2E7D40 100%)",
      borderRadius:10, padding:"16px 8px 16px", position:"relative", overflow:"hidden",
      border:"1px solid #1A5028",
    }}>
      {/* ピッチの線 */}
      <div style={{position:"absolute",inset:0,pointerEvents:"none"}}>
        {/* 芝のストライプ */}
        {[...Array(5)].map((_,i)=>(
          <div key={i} style={{position:"absolute",left:0,right:0,top:`${i*20}%`,height:"10%",background:"rgba(255,255,255,.025)"}} />
        ))}
        {/* センターサークル（上端） */}
        <div style={{position:"absolute",top:-34,left:"50%",transform:"translateX(-50%)",width:90,height:68,border:"1.5px solid rgba(255,255,255,.25)",borderRadius:"50%"}} />
        {/* ペナルティエリア（下端） */}
        <div style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:"55%",height:42,border:"1.5px solid rgba(255,255,255,.25)",borderBottom:"none",borderRadius:"4px 4px 0 0"}} />
        <div style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:"26%",height:18,border:"1.5px solid rgba(255,255,255,.2)",borderBottom:"none",borderRadius:"3px 3px 0 0"}} />
      </div>
      {/* フォーメーション表記 */}
      {formation && (
        <div style={{position:"absolute",top:5,right:9,fontSize:10,fontWeight:800,color:"rgba(255,255,255,.65)",letterSpacing:1}}>
          {formation}
        </div>
      )}
      {/* 選手配置 */}
      <div style={{position:"relative",display:"flex",flexDirection:"column",gap:13}}>
        {rows.map(({ line, players: row }, ri) => {
          const left   = row.filter(p => (POS_SIDE[posNorm(p.pos)] ?? 1) === 0);
          const center = row.filter(p => (POS_SIDE[posNorm(p.pos)] ?? 1) === 1);
          const right  = row.filter(p => (POS_SIDE[posNorm(p.pos)] ?? 1) === 2);

          // サイド選手の縦オフセット（行間の4分の1 ≈ 18px）
          // LW/RW（最前線 line5）→ 4分の1だけ下へ
          // LB/RB（DFライン line1）→ 4分の1だけ上へ
          const QUARTER = 17;
          const sideOffset = line === 5 ? QUARTER : line === 1 ? -QUARTER : 0;

          const renderP = (p, pi, off = 0) => (
            <div key={pi} style={off ? {transform:`translateY(${off}px)`} : undefined}>
              <PitchPlayer player={p} rating={ratings[p.name] ?? ""} subOutMinute={subOutMap[p.name]} photo={photoMap[p.name]} goals={goalMap[p.name] || 0} assists={assistMap[p.name] || 0} cards={cardsMap[p.name] || { y: 0, r: 0 }} isYouth={!!youthMap[p.name]} country={countryMap[p.name]||""} pitchMode={pitchMode} infoText={infoMap[p.name]||""} onClick={onPlayerClick} />
            </div>
          );
          // サイドの選手がいる行は 左/中央/右 の3ゾーン。左右ゾーンを対称幅(flex:1)にして
          // 中央ゾーンが常に画面の真ん中に来るようにする（CAM等が中央からズレないように）
          // 中央選手が複数（2CB等）の場合は中央ゾーンを広げて間隔を確保する
          if (left.length > 0 || right.length > 0) {
            const centerStyle = center.length >= 2
              ? {flex:`0 1 ${Math.min(center.length * 26 + (center.length - 1) * 10, 78)}%`,display:"flex",justifyContent:"space-evenly"}
              : {flex:"0 0 auto",display:"flex",justifyContent:"center"};
            return (
              <div key={ri} style={{display:"flex",alignItems:"flex-start"}}>
                <div style={{flex:1,display:"flex",justifyContent:"flex-start",paddingLeft:2}}>
                  {left.map((p,pi)=>renderP(p,pi,sideOffset))}
                </div>
                <div style={centerStyle}>
                  {center.map((p,pi)=>renderP(p,pi,0))}
                </div>
                <div style={{flex:1,display:"flex",justifyContent:"flex-end",paddingRight:2}}>
                  {right.map((p,pi)=>renderP(p,pi,sideOffset))}
                </div>
              </div>
            );
          }
          // 中央のみの行は均等配置
          return (
            <div key={ri} style={{display:"flex",justifyContent:"space-evenly",alignItems:"flex-start"}}>
              {row.map((p,pi)=>renderP(p,pi,0))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── IndexedDB ストレージ（大容量・画像対応） ──────────────────────────────
// localStorage は iOS で約5MB制限があり画像が保存できないため、IndexedDB を使う。
const IDB_NAME = "soccer-tracker-db";
const IDB_STORE = "kv";
let _idbPromise = null;
function idbOpen() {
  if (_idbPromise) return _idbPromise;
  _idbPromise = new Promise((resolve, reject) => {
    try {
      const req = indexedDB.open(IDB_NAME, 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE);
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    } catch (e) { reject(e); }
  });
  return _idbPromise;
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, "readonly");
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbSet(key, value) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).put(value, key);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}
async function idbDelete(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).delete(key);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}

// ─── main ─────────────────────────────────────────────────────────────────────
function SoccerTracker() {
  // ── persistent state (localStorage) ────────────────────────────────────────
  const load = (key, fallback) => {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
  };

  // ── セーブデータ（複数スロット）管理 ─────────────────────────────────
  const keyFor = (saveId, k) => saveId === "legacy" ? `sct_${k}` : `sct_${saveId}_${k}`;

  const [saves, setSaves] = useState(() => {
    const idx = load("sct_saves", null) || [];

    try {
      const hasLegacyData = localStorage.getItem("sct_matches") || localStorage.getItem("sct_roster");
      const hasLegacySlot = idx.some(s => s.id === "legacy");
      if (hasLegacyData && !hasLegacySlot) {
        return [{ id: "legacy", teamName: "マイチーム（旧データ）", createdAt: new Date().toISOString() }, ...idx];
      }
    } catch {}
    return idx;
  });
  const [currentSave, setCurrentSave] = useState(null);
  const [newTeamName, setNewTeamName] = useState("");
  const [deleteConfirmId, setDeleteConfirmId] = useState(null);
  const [profilePlayer, setProfilePlayer] = useState(null);
  const [showCalendar, setShowCalendar] = useState(false);
  const [calMonth, setCalMonth] = useState(() => { const d = new Date(); return new Date(d.getFullYear(), d.getMonth(), 1); });
  const [calendarMatchId, setCalendarMatchId] = useState(null); // カレンダーから開く試合詳細
  const [pitchInfoMode, setPitchInfoMode] = useState("none"); // none | fee | age | country | market
  const [marketPrompt, setMarketPrompt] = useState(null); // { windowKey } 市場価値入力を促すモーダル
  const [marketDraft, setMarketDraft] = useState({}); // { playerName: 入力中の市場価値 }
  const [showMvChart, setShowMvChart] = useState(false); // 市場価値推移グラフのモーダル
  const [opponentView, setOpponentView] = useState(null); // エンブレムタップ時の対戦相手名

  const [profileScope, setProfileScope] = useState("official"); // official | all

  // プロフィールを開くたびにデフォルト（公式戦のみ）に戻す
  useEffect(() => { setProfileScope("official"); }, [profilePlayer]);

  useEffect(() => { try { localStorage.setItem("sct_saves", JSON.stringify(saves)); } catch{} }, [saves]);

  const [roster,    setRoster]    = useState([]);
  const [transfers, setTransfers] = useState([]);
  const [matches,   setMatches]   = useState([]);
  const [otherMatches, setOtherMatches] = useState([]); // 他チーム同士の試合 { id, date, mode, home, away, homeScore, awayScore, cupRound }
  const [emblems,   setEmblems]   = useState({}); // { 対戦相手名: dataURL }
  const [modeStyles, setModeStyles] = useState({}); // { モード名: { color, logo } }
  const [dataLoaded, setDataLoaded] = useState(false); // セーブのデータ読み込み完了フラグ

  // エンブレム画像をセット（チーム名キー）
  const handleEmblemUpload = async (teamName, file) => {
    if (!file || !teamName) return;
    try {
      const dataUrl = await resizeEmblemToDataURL(file, 160);
      setEmblems(prev => ({ ...prev, [teamName]: dataUrl }));
    } catch (e) { console.error("emblem error", e); }
  };

  // モードのイメージカラー（ユーザー設定優先、なければ自動色）
  const modeColor = (mode) => (modeStyles[mode] && modeStyles[mode].color) || modeColorOf(mode);
  const modeLogo = (mode) => modeStyles[mode] && modeStyles[mode].logo;

  const setModeColor = (mode, color) => {
    if (!mode) return;
    setModeStyles(prev => ({ ...prev, [mode]: { ...(prev[mode]||{}), color } }));
  };
  const handleModeLogo = async (mode, file) => {
    if (!file || !mode) return;
    try {
      const dataUrl = await resizeEmblemToDataURL(file, 160);
      setModeStyles(prev => ({ ...prev, [mode]: { ...(prev[mode]||{}), logo: dataUrl } }));
    } catch (e) { console.error("mode logo error", e); }
  };

  // 過去に入力した対戦相手の一覧（試合数の多い順）
  const knownOpponents = useMemo(() => {
    const count = {};
    matches.forEach(m => { if (m.opponent) count[m.opponent] = (count[m.opponent] || 0) + 1; });
    Object.keys(emblems).forEach(n => { if (!(n in count)) count[n] = 0; });
    return Object.keys(count).sort((a, b) => (count[b] - count[a]) || a.localeCompare(b, "ja"));
  }, [matches, emblems]);

  // 対戦相手ごとの累積成績
  const opponentRecord = useMemo(() => {
    if (!opponentView || opponentView === MY_TEAM_KEY) return null;
    const list = matches.filter(m => m.opponent === opponentView)
      .sort((a, b) => new Date(b.date) - new Date(a.date));
    let w = 0, d = 0, l = 0, gf = 0, ga = 0;
    list.forEach(m => {
      gf += Number(m.myScore) || 0; ga += Number(m.opponentScore) || 0;
      const r = getResult(m.myScore, m.opponentScore);
      if (r === "win") w++; else if (r === "draw") d++; else l++;
    });
    return { name: opponentView, list, w, d, l, gf, ga, total: list.length };
  }, [opponentView, matches]);

  // 選択中のセーブにのみ書き込む
  const persistError = useRef(false);
  // データ本体は IndexedDB に保存（大容量・画像対応）。失敗時のみ persistError を立てる。
  const safeSet = (key, value) => {
    idbSet(key, value)
      .then(() => { persistError.current = false; })
      .catch((e) => { persistError.current = true; console.error("IndexedDB 保存失敗:", key, e); });
  };
  useEffect(() => { if (!currentSave || !dataLoaded) return; safeSet(keyFor(currentSave.id,"roster"),    roster);    }, [roster, currentSave, dataLoaded]);
  useEffect(() => { if (!currentSave || !dataLoaded) return; safeSet(keyFor(currentSave.id,"transfers"), transfers); }, [transfers, currentSave, dataLoaded]);
  useEffect(() => { if (!currentSave || !dataLoaded) return; safeSet(keyFor(currentSave.id,"matches"),   matches);   }, [matches, currentSave, dataLoaded]);
  useEffect(() => { if (!currentSave || !dataLoaded) return; safeSet(keyFor(currentSave.id,"otherMatches"), otherMatches); }, [otherMatches, currentSave, dataLoaded]);
  useEffect(() => { if (!currentSave || !dataLoaded) return; safeSet(keyFor(currentSave.id,"emblems"),   emblems);   }, [emblems, currentSave, dataLoaded]);
  useEffect(() => { if (!currentSave || !dataLoaded) return; safeSet(keyFor(currentSave.id,"modeStyles"), modeStyles); }, [modeStyles, currentSave, dataLoaded]);

  // ── 元に戻す（Undo）履歴 ───────────────────────────────────────────────
  const historyRef = useRef([]);      // 直前までの状態スナップショット（最大10件）
  const prevSnapRef = useRef(null);   // 最後に記録した状態
  const skipHistoryRef = useRef(false); // Undo復元時・セーブ切替時は履歴に積まない
  const [undoCount, setUndoCount] = useState(0);

  useEffect(() => {
    if (!currentSave) return;
    const snap = JSON.stringify({ roster, transfers, matches });
    if (skipHistoryRef.current) {
      skipHistoryRef.current = false;
      prevSnapRef.current = snap;
      return;
    }
    if (prevSnapRef.current !== null && prevSnapRef.current !== snap) {
      historyRef.current.push(prevSnapRef.current);
      if (historyRef.current.length > 10) historyRef.current.shift();
      setUndoCount(historyRef.current.length);
    }
    prevSnapRef.current = snap;
  }, [roster, transfers, matches, currentSave]);

  const undoLast = () => {
    const last = historyRef.current.pop();
    if (!last) return;
    setUndoCount(historyRef.current.length);
    skipHistoryRef.current = true;
    try {
      const d = JSON.parse(last);
      setRoster(d.roster || []);
      setTransfers(d.transfers || []);
      setMatches(d.matches || []);
    } catch {}
  };

  // セーブを選択してアプリ本体へ進む
  const selectSave = (s) => {
    setDataLoaded(false);
    historyRef.current = [];
    setUndoCount(0);
    skipHistoryRef.current = true;
    prevSnapRef.current = null;
    setSelectedDate(null);
    setCurrentSave(s);
    setMainTab("matches");
    setSeasonFilter("all"); setPlayerSeason("all"); setPlayerMode("all"); setPlayerCategory("official"); setPlayerVenue("all"); setFilter("all"); setModeFilter("all"); setCategoryFilter("official"); setVenueFilter("all"); setTransferSeason("all");
    setShowMatchForm(false); setEditMatchId(null);
    // IndexedDB からデータを読み込む（無ければ localStorage から移行）
    (async () => {
      const keys = ["roster","transfers","matches","otherMatches","emblems","modeStyles"];
      const defaults = { roster:[], transfers:[], matches:[], otherMatches:[], emblems:{}, modeStyles:{} };
      const result = {};
      for (const k of keys) {
        let v;
        try { v = await idbGet(keyFor(s.id, k)); } catch { v = undefined; }
        if (v === undefined) {
          // localStorage に旧データがあれば移行
          const legacy = load(keyFor(s.id, k), undefined);
          if (legacy !== undefined) {
            v = legacy;
            try { await idbSet(keyFor(s.id, k), legacy); localStorage.removeItem(keyFor(s.id, k)); } catch {}
          } else {
            v = defaults[k];
          }
        }
        result[k] = v;
      }
      setRoster(result.roster || []);
      setTransfers(result.transfers || []);
      setMatches(result.matches || []);
      setOtherMatches(result.otherMatches || []);
      setEmblems(result.emblems || {});
      setModeStyles(result.modeStyles || {});
      setMatchForm({ ...INITIAL_MATCH_FORM(), myTeam: s.teamName, starting: startingFromLastMatch(result.matches || []) });
      setDataLoaded(true);
    })();
  };

  // 新規セーブ作成（withSample=true ならサンプルデータ入り）
  const createSave = (teamName, withSample = false) => {
    const name = teamName.trim();
    if (!name) return;
    const s = { id: String(Date.now()), teamName: name, createdAt: new Date().toISOString() };
    setSaves(prev => [...prev, s]);
    setDataLoaded(false);
    setRoster(withSample ? SAMPLE_ROSTER : []);
    setTransfers(withSample ? SAMPLE_TRANSFERS : []);
    setMatches(withSample ? SAMPLE_MATCHES.map(m => ({ ...m, myTeam: name })) : []);
    setOtherMatches([]);
    setEmblems({});
    setModeStyles({});
    setCurrentSave(s);
    setMatchForm({ ...INITIAL_MATCH_FORM(), myTeam: name });

    setTimeout(() => setDataLoaded(true), 0);
  };

  // バックアップ書き出し（JSONファイルをダウンロード）
  const exportSave = async (s) => {
    // 現在開いているセーブは React state の最新値を使う。それ以外は IndexedDB から読む。
    const isCurrent = currentSave && currentSave.id === s.id;
    const readKey = async (k, def) => {
      try { const v = await idbGet(keyFor(s.id, k)); if (v !== undefined) return v; } catch {}
      const legacy = load(keyFor(s.id, k), undefined);
      return legacy !== undefined ? legacy : def;

    const data = {
      app: "soccer-tracker", version: 1,
      teamName: s.teamName,
      roster:    isCurrent ? roster    : await readKey("roster", []),

      matches:   isCurrent ? matches   : await readKey("matches", []),
      otherMatches: isCurrent ? otherMatches : await readKey("otherMatches", []),

      modeStyles: isCurrent ? modeStyles : await readKey("modeStyles", {}),
      exportedAt: new Date().toISOString(),
    };
    const json = JSON.stringify(data);

          await idbSet(keyFor(s.id, "transfers"), transfersD);
          await idbSet(keyFor(s.id, "matches"),   matchesD);
          await idbSet(keyFor(s.id, "otherMatches"), otherMatchesD);
          await idbSet(keyFor(s.id, "emblems"),   emblemsD);
          await idbSet(keyFor(s.id, "modeStyles"), modeStylesD);
        } catch (err) { console.error("復元データ保存失敗:", err); }
        // セーブ一覧に追加し、データを直接 state にセットして開く

        historyRef.current = [];
        setUndoCount(0);

        prevSnapRef.current = null;
        setSelectedDate(null);
        setRoster(rosterD);
        setTransfers(transfersD);
        setMatches(matchesD);
        setOtherMatches(otherMatchesD);
        setEmblems(emblemsD);
        setModeStyles(modeStylesD);
        setCurrentSave(s);
        setMatchForm({ ...INITIAL_MATCH_FORM(), myTeam: s.teamName, starting: startingFromLastMatch(matchesD) });
        setMainTab("matches");
        setSeasonFilter("all"); setPlayerSeason("all"); setPlayerMode("all"); setPlayerCategory("official"); setPlayerVenue("all"); setFilter("all"); setModeFilter("all"); setCategoryFilter("official"); setVenueFilter("all"); setTransferSeason("all");
        setShowMatchForm(false); setEditMatchId(null);
        setTimeout(() => setDataLoaded(true), 0);
        alert(`「${s.teamName}」を復元しました（${matchesD.length}試合）`);
      } catch (e) {
        console.error(e);
        alert("ファイルの読み込みに失敗しました");
      }
    };
    reader.readAsText(file);
  };

  // セーブ削除
  const deleteSave = (saveId) => {
    setSaves(prev => prev.filter(s => s.id !== saveId));
    const keys = ["roster","transfers","matches","otherMatches","emblems","modeStyles","updatedAt"];
    keys.forEach(k => { idbDelete(keyFor(saveId, k)).catch(()=>{}); try { localStorage.removeItem(keyFor(saveId, k)); } catch {} });
  };

  // セーブ選択画面用サマリー
  const [saveSummaries, setSaveSummaries] = useState([]);
  useEffect(() => {
    let cancelled = false;
    (async () => {
      const list = [];
      for (const s of saves) {
        let ms;
        try { ms = await idbGet(keyFor(s.id, "matches")); } catch { ms = undefined; }
        if (ms === undefined) ms = load(keyFor(s.id, "matches"), []);
        const st = calcStats(ms || []);
        const last = (ms && ms.length) ? [...ms].sort((a,b)=>new Date(b.date)-new Date(a.date))[0].date : null;
        list.push({ ...s, ...st, last });
      }
      if (!cancelled) setSaveSummaries(list);
    })();
    return () => { cancelled = true; };
  }, [saves, currentSave, matches]);

  // ── UI state ───────────────────────────────────────────────────────────────
  const [mainTab,     setMainTab]     = useState("matches");   // matches | roster | transfers
  const [showMatchForm,  setShowMatchForm]  = useState(false);
  const [showTransferForm, setShowTransferForm] = useState(false);
  const [matchFormTab, setMatchFormTab] = useState("basic");
  const [filter,      setFilter]      = useState("all");
  const [flash,       setFlash]       = useState(null);
  const [expandedMatchId, setExpandedMatchId] = useState(null);
  const [selectedDate, setSelectedDate] = useState(null); // カレンダー式進行の選択中の日
  const [detailMatchId, setDetailMatchId] = useState(null); // 一覧から開く全画面詳細
  const [bestElevenPeriod, setBestElevenPeriod] = useState(null); // {type:"month"|"year", key} ベストイレブン表示
  const [matchForm,   setMatchForm]   = useState(INITIAL_MATCH_FORM);
  const [tfForm,      setTfForm]      = useState(INITIAL_TRANSFER_FORM);
  const [editTransferId, setEditTransferId] = useState(null);
  const [rosterPosFilter, setRosterPosFilter] = useState("ALL");
  const [showAddPlayer, setShowAddPlayer] = useState(false);
  const [newPlayer, setNewPlayer] = useState({ name:"", position:"CM", number:"", photo:"", youth:false, country:"", birthdate:"", fee:"" });
  const [isNewMode, setIsNewMode] = useState(false);
  // モード管理（モード定義の追加・編集）
  const [showModeManager, setShowModeManager] = useState(false);
  const [modeForm, setModeForm] = useState(null); // 編集中のモード定義 { name, color, logo, compType, teams:[{name,logo}], origName }
  const [otherMatchForm, setOtherMatchForm] = useState(null); // 他チーム戦の入力
  const [modeScreen, setModeScreen] = useState(null); // フル画面モード画面で表示中のモード名
  const [modeScreenTab, setModeScreenTab] = useState("standings"); // モード画面のタブ standings|bracket
  const [modeSwitcher, setModeSwitcher] = useState(false); // モード切替リスト表示
  const [seasonEndStep, setSeasonEndStep] = useState(null); // シーズン終了フロー { mode, step: "confirm"|"continue"|"done" }
  const [playoffSetup, setPlayoffSetup] = useState(null); // リーグ&カップのプレーオフ設定中 { id?, date, mode, home, away, homeScore, awayScore, cupRound }
  const [editMatchId, setEditMatchId] = useState(null);
  const [seasonFilter, setSeasonFilter] = useState("all");
  const [modeFilter, setModeFilter] = useState("all");
  const [categoryFilter, setCategoryFilter] = useState("official"); // all | official | friendly
  const [venueFilter, setVenueFilter] = useState("all");       // all | home | away
  const [transferSeason, setTransferSeason] = useState("all");
  const [playerSeason, setPlayerSeason] = useState("all");
  const [playerMode, setPlayerMode] = useState("all");
  const [playerCategory, setPlayerCategory] = useState("official");
  const [playerVenue, setPlayerVenue] = useState("all");
  const [playerSort, setPlayerSort] = useState("goals");

  // ── derived ────────────────────────────────────────────────────────────────
  const activeRoster = roster.filter(p => p.status === "active");
  const allPlayerNames = activeRoster.map(p => p.name);
  // ロースター画面と同じ並び（FC26順 ROSTER_ORDER → 背番号順）にソートしたアクティブ選手
  const activeRosterSorted = useMemo(() => {
    return [...activeRoster].sort((a, b) => {
      const pa = ROSTER_ORDER.indexOf(posNorm(a.position));
      const pb = ROSTER_ORDER.indexOf(posNorm(b.position));
      if (pa !== pb) return (pa === -1 ? 99 : pa) - (pb === -1 ? 99 : pb);
      const na = parseInt(a.number), nb = parseInt(b.number);
      if (!isNaN(na) && !isNaN(nb)) return na - nb;
      if (!isNaN(na)) return -1;
      if (!isNaN(nb)) return 1;
      return String(a.name).localeCompare(String(b.name), "ja");
    });
  }, [activeRoster]);

  // ローン中（ローン出の記録があり、現在非アクティブ）の選手 = ローンバック対象
  const loanedOutPlayers = useMemo(() => {
    const out = [...new Set(transfers.filter(t => t.type === "loan_out").map(t => t.playerName))];
    return out.filter(name => {
      const p = roster.find(r => r.name === name);
      return p && p.status !== "active";
    });
  }, [transfers, roster]);

  // レンタル中選手のロースター表示用データ（移籍先・開始日付き、FC26順）
  const loanedOutEntries = useMemo(() => {
    return loanedOutPlayers
      .map(name => {
        const p = roster.find(r => r.name === name);
        const tf = transfers
          .filter(t => t.type === "loan_out" && t.playerName === name)
          .sort((a, b) => new Date(b.date) - new Date(a.date))[0];
        return p ? { ...p, loanTo: tf?.fromTo || "", loanSince: tf?.date || "" } : null;
      })
      .filter(Boolean)
      .sort((a, b) => {
        const pa = ROSTER_ORDER.indexOf(posNorm(a.position));
        const pb = ROSTER_ORDER.indexOf(posNorm(b.position));
        if (pa !== pb) return (pa === -1 ? 99 : pa) - (pb === -1 ? 99 : pb);
        const na = parseInt(a.number), nb = parseInt(b.number);
        if (!isNaN(na) && !isNaN(nb)) return na - nb;
        return String(a.name).localeCompare(String(b.name), "ja");
      });
  }, [loanedOutPlayers, roster, transfers]);

  // カテゴリ別の使用済みモード一覧（試合数の多い順）
  const modesOfCategory = (cat) => {
    const list = matches.filter(m => catOf(m) === cat).map(m => m.mode).filter(Boolean);
    const count = {};
    list.forEach(x => { count[x] = (count[x] || 0) + 1; });
    return [...new Set(list)].sort((a, b) => (count[b] - count[a]) || String(a).localeCompare(String(b), "ja"));
  };

  // モード管理機能で定義されたモード名の一覧（modeStyles に compType を持つもの）
  const definedModes = useMemo(() => {
    return Object.entries(modeStyles)
      .filter(([, v]) => v && v.compType)
      .map(([name, v]) => ({ name, ...v }));
  }, [modeStyles]);

  // 最新試合のモードを先頭にした並び（モード画面の優先表示用）
  const modesByRecency = useMemo(() => {
    // 各モードの最新試合日
    const latest = {};
    matches.forEach(m => { if (m.mode && m.date) { if (!latest[m.mode] || m.date > latest[m.mode]) latest[m.mode] = m.date; } });
    return [...definedModes].sort((a, b) => {
      const la = latest[a.name] || "", lb = latest[b.name] || "";
      if (la !== lb) return lb.localeCompare(la); // 新しい順
      return a.name.localeCompare(b.name, "ja");
    });
  }, [definedModes, matches]);

  // 指定モードのリーグ順位表を計算（自チームの試合＋他チーム戦を合算）
  const computeStandings = (modeName) => {
    const def = definedModes.find(d => d.name === modeName);
    if (!def) return [];
    const table = {}; // team -> {team, p, w, d, l, gf, ga}
    const ensure = (t) => { if (!table[t]) table[t] = { team: t, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0 }; return table[t]; };
    // 参加チームを先に登録（試合がなくても表示）
    (def.teams || []).forEach(t => { if (t.name) ensure(t.name); });
    const addGame = (teamA, teamB, scoreA, scoreB) => {
      const a = ensure(teamA), b = ensure(teamB);
      a.p++; b.p++;
      a.gf += scoreA; a.ga += scoreB;
      b.gf += scoreB; b.ga += scoreA;
      if (scoreA > scoreB) { a.w++; b.l++; }
      else if (scoreA < scoreB) { a.l++; b.w++; }
      else { a.d++; b.d++; }
    };
    const myTeam = currentSave?.teamName || "自チーム";
    // 自チームの試合（このモード、リーグフェーズ or リーグ戦のみ＝ラウンドが付かない試合）
    matches.forEach(m => {
      if (m.mode !== modeName) return;
      if (m.cupRound && m.cupRound !== "league_phase") return; // カップのラウンド戦は順位表に含めない
      const my = parseInt(m.myScore), op = parseInt(m.opponentScore);
      if (isNaN(my) || isNaN(op) || !m.opponent) return;
      addGame(myTeam, m.opponent, my, op);
    });
    // 他チーム戦
    otherMatches.forEach(m => {
      if (m.mode !== modeName) return;
      if (m.cupRound && m.cupRound !== "league_phase") return;
      addGame(m.home, m.away, m.homeScore, m.awayScore);
    });
    // 順位付け: 勝点 → 得失点差 → 得点 → 失点（少ない順）
    const rows = Object.values(table).map(t => ({ ...t, pts: t.w * 3 + t.d, gd: t.gf - t.ga }));
    rows.sort((a, b) =>
      (b.pts - a.pts) || (b.gd - a.gd) || (b.gf - a.gf) || (a.ga - b.ga) || String(a.team).localeCompare(String(b.team), "ja")
    );
    return rows;
  };

  // モード定義を保存
  const saveModeDef = () => {
    if (!modeForm || !modeForm.name.trim()) { alert("モード名を入力してください"); return; }
    const name = modeForm.name.trim();
    setModeStyles(prev => {
      const next = { ...prev };
      // 名前変更時は旧キーを削除
      if (modeForm.origName && modeForm.origName !== name) delete next[modeForm.origName];
      next[name] = {
        color: modeForm.color || "#C8F135",
        logo: modeForm.logo || (prev[modeForm.origName] && prev[modeForm.origName].logo) || "",
        compType: modeForm.compType || "league",
        category: modeForm.category || "official",
        teams: (() => {
          let tms = (modeForm.teams || []).filter(t => t.name && t.name.trim());
          const myName = currentSave?.teamName || "";
          if (myName && !tms.some(t => t.name === myName)) tms = [{ name: myName, logo: emblems[MY_TEAM_KEY] || "" }, ...tms];
          return tms;
        })(),
        playoff: !!modeForm.playoff,
        playoffTeams: modeForm.playoffTeams || 4,
        cupDirect: modeForm.cupDirect || 2,
        relegation: modeForm.relegation || 0,
        promotion: modeForm.promotion || 0,
        seasonHistory: (prev[modeForm.origName] && prev[modeForm.origName].seasonHistory) || (prev[name] && prev[name].seasonHistory) || [],
        withThird: !!modeForm.withThird,
        bracket: (prev[modeForm.origName] && prev[modeForm.origName].bracket) || (prev[name] && prev[name].bracket) || null,
      };
      return next;
    });
    setModeForm(null);
    setShowModeManager(false);
  };

  // モード定義の bracket（トーナメント）を更新する汎用関数
  const updateModeBracket = (modeName, updater) => {
    setModeStyles(prev => {
      const cur = prev[modeName];
      if (!cur) return prev;
      const newBracket = updater(cur.bracket);
      return { ...prev, [modeName]: { ...cur, bracket: newBracket } };
    });
  };
  // トーナメントを新規作成（チーム数指定）
  const initBracket = (modeName, teamCount, withThird, legsByRound = {}) => {
    updateModeBracket(modeName, () => createEmptyBracket(teamCount, withThird, legsByRound));
  };
  // リーグ順位の上位チームをシード配置してトーナメント作成（プレーオフ用）
  const initBracketSeeded = (modeName, teamCount, withThird) => {
    const standings = computeStandings(modeName);
    const seeds = standings.slice(0, teamCount).map(r => r.team);
    const bracket = createEmptyBracket(teamCount, withThird);
    // 1回戦に 1位vs最下位シード … の標準シード配置
    const firstRound = bracket.rounds[0];
    firstRound.matches.forEach((m, mi) => {
      const high = seeds[mi];
      const low = seeds[teamCount - 1 - mi];
      m.teamA = high || "";
      m.teamB = low || "";
    });
    updateModeBracket(modeName, () => bracket);
  };

  // プレーオフを開始: リーグ順位から「直接進出」「プレーオフ進出」を振り分けて対戦表を生成
  // シーズン終了を確定: 自チームの順位を記録し、過去チームを蓄積
  const finishSeason = (modeName, continueNext) => {
    const def = modeStyles[modeName];
    if (!def) return;
    const myTeam = currentSave?.teamName || "自チーム";
    const standings = computeStandings(modeName);
    const myRank = standings.findIndex(r => r.team === myTeam) + 1;
    const allTeams = (def.teams || []).map(t => t.name);
    const seasonRec = {
      endedAt: new Date().toISOString().split("T")[0],
      season: seasonOf(ageRefDate),
      myRank: myRank || null,
      standings: standings.map((r, i) => ({ rank: i + 1, team: r.team, pts: r.pts, gd: r.gd })),
    };
    // 過去に在籍したチームを knownTeams に蓄積（再選択時の検索用）
    setModeStyles(prev => {
      const cur = prev[modeName];
      const known = new Set([...(cur.knownTeams || []), ...allTeams]);
      return {
        ...prev,
        [modeName]: {
          ...cur,
          seasonHistory: [...(cur.seasonHistory || []), seasonRec],
          knownTeams: [...known],
          lastFinalStandings: seasonRec.standings, // 昇降格選択の参照用
        },
      };
    });
    return seasonRec;
  };

  const startPlayoff = (modeName) => {
    const def = modeStyles[modeName];
    if (!def) return;
    const standings = computeStandings(modeName);
    const teamNames = standings.map(r => r.team);
    const direct = def.cupDirect || 2;       // カップ直接進出数
    const poCount = def.playoffTeams || 4;   // プレーオフ進出数
    const directTeams = teamNames.slice(0, direct); // 上位＝直接進出
    const poTeams = teamNames.slice(direct, direct + poCount); // 次順位＝プレーオフ
    // プレーオフ対戦: 上位vs下位（1位PO vs 最下位PO …）でペア作成
    const pairs = [];
    for (let i = 0; i < Math.floor(poTeams.length / 2); i++) {
      pairs.push({ slot: i, teamA: poTeams[i] || "", teamB: poTeams[poTeams.length - 1 - i] || "", scoreA: "", scoreB: "", winner: "" });
    }
    setModeStyles(prev => ({
      ...prev,
      [modeName]: { ...prev[modeName], playoffData: { directTeams, pairs }, bracket: null },
    }));
  };
  // プレーオフ対戦の編集
  const setPlayoffMatch = (modeName, slot, field, value) => {
    setModeStyles(prev => {
      const cur = prev[modeName];
      if (!cur || !cur.playoffData) return prev;
      const pairs = cur.playoffData.pairs.map(p => p.slot === slot ? { ...p, [field]: value } : p);
      return { ...prev, [modeName]: { ...cur, playoffData: { ...cur.playoffData, pairs } } };
    });
  };
  // プレーオフ1試合の勝者
  const playoffWinner = (p) => {
    if (p.teamA && p.teamB && p.scoreA !== "" && p.scoreB !== "") {
      const a = parseInt(p.scoreA), b = parseInt(p.scoreB);
      if (a > b) return p.teamA;
      if (b > a) return p.teamB;
      if (p.winner) return p.winner;
    }
    return "";
  };
  // プレーオフ終了 → カップ戦トーナメントを生成（直接進出＋プレーオフ勝者）
  const finishPlayoffToBracket = (modeName, withThird, legsByRound = {}) => {
    const def = modeStyles[modeName];
    if (!def || !def.playoffData) return;
    const winners = def.playoffData.pairs.map(p => playoffWinner(p)).filter(Boolean);
    const cupTeams = [...def.playoffData.directTeams, ...winners];
    // 2の累乗にする（不足は空き）
    let size = 2;
    while (size < cupTeams.length) size *= 2;
    const bracket = createEmptyBracket(size, withThird, legsByRound);
    const firstRound = bracket.rounds[0];
    firstRound.matches.forEach((m, mi) => {
      m.teamA = cupTeams[mi] || "";
      m.teamB = cupTeams[size - 1 - mi] || "";
    });
    setModeStyles(prev => ({ ...prev, [modeName]: { ...prev[modeName], bracket } }));
  };
  // トーナメントの試合枠を編集
  const setBracketMatch = (modeName, roundIdx, slot, field, value) => {
    updateModeBracket(modeName, (br) => {
      if (!br) return br;
      const rounds = br.rounds.map((r, ri) => {
        if (ri !== roundIdx) return r;
        return { ...r, matches: r.matches.map(m => m.slot === slot ? { ...m, [field]: value } : m) };
      });
      // 勝者を次ラウンドへ自動配置
      const nb = { ...br, rounds };
      for (let ri = 0; ri < nb.rounds.length - 1; ri++) {
        nb.rounds[ri].matches.forEach((m, mi) => {
          const w = bracketWinner(m, nb.rounds[ri].legs || 1);
          const nextSlot = Math.floor(mi / 2);
          const nextField = mi % 2 === 0 ? "teamA" : "teamB";
          const nm = nb.rounds[ri + 1].matches[nextSlot];
          if (nm && w && nm[nextField] !== w) {
            nb.rounds[ri + 1] = { ...nb.rounds[ri + 1], matches: nb.rounds[ri + 1].matches.map(x => x.slot === nextSlot ? { ...x, [nextField]: w } : x) };
          }
        });
      }
      return nb;
    });
  };
  // 3位決定戦の編集
  const setBracketThird = (modeName, field, value) => {
    updateModeBracket(modeName, (br) => br ? { ...br, thirdPlace: { ...(br.thirdPlace||{}), [field]: value } } : br);
  };

  // 他チーム戦を保存
  const saveOtherMatch = () => {
    const f = otherMatchForm;
    if (!f || !f.mode) { alert("モードを選択してください"); return; }
    if (!f.home || !f.away) { alert("対戦する2チームを選択してください"); return; }
    if (f.home === f.away) { alert("異なる2チームを選択してください"); return; }
    const rec = {
      id: f.id || `om_${Date.now()}`,
      date: f.date, mode: f.mode,
      home: f.home, away: f.away,
      homeScore: f.homeScore === "" ? 0 : parseInt(f.homeScore),
      awayScore: f.awayScore === "" ? 0 : parseInt(f.awayScore),
      cupRound: f.cupRound || "",
    };
    setOtherMatches(prev => f.id ? prev.map(x => x.id === f.id ? rec : x) : [...prev, rec]);
    setOtherMatchForm(null);
  };

  // 選手名 → 顔写真 のマップ（フォーメーション表示用）
  const photoMap = useMemo(() => {
    const map = {};
    roster.forEach(p => { if (p.photo) map[p.name] = p.photo; });
    return map;
  }, [roster]);

  const youthMap = useMemo(() => {
    const map = {};
    roster.forEach(p => { if (p.youth) map[p.name] = true; });
    return map;
  }, [roster]);

  const countryMap = useMemo(() => {
    const map = {};
    roster.forEach(p => { if (p.country) map[p.name] = p.country; });
    return map;
  }, [roster]);

  // 選手名 → ロースター情報
  const rosterByName = useMemo(() => {
    const map = {};
    roster.forEach(p => { map[p.name] = p; });
    return map;
  }, [roster]);

  // 選手名 → 移籍金。選手データの獲得時移籍金を優先し、なければ移籍情報の加入金額を流用
  const feeMap = useMemo(() => {
    const map = {};
    const incoming = ["in", "loan_in"];
    [...transfers]
      .filter(t => incoming.includes(t.type) && t.fee)
      .sort((a, b) => new Date(a.date) - new Date(b.date))
      .forEach(t => { const v = parseFee(t.fee); if (v > 0) map[t.playerName] = v; });
    // 選手データに獲得時移籍金があればそれで上書き（優先）
    roster.forEach(p => { if (p.fee) { const v = parseFee(p.fee); if (v > 0) map[p.name] = v; } });
    return map;
  }, [transfers, roster]);

  // 年齢計算の基準日 = 登録されている最新の試合日（なければ今日）
  const ageRefDate = useMemo(() => {
    let latest = "";
    matches.forEach(m => { if (m.date && m.date > latest) latest = m.date; });
    return latest || new Date().toISOString().split("T")[0];
  }, [matches]);

  // 選択中の日を初期化（最新試合日、なければ現在シーズンの開始日）
  useEffect(() => {
    if (!currentSave || selectedDate) return;
    let latest = "";
    matches.forEach(m => { if (m.date && m.date > latest) latest = m.date; });
    setSelectedDate(latest || currentSeasonStart());
  }, [currentSave, matches, selectedDate]);

  // 選手名 → 最新の市場価値（基準日＝最新試合日以前で最も新しい窓の値）
  const marketValueMap = useMemo(() => {
    const map = {};
    const ref = ageRefDate;
    roster.forEach(p => {
      const mv = p.marketValues || {};
      const keys = Object.keys(mv).filter(k => mv[k]);
      if (keys.length === 0) return;
      const toDate = (k) => { const [y, s] = k.split("-"); return new Date(`${y}-${s === "summer" ? "07" : "01"}-01`); };
      const refD = new Date(ref);
      let best = null, bestD = null;
      keys.forEach(k => { const d = toDate(k); if (d <= refD && (bestD === null || d > bestD)) { bestD = d; best = k; } });
      if (!best) { keys.sort((a, b) => toDate(a) - toDate(b)); best = keys[0]; }
      map[p.name] = mv[best];
    });
    return map;
  }, [roster, ageRefDate]);

  // 試合詳細カードを描画（一覧・カレンダー共通）
  const renderMatchCard = (match, opts = {}) => {
                const { forceExpand = false, hideActions = false } = opts;
                const result=getResult(match.myScore,match.opponentScore);
                const modeLabel=MODE_LABELS[match.mode]||match.mode;
                const isExp=forceExpand || expandedMatchId===match.id;
                const sf=match.starting?.filter(p=>p.name)||[];
                const subf=match.subs?.filter(s=>s.name)||[];
                const scf=match.scorers?.filter(s=>s.name)||[];
                const GT={normal:"",pk:"PK",free_kick:"FK",header:"HDR",og:"OG"};
    return (
                  <div key={match.id}
                    onClick={()=>{ if(!hideActions && (sf.length>0||subf.length>0||scf.length>0)) setDetailMatchId(match.id); }}
                    style={{background:`linear-gradient(135deg, ${modeColor(match.mode)}3C 0%, ${modeColor(match.mode)}1A 45%, ${modeColor(match.mode)}0E 100%), #16281A`,border:`1.5px solid ${modeColor(match.mode)}99`,borderLeft:`4px solid ${RESULT_COLOR[result]}`,borderRadius:12,marginBottom:8,overflow:"hidden",boxShadow:`0 0 10px ${modeColor(match.mode)}22`,cursor:(!hideActions && (sf.length>0||subf.length>0||scf.length>0))?"pointer":"default"}}>
                    <div style={{padding:"11px 13px"}}>
                      {/* 上段: 左にモード・日付・シーズン、右に操作ボタン */}
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,marginBottom:10}}>
                        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",minWidth:0}}>
                          {modeLogo(match.mode) && <img src={modeLogo(match.mode)} alt="" style={{width:42,height:42,objectFit:"contain",filter:"drop-shadow(0 1px 2px rgba(0,0,0,.4))"}} />}
                          <span style={{fontSize:10,fontWeight:800,background:modeColor(match.mode),color:"#16301C",padding:"2px 8px",borderRadius:4}}>{modeLabel}</span>
                          <span style={{fontSize:10,color:"#8AAE8A",fontWeight:600}}>{match.date}</span>
                          <span style={{fontSize:9,background:"#184A26",color:"#88BE88",padding:"2px 5px",borderRadius:4,border:"1px solid #2C5A30"}}>{seasonOf(match.date)}</span>
                          <span style={{fontSize:9,background:"#2A4030",color:"#A6C8A6",padding:"2px 5px",borderRadius:4}}>{catOf(match)==="friendly"?"親善":"公式"}</span>
                          {catOf(match)==="official"&&match.compType&&false&&<span style={{fontSize:9,background:"#1A2E3A",color:"#7FB0E0",border:"1px solid #2A4A60",padding:"2px 5px",borderRadius:4}}>{COMP_TYPES[match.compType]||""}</span>}

                        {!hideActions && <div style={{display:"flex",gap:4,flexShrink:0}}>

                      {/* 中段: エンブレム VS エンブレム + スコア */}

                        </div>

                        <div style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>

                          <span style={{fontSize:11,fontWeight:900,color:RESULT_COLOR[result],background:`${RESULT_COLOR[result]}22`,border:`1px solid ${RESULT_COLOR[result]}55`,borderRadius:5,padding:"1px 10px"}}>{RESULT_LABEL[result]}</span>
                        </div>
                        {/* 相手チーム */}
                        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:6,minWidth:0}}>
                          <Emblem name={match.opponent} src={emblems[match.opponent]} size={56} onClick={(e)=>{e.stopPropagation&&e.stopPropagation();setOpponentView(match.opponent);}} />
                          <span style={{fontSize:11,fontWeight:700,color:"#F2FFF2",textAlign:"center",maxWidth:"100%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{match.opponent}</span>
                        </div>
