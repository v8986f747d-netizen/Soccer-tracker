                              {emblems[t]&&<img src={emblems[t]} alt="" style={{width:14,height:14,objectFit:"contain"}} />}+ {t}
                            </button>
                          ))}
                        </div>
                      </div>
                    );
                  })()}
                </div>
                <button onClick={saveModeDef} style={{width:"100%",background:"#C8F135",color:"#16301C",border:"none",borderRadius:10,padding:12,fontWeight:800,fontSize:14}}>保存する ✓</button>
                {modeForm.origName && (
                  <button onClick={()=>{ if(confirm(`モード「${modeForm.origName}」の定義を削除しますか？（記録済みの試合は残ります）`)){ setModeStyles(prev=>{ const n={...prev}; delete n[modeForm.origName]; return n; }); setShowModeManager(false); setModeForm(null); } }}
                    style={{width:"100%",marginTop:8,background:"transparent",color:"#C07070",border:"1px solid #5A3030",borderRadius:10,padding:10,fontWeight:700,fontSize:12}}>このモード定義を削除</button>
                )}
              </div>
            </div>
          )}

          {/* ===== モード画面（参加チーム閲覧のみ） ===== */}
          {modeScreen && (() => {
            const def = definedModes.find(d=>d.name===modeScreen);
            if (!def) { return null; }
            const teams = (def.teams||[]).filter(t=>t.name);
            const close = () => setModeScreen(null);
            // このモードの自チームの試合
            const modeMatches = matches.filter(m=>m.mode===modeScreen).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
            return (
              <div style={{position:"fixed",inset:0,zIndex:930,background:"#13231A",overflowY:"auto",padding:"calc(env(safe-area-inset-top) + 14px) 0 30px"}}>
                <div style={{maxWidth:640,margin:"0 auto",padding:"0 12px"}}>
                  {/* ヘッダー */}
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                    <button onClick={close} style={{background:"#274A30",border:"1px solid #3A6248",color:"#C8F135",borderRadius:9,padding:"8px 12px",fontSize:14,fontWeight:700,flexShrink:0}}>←</button>
                    <div style={{flex:1,minWidth:0,display:"flex",alignItems:"center",gap:9}}>
                      {def.logo?<img src={def.logo} alt="" style={{width:34,height:34,objectFit:"contain",flexShrink:0}} />:<span style={{width:34,height:34,borderRadius:"50%",background:def.color,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>🏆</span>}
                      <div style={{minWidth:0}}>
                        <div style={{fontSize:16,fontWeight:900,color:"#F2FFF2",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{def.name}</div>
                        <div style={{fontSize:10,color:def.color,fontWeight:700}}>{(def.category==="friendly"?"親善試合・":"公式戦・")}{COMP_TYPES[def.compType]}</div>
                      </div>
                    </div>
                    <button onClick={()=>{ const myName=currentSave?.teamName||""; let tms=[...(def.teams||[])]; if(myName && !tms.some(t=>t.name===myName)) tms=[{name:myName,logo:emblems[MY_TEAM_KEY]||""},...tms]; setModeForm({ name:def.name, color:def.color||MODE_PALETTE[0], logo:def.logo||"", compType:def.compType||"league", category:def.category||"official", teams:tms, origName:def.name }); setModeScreen(null); setShowModeManager(true); }}
                      style={{background:"#173A20",border:"1px solid #3A6248",color:"#A6C8A6",borderRadius:9,padding:"8px 12px",fontSize:12,fontWeight:700,flexShrink:0}}>✏️ 編集</button>
                  </div>
                  {/* 参加チーム */}
                  <div style={{background:"#16242E",border:"1px solid #2C4458",borderRadius:14,padding:"14px 12px",marginBottom:14}}>
                    <div style={{fontSize:12,fontWeight:800,color:"#C8F135",marginBottom:10}}>参加チーム（{teams.length}）</div>
                    {teams.length===0 ? (
                      <div style={{fontSize:11,color:"#5A7C60",textAlign:"center",padding:"10px 0"}}>「✏️ 編集」から参加チームを登録できます。</div>
                    ) : (
                      <div style={{display:"flex",flexDirection:"column",gap:7}}>
                        {teams.map((t,i)=>{
                          const isMy = t.name===(currentSave?.teamName||"");
                          return (
                            <div key={i} style={{display:"flex",alignItems:"center",gap:9,background:isMy?"#1E3A28":"transparent",borderRadius:8,padding:"6px 8px",borderLeft:isMy?"2px solid #C8F135":"2px solid transparent"}}>
                              {t.logo?<img src={t.logo} alt="" style={{width:26,height:26,objectFit:"contain",flexShrink:0}} />:<span style={{width:26,height:26,borderRadius:"50%",background:"#274A30",flexShrink:0}} />}
                              <span style={{fontSize:13,fontWeight:isMy?900:600,color:isMy?"#C8F135":"#E0F4E0"}}>{t.name}</span>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                  {/* このモードの試合 */}
                  {modeMatches.length>0 && (
                    <div style={{background:"#16301C",border:"1px solid #2C5838",borderRadius:14,padding:"14px 12px"}}>
                      <div style={{fontSize:12,fontWeight:800,color:"#C8F135",marginBottom:10}}>このモードの試合（{modeMatches.length}）</div>
                      <div style={{display:"flex",flexDirection:"column",gap:6}}>
                        {modeMatches.map(m=>{
                          const res = getResult(m.myScore,m.opponentScore);
                          return (
                            <button key={m.id} onClick={()=>{ setModeScreen(null); setDetailMatchId(m.id); }} style={{display:"flex",alignItems:"center",gap:8,background:"#1A2E18",border:"1px solid #2A4A22",borderRadius:8,padding:"8px 10px",textAlign:"left"}}>
                              <span style={{fontSize:10,color:"#88B088",width:42,flexShrink:0}}>{m.date?.slice(5)}</span>
                              <span style={{flex:1,fontSize:12,color:"#E0F4E0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>vs {m.opponent}</span>
                              <span style={{fontSize:13,fontWeight:900,color:res==="WIN"?"#C8F135":res==="LOSS"?"#E08080":"#A6C8A6",flexShrink:0}}>{m.myScore}-{m.opponentScore}</span>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            );
          })()}

          {/* カレンダー式進行バー（1週間・中央が選択日） */}
          {!showMatchForm && selectedDate && (() => {
            const WD = ["日","月","火","水","木","金","土"];
            const days = [-3,-2,-1,0,1,2,3].map(off => addDays(selectedDate, off));
            const matchOn = (d) => matches.find(m => m.date === d);
            return (
              <div style={{marginTop:12,background:"#16301C",border:"1px solid #2C5838",borderRadius:13,padding:"10px 8px"}}>
                <div style={{display:"flex",alignItems:"center",gap:4}}>
                  <button onClick={()=>setSelectedDate(addDays(selectedDate,-1))} style={{background:"#173A20",border:"1px solid #3A6248",color:"#C8F135",borderRadius:8,padding:"8px 6px",fontSize:15,flexShrink:0}}>◀</button>
                  <div style={{flex:1,display:"flex",gap:3,justifyContent:"space-between"}}>
                    {days.map((d,idx)=>{
                      const isCenter = idx===3;
                      const m = matchOn(d);
                      const [yy,mm,dday] = d.split("-").map(Number);
                      const dd = new Date(yy, mm-1, dday);
                      const wd = dd.getDay();
                      return (
                        <button key={d} onClick={()=>{ setSelectedDate(d); if(m) setDetailMatchId(m.id); }}
                          style={{flex:1,minWidth:0,background:isCenter?"#C8F135":(m?"#1E3A28":"transparent"),border:isCenter?"1px solid #C8F135":(m?"1px solid #3A6248":"1px solid transparent"),borderRadius:9,padding:"6px 2px",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                          <span style={{fontSize:8,color:isCenter?"#16301C":(wd===0?"#E08080":wd===6?"#7FB0E0":"#88B088"),fontWeight:700}}>{WD[wd]}</span>
                          <span style={{fontSize:14,fontWeight:900,color:isCenter?"#16301C":"#E0F4E0",lineHeight:1}}>{dd.getDate()}</span>
                          <span style={{fontSize:7,color:isCenter?"#16301C":"#5A7C60"}}>{dd.getMonth()+1}月</span>
                          {m ? (
                            <span style={{fontSize:9,fontWeight:900,color:isCenter?"#16301C":(getResult(m.myScore,m.opponentScore)==="WIN"?"#C8F135":getResult(m.myScore,m.opponentScore)==="LOSS"?"#E08080":"#A6C8A6"),marginTop:1}}>{m.myScore}-{m.opponentScore}</span>
                          ) : <span style={{height:11}} />}
                        </button>
                      );
                    })}
                  </div>
                  <button onClick={()=>setSelectedDate(addDays(selectedDate,1))} style={{background:"#173A20",border:"1px solid #3A6248",color:"#C8F135",borderRadius:8,padding:"8px 6px",fontSize:15,flexShrink:0}}>▶</button>
                </div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginTop:8}}>
                  <span style={{fontSize:11,color:"#A6C8A6",fontWeight:700}}>{(()=>{const d=new Date(selectedDate+"T00:00:00");return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${WD[d.getDay()]}）`;})()}</span>
                  {!matchOn(selectedDate) && (
                    <button onClick={()=>{ setMatchForm(f=>({...INITIAL_MATCH_FORM(),date:selectedDate})); setEditMatchId(null); setMatchFormTab("basic"); setShowMatchForm(true); }}
                      style={{background:"#2C5838",border:"1px solid #3C6440",color:"#C8F135",borderRadius:7,padding:"4px 10px",fontSize:10,fontWeight:700}}>＋この日に記録</button>
                  )}
                </div>
              </div>
            );
          })()}

          {/* match form */}
          {showMatchForm && (
            <div style={{background:"#1E3A28",border:"1px solid #3A6248",borderRadius:14,padding:16,marginTop:12,animation:"slideDown .25s ease-out"}}>
              {editMatchId && (
                <div style={{fontSize:11,fontWeight:700,color:"#FFB830",marginBottom:10,display:"flex",alignItems:"center",gap:5}}>
                  ✏️ 試合を編集中 <span style={{fontSize:10,color:"#88B088",fontWeight:400}}>（{matchForm.date} vs {matchForm.opponent}）</span>
                </div>
              )}
              {/* form tabs */}
              <div style={{display:"flex",gap:3,marginBottom:14,background:"#16301C",borderRadius:9,padding:3}}>
                {[["basic","基本情報"],["lineup","スタメン/交代"],["scorers","得点者"],["ratings","評価"]].map(([k,l])=>(
                  <button key={k} onClick={()=>setMatchFormTab(k)} style={{flex:1,padding:"7px 3px",borderRadius:7,border:"none",fontSize:11,fontWeight:700,background:matchFormTab===k?"#2C5838":"transparent",color:matchFormTab===k?"#C8F135":"#88B088"}}>
                    {l}
                  </button>
                ))}
              </div>

              {/* basic */}
              {matchFormTab==="basic" && (<div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:9}}>
                  <div><Label>試合区分</Label>
                    <div style={{display:"flex",alignItems:"center",height:38,padding:"0 11px",background:"#16301C",border:"1px solid #2C5838",borderRadius:8,fontSize:13,fontWeight:700,color:matchForm.category==="friendly"?"#7FB0E0":"#C8F135"}}>
                      {matchForm.category==="friendly"?"親善試合":"公式戦"}
                      <span style={{fontSize:9,color:"#5A7C60",fontWeight:400,marginLeft:6}}>（モードで設定）</span>
                    </div>
                  </div>
                  <div><Label>ホーム / アウェイ</Label>
                    <select value={matchForm.venue} onChange={e=>setMatchForm(f=>({...f,venue:e.target.value}))}>
                      <option value="home">ホーム</option>
                      <option value="away">アウェイ</option>
                      <option value="neutral">中立地</option>
                    </select>
                  </div>
                </div>
                {/* 延長戦トグル */}
                <div onClick={()=>setMatchForm(f=>({...f,extraTime:!f.extraTime}))}
                  style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:matchForm.extraTime?"#2A3A1A":"#173A20",border:`1px solid ${matchForm.extraTime?"#C8F135":"#3A6248"}`,borderRadius:9,padding:"10px 13px",marginBottom:9,cursor:"pointer"}}>
                  <span style={{fontSize:13,fontWeight:700,color:matchForm.extraTime?"#C8F135":"#A6C8A6"}}>⏱️ 延長戦（120分）</span>
                  <span style={{width:42,height:24,borderRadius:12,background:matchForm.extraTime?"#C8F135":"#274A30",position:"relative",transition:"all .2s",flexShrink:0}}>
                    <span style={{position:"absolute",top:2,left:matchForm.extraTime?20:2,width:20,height:20,borderRadius:"50%",background:matchForm.extraTime?"#16301C":"#88B088",transition:"all .2s"}} />
                  </span>
                </div>
                {/* PK戦トグル */}
                <div onClick={()=>setMatchForm(f=>({...f,hasPk:!f.hasPk}))}
                  style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:matchForm.hasPk?"#2A3A1A":"#173A20",border:`1px solid ${matchForm.hasPk?"#C8F135":"#3A6248"}`,borderRadius:9,padding:"10px 13px",marginBottom:9,cursor:"pointer"}}>
                  <span style={{fontSize:13,fontWeight:700,color:matchForm.hasPk?"#C8F135":"#A6C8A6"}}>⚽ PK戦</span>
                  <span style={{width:42,height:24,borderRadius:12,background:matchForm.hasPk?"#C8F135":"#274A30",position:"relative",transition:"all .2s",flexShrink:0}}>
                    <span style={{position:"absolute",top:2,left:matchForm.hasPk?20:2,width:20,height:20,borderRadius:"50%",background:matchForm.hasPk?"#16301C":"#88B088",transition:"all .2s"}} />
                  </span>
                </div>
                {matchForm.hasPk && (
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:9,background:"#16301C",borderRadius:9,padding:"10px 13px"}}>
                    <span style={{fontSize:12,color:"#88B088",flexShrink:0}}>PK戦スコア（自分 - 相手）</span>
                    <input type="text" inputMode="numeric" placeholder="0" value={matchForm.pkMy}
                      onChange={e=>{ const v=e.target.value; if(v===""||/^\d{1,2}$/.test(v)) setMatchForm(f=>({...f,pkMy:v})); }}
                      style={{width:44,textAlign:"center",fontSize:15,fontWeight:900,color:"#C8F135",padding:"5px 3px",background:"#0E2012",border:"1px solid #3A6248"}} />
                    <span style={{fontSize:15,fontWeight:900,color:"#88B088"}}>-</span>
                    <input type="text" inputMode="numeric" placeholder="0" value={matchForm.pkOpp}
                      onChange={e=>{ const v=e.target.value; if(v===""||/^\d{1,2}$/.test(v)) setMatchForm(f=>({...f,pkOpp:v})); }}
                      style={{width:44,textAlign:"center",fontSize:15,fontWeight:900,color:"#E0A0A0",padding:"5px 3px",background:"#0E2012",border:"1px solid #3A6248"}} />
                  </div>
                )}
                {matchForm.hasPk && (
                  <div style={{background:"#16301C",borderRadius:9,padding:"11px 13px",marginBottom:9}}>
                    <div style={{fontSize:11,fontWeight:700,color:"#C8F135",marginBottom:8}}>⚽ キッカー（蹴った順）</div>
                    {(matchForm.pkTakers||[]).map((tk,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                        <span style={{fontSize:11,color:"#88B088",width:18,flexShrink:0}}>{i+1}</span>
                        <select value={tk.name} onChange={e=>{ const v=e.target.value; setMatchForm(f=>{ const arr=[...f.pkTakers]; arr[i]={...arr[i],name:v}; return {...f,pkTakers:arr}; }); }}
                          style={{flex:1,minWidth:0,fontSize:12,padding:"6px 8px",background:"#0E2012",border:"1px solid #3A6248",borderRadius:7,color:"#E0F4E0"}}>
                          <option value="">選手を選択</option>
                          {matchRatingNames.map(n=><option key={n} value={n}>{n}</option>)}
                        </select>
                        <button onClick={()=>setMatchForm(f=>{ const arr=[...f.pkTakers]; arr[i]={...arr[i],scored:true}; return {...f,pkTakers:arr}; })}
                          style={{background:tk.scored===true?"#2C5838":"#0E2012",border:`1px solid ${tk.scored===true?"#4C8850":"#3A6248"}`,color:tk.scored===true?"#C8F135":"#5A7C60",borderRadius:7,padding:"5px 9px",fontSize:11,fontWeight:700,flexShrink:0}}>○</button>
                        <button onClick={()=>setMatchForm(f=>{ const arr=[...f.pkTakers]; arr[i]={...arr[i],scored:false}; return {...f,pkTakers:arr}; })}
                          style={{background:tk.scored===false?"#5A1A1A":"#0E2012",border:`1px solid ${tk.scored===false?"#8F3030":"#3A6248"}`,color:tk.scored===false?"#FF8080":"#5A7C60",borderRadius:7,padding:"5px 9px",fontSize:11,fontWeight:700,flexShrink:0}}>✕</button>
                        <button onClick={()=>setMatchForm(f=>({...f,pkTakers:f.pkTakers.filter((_,j)=>j!==i)}))}
                          style={{background:"transparent",border:"none",color:"#5A7C60",fontSize:14,padding:"0 2px",flexShrink:0}}>🗑</button>
                      </div>
                    ))}
                    <button onClick={()=>setMatchForm(f=>({...f,pkTakers:[...(f.pkTakers||[]),{name:"",scored:null}]}))}
                      style={{width:"100%",marginTop:4,background:"#173A20",border:"1px dashed #3A6248",color:"#88B088",borderRadius:7,padding:8,fontSize:12,fontWeight:700}}>+ キッカーを追加</button>
                  </div>
                )}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:9}}>
                  <div><Label>日付</Label><input type="date" value={matchForm.date} onChange={e=>setMatchForm(f=>({...f,date:e.target.value}))} /></div>
                  <div><Label>モード</Label>
                    {definedModes.length === 0 ? (
                      <div style={{fontSize:11,color:"#E0A060",background:"#2A2418",border:"1px solid #5A4A20",borderRadius:8,padding:"8px 10px"}}>
                        先に「＋ モードを追加」でモードを作成してください
                      </div>
                    ) : (
                      <select value={matchForm.mode} onChange={e=>{
                        const mn = e.target.value;
                        const def = definedModes.find(d=>d.name===mn);
                        setMatchForm(f=>({...f, mode:mn, category: def?(def.category||"official"):f.category, compType: def?def.compType:f.compType, cupRound: (def&&def.compType==="league")?"":f.cupRound }));
                      }}>
                        <option value="">モードを選択</option>
                        {definedModes.map(m=><option key={m.name} value={m.name}>{m.name}</option>)}
                      </select>
                    )}
                  </div>
                </div>
                {/* カップ戦・リーグ&カップ戦のラウンド選択 */}
                {(() => {
                  const def = definedModes.find(d=>d.name===matchForm.mode);
                  if (!def) return null;
                  if (def.compType === "cup") {
                    return (
                      <div style={{marginBottom:9}}>
                        <Label>ラウンド</Label>
                        <select value={matchForm.cupRound||""} onChange={e=>setMatchForm(f=>({...f,cupRound:e.target.value}))}>
                          <option value="">選択してください</option>
                          {CUP_ROUNDS.map(r=><option key={r.v} value={r.v}>{r.l}</option>)}
                        </select>
                      </div>
                    );
                  }
                  if (def.compType === "league_cup") {
                    return (
                      <div style={{marginBottom:9}}>
                        <Label>ラウンド（リーグフェーズ または カップのラウンド）</Label>
                        <select value={matchForm.cupRound||""} onChange={e=>setMatchForm(f=>({...f,cupRound:e.target.value}))}>
                          <option value="">選択してください</option>
                          {LEAGUE_CUP_ROUNDS.map(r=><option key={r.v} value={r.v}>{r.l}</option>)}
                        </select>
                      </div>
                    );
                  }
                  return null;
                })()}
                {matchForm.mode && (
                  <div style={{display:"flex",gap:10,alignItems:"center",background:`${modeColor(matchForm.mode)}1A`,border:`1px solid ${modeColor(matchForm.mode)}55`,borderRadius:10,padding:"10px 12px",marginBottom:9}}>
                    <label style={{flexShrink:0,cursor:"pointer"}} title="モードのロゴを登録">
                      <input type="file" accept="image/*" style={{display:"none"}}
                        onChange={e=>{handleModeLogo(matchForm.mode, e.target.files?.[0]); e.target.value="";}} />
                      {modeLogo(matchForm.mode)
                        ? <img src={modeLogo(matchForm.mode)} alt="" style={{width:64,height:64,objectFit:"contain",display:"block",filter:"drop-shadow(0 1px 2px rgba(0,0,0,.4))"}} />
                        : <div style={{width:64,height:64,borderRadius:8,background:"#16281A",border:"2px dashed #5A7C60",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>🏆</div>}
                    </label>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:10,color:"#A6C8A6",marginBottom:5}}>「{MODE_LABELS[matchForm.mode]||matchForm.mode}」のイメージカラー</div>
                      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                        {["#66CCFF","#4ADEDE","#7FE08A","#C8F135","#FFE066","#FFB830","#FF9966","#FF6FB5","#A78BFA","#FF5C5C"].map(col=>(
                          <button key={col} onClick={()=>setModeColor(matchForm.mode, col)} style={{width:24,height:24,borderRadius:"50%",background:col,border:modeColor(matchForm.mode)===col?"3px solid #fff":"2px solid rgba(0,0,0,.3)",cursor:"pointer",flexShrink:0}} />
                        ))}

                    const rp = roster.find(r=>r.name===s.inFor);
                    return rp ? posNorm(rp.position||"") : "";
                  })();
                  // 交代で入る選手の候補: 退場選手のポジションを最優先、その後ロースター順（スタメン選択と同様）
                  const inCandidates = (() => {

                                style={{
                                  width:18,height:18,borderRadius:"50%",

                                  cursor:"pointer",padding:0,transition:"all .1s",flexShrink:0,
                                }} />

                            <input

                            value={matchForm.distances[name] ?? ""}
                            onChange={e=>{

                            style={{width:64,textAlign:"center",fontSize:13,fontWeight:700,color:"#66CCFF",padding:"5px 3px",background:"#16301C",border:"1px solid #2A4050"}}

                          <span style={{fontSize:11,color:"#88B088"}}>km</span>
                        </div>
                      </div>
                    );
                  })

                    <option value="in">加入</option><option value="out">放出</option>
                    <option value="loan_in">ローン（入）</option><option value="loan_out">ローン（出）</option>
                    <option value="youth">育成チーム昇格</option>
                    <option value="loan_back">ローンバック（復帰）</option>
                  </select>
                </div>
              </div>
              <div style={{marginBottom:8}}><Label>選手名</Label>
                {(tfForm.type==="out"||tfForm.type==="loan_out") && allPlayerNames.length>0 ? (
                  <select value={tfForm.playerName} onChange={e=>{
                    const n = e.target.value;
                    const rp = roster.find(p=>p.name===n);
                    setTfForm(f=>({...f, playerName:n, position: rp ? posNorm(rp.position) : f.position}));
                  }}>
                    <option value="">選手を選択</option>
                    {allPlayerNames.map(n=><option key={n} value={n}>{n}</option>)}
                  </select>
                ) : tfForm.type==="loan_back" ? (
                  loanedOutPlayers.length>0 ? (
                    <select value={tfForm.playerName} onChange={e=>{
                      const n = e.target.value;
                      const rp = roster.find(p=>p.name===n);
                      setTfForm(f=>({...f, playerName:n, position: rp ? posNorm(rp.position) : f.position}));
                    }}>
                      <option value="">ローン中の選手を選択</option>
                      {loanedOutPlayers.map(n=><option key={n} value={n}>{n}</option>)}
                    </select>
                  ) : (
                    <div style={{fontSize:12,color:"#88B088",background:"#173A20",border:"1px solid #3A6248",borderRadius:8,padding:"10px 12px"}}>
                      現在ローン中の選手がいません（先に「ローン（出）」を記録してください）
                    </div>
                  )
                ) : (
                  <input type="text" placeholder="例: 三笘薫" value={tfForm.playerName} onChange={e=>setTfForm(f=>({...f,playerName:e.target.value}))} />
                )}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                <div><Label>ポジション</Label>
                  <select value={tfForm.position} onChange={e=>setTfForm(f=>({...f,position:e.target.value}))}>
                    {ALL_POSITIONS.map(p=><option key={p} value={p}>{p}</option>)}
                  </select>
                </div>
                <div><Label>移籍金（任意）</Label><input type="text" placeholder={(tfForm.type==="youth"||tfForm.type==="loan_back")?"−（通常なし）":"例: €25M"} value={tfForm.fee} onChange={e=>setTfForm(f=>({...f,fee:e.target.value}))} disabled={tfForm.type==="youth"||tfForm.type==="loan_back"} style={(tfForm.type==="youth"||tfForm.type==="loan_back")?{opacity:.4}:{}} /></div>
              </div>
              {tfForm.type !== "youth" ? (
                <div style={{marginBottom:8}}><Label>{tfForm.type==="loan_back"?"復帰元クラブ（ローン先）":tfForm.type==="in"||tfForm.type==="loan_in"?"前所属クラブ":"移籍先クラブ"}</Label>
                  <input type="text" placeholder="例: ブライトン" value={tfForm.fromTo} onChange={e=>setTfForm(f=>({...f,fromTo:e.target.value}))} />
                </div>
              ) : (
                <div style={{marginBottom:8}}><Label>出身（任意）</Label>
                  <input type="text" placeholder="例: U-18、ユースアカデミー" value={tfForm.fromTo} onChange={e=>setTfForm(f=>({...f,fromTo:e.target.value}))} />
                </div>
              )}
              {(tfForm.type==="in"||tfForm.type==="loan_in"||tfForm.type==="youth"||tfForm.type==="loan_back") && (
                <div style={{marginBottom:8}}><Label>生年月日</Label>
                  <input type="date" value={tfForm.birthdate} onChange={e=>setTfForm(f=>({...f,birthdate:e.target.value}))} />
                </div>
              )}
              {(tfForm.type==="in"||tfForm.type==="loan_in"||tfForm.type==="youth"||tfForm.type==="loan_back") && (
                <div style={{marginBottom:8}}><Label>国籍</Label>
                  <select value={tfForm.country} onChange={e=>setTfForm(f=>({...f,country:e.target.value}))}>
                    {COUNTRIES.map(c=><option key={c.code||"none"} value={c.code}>{c.flag} {c.name}</option>)}
                  </select>
                </div>
              )}
              {(tfForm.type==="in"||tfForm.type==="loan_in"||tfForm.type==="youth"||tfForm.type==="loan_back") && (
                <div style={{marginBottom:8}}><Label>育成（ユース出身）</Label>
                  <div style={{display:"flex",gap:6}}>
                    {[[false,"いいえ"],[true,"🎓 ユース出身"]].map(([v,l])=>{
                      const active = (tfForm.type==="youth") ? v===true : tfForm.youth===v;
                      return (
                        <button key={String(v)} onClick={()=>setTfForm(f=>({...f,youth:v}))} disabled={tfForm.type==="youth"&&v===false} style={{flex:1,background:active?(v?"#3A2C58":"#2C5838"):"#1E3A28",color:active?(v?"#C9B6FF":"#C8F135"):"#88B088",border:"1px solid",borderColor:active?(v?"#6A4AAA":"#3C6440"):"#2C5838",borderRadius:8,padding:"8px 4px",fontSize:12,fontWeight:700,opacity:(tfForm.type==="youth"&&v===false)?.4:1}}>
                          {l}
                        </button>
                      );
                    })}
                  </div>
                  {tfForm.type==="youth" && <div style={{fontSize:9,color:"#88B088",marginTop:4}}>育成昇格は自動的にユース出身になります。</div>}
                </div>
              )}
              <div style={{marginBottom:12}}><Label>メモ（任意）</Label><textarea placeholder="メモ..." value={tfForm.note} onChange={e=>setTfForm(f=>({...f,note:e.target.value}))} style={{resize:"vertical",minHeight:44}} /></div>
              <button onClick={handleTransferSubmit} disabled={!tfForm.playerName} style={{width:"100%",background:"#C8F135",color:"#16301C",border:"none",borderRadius:9,padding:10,fontWeight:800,fontSize:13,opacity:tfForm.playerName?.8:.3}}>
                {editTransferId?"更新する":"移籍を記録してロースターに反映"}
              </button>
            </div>
          )}

          {/* transfer list */}
          <div style={{marginTop:12}}>
            {sortedTransfers.length===0
              ? <div style={{textAlign:"center",padding:"40px 0",color:"#5C8C66",fontSize:13}}>移籍情報がありません</div>
              : sortedTransfers.map(tf=>{
                const tc=TRANSFER_COLOR[tf.type]||"#aaa";
                return (
                  <div key={tf.id} style={{background:"#193A20",border:"1px solid #274A30",borderLeft:`3px solid ${tc}`,borderRadius:11,padding:"11px 13px",marginBottom:7}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:34,height:34,borderRadius:7,background:`${tc}22`,border:`1px solid ${tc}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:tc,flexShrink:0}}>
                        {TRANSFER_TYPES[tf.type]}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:14,fontWeight:700,color:"#F2FFF2",marginBottom:2}}>
                          {tf.playerName}
                          <span style={{fontSize:9,fontWeight:700,color:tc,background:`${tc}18`,borderRadius:4,padding:"2px 5px",marginLeft:6}}>{tf.position}</span>
                        </div>
                        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",fontSize:10,color:"#88B088"}}>
                          <span>{tf.date}</span>
                          <span style={{fontSize:9,background:"#184A26",color:"#88BE88",padding:"1px 5px",borderRadius:4,border:"1px solid #2C5A30"}}>{seasonOf(tf.date)}</span>
                          {tf.fromTo&&<span style={{color:"#A6C8A6"}}>{tf.type==="out"||tf.type==="loan_out"?"→":"←"} {tf.fromTo}</span>}
                          {tf.type==="youth"&&!tf.fromTo&&<span style={{color:"#A78BFA"}}>🎓 育成チームから昇格</span>}
                          {tf.fee&&<span style={{color:"#FFB830"}}>{parseFee(tf.fee)?formatFee(parseFee(tf.fee)):tf.fee}</span>}
                        </div>
                        {tf.note&&<div style={{fontSize:10,color:"#88B088",marginTop:3}}>📝 {tf.note}</div>}
                      </div>
                      <div style={{display:"flex",gap:4,flexShrink:0}}>
                        <button onClick={()=>startEditTransfer(tf)} style={{background:"transparent",border:"1px solid #3A6248",color:"#A6C8A6",borderRadius:6,padding:"4px 7px",fontSize:10}}>✏️</button>
                        <button onClick={()=>deleteTransfer(tf.id)} style={{background:"transparent",border:"none",color:"#5A7C60",fontSize:14,padding:"3px 4px"}}>✕</button>
                      </div>
                    </div>
                  </div>
                );
              })
            }
          </div>

          {/* 移籍収支 */}
          <div style={{background:"linear-gradient(135deg,#1E3A28,#0E1A10)",border:"1px solid #2C5838",borderRadius:11,padding:"12px 14px",marginTop:12}}>
            <SecTitle color="#FFB830">€ 移籍収支{transferSeason==="all"?"（通算）":`（${transferSeason}）`}</SecTitle>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:(transferSeason==="all"&&feeBalance.bySeason.length>1)?10:0}}>
              <div style={{background:"#16301C",borderRadius:8,padding:"9px 8px",textAlign:"center"}}>
                <div style={{fontSize:9,color:"#88B088",marginBottom:3}}>支出</div>
                <div style={{fontSize:14,fontWeight:900,color:"#FF5C5C"}}>{formatFee(feeBalance.total.spent)}</div>
              </div>
              <div style={{background:"#16301C",borderRadius:8,padding:"9px 8px",textAlign:"center"}}>
                <div style={{fontSize:9,color:"#88B088",marginBottom:3}}>収入</div>
                <div style={{fontSize:14,fontWeight:900,color:"#C8F135"}}>{formatFee(feeBalance.total.earned)}</div>
              </div>
              <div style={{background:"#16301C",borderRadius:8,padding:"9px 8px",textAlign:"center",border:`1px solid ${feeBalance.total.net>=0?"#3C6440":"#502A2A"}`}}>
                <div style={{fontSize:9,color:"#88B088",marginBottom:3}}>収支</div>
                <div style={{fontSize:14,fontWeight:900,color:feeBalance.total.net>=0?"#C8F135":"#FF5C5C"}}>
                  {feeBalance.total.net>0?"+":""}{formatFee(feeBalance.total.net)}
                </div>
              </div>
            </div>
            {/* シーズン別収支 */}
            {transferSeason==="all" && feeBalance.bySeason.length > 1 && (<>
              <div style={{display:"flex",fontSize:9,color:"#88B088",paddingBottom:4,borderBottom:"1px solid #274A30",marginBottom:4}}>
                <span style={{flex:1.2}}>シーズン</span>
                <span style={{flex:1,textAlign:"right"}}>支出</span>
                <span style={{flex:1,textAlign:"right"}}>収入</span>
                <span style={{flex:1,textAlign:"right"}}>収支</span>
              </div>
              {feeBalance.bySeason.map(fb=>(
                <div key={fb.season} style={{display:"flex",fontSize:11,padding:"5px 0",borderBottom:"1px solid #1E3A28",alignItems:"center"}}>
                  <span style={{flex:1.2,fontWeight:700,color:"#C8F135"}}>{fb.season}</span>
                  <span style={{flex:1,textAlign:"right",color:"#FF8080"}}>{fb.spent?formatFee(fb.spent):"−"}</span>
                  <span style={{flex:1,textAlign:"right",color:"#A0D880"}}>{fb.earned?formatFee(fb.earned):"−"}</span>
                  <span style={{flex:1,textAlign:"right",fontWeight:800,color:fb.net>=0?"#C8F135":"#FF5C5C"}}>{fb.net>0?"+":""}{formatFee(fb.net)}</span>
                </div>
              ))}
            </>)}
            <div style={{fontSize:9,color:"#5A7C60",marginTop:7}}>※「€25M」「25M」「500K」のような表記の移籍金を自動計算します（M=百万, K=千）。育成昇格は対象外です。</div>
          </div>

          {/* summary */}
          <div style={{background:"#173A20",border:"1px solid #2C5838",borderRadius:11,padding:"12px 14px",marginTop:12}}>
            <SecTitle>移籍サマリー{transferSeason!=="all"&&`（${transferSeason}）`}</SecTitle>
            <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:6}}>
              {[["in","加入"],["out","放出"],["loan_in","ローン入"],["loan_out","ローン出"],["youth","育成昇格"],["loan_back","ローン復帰"]].map(([type,label])=>{
                const count=scopedTransfers.filter(t=>t.type===type).length;
                const c=TRANSFER_COLOR[type];
                return (
                  <div key={type} style={{background:"#16301C",borderRadius:8,padding:"9px 11px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:11,color:"#88B088"}}>{label}</span>
                    <span style={{fontSize:18,fontWeight:900,color:c}}>{count}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </>)}

      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<SoccerTracker />);
</script>
</body>
</html>
