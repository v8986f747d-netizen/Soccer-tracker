                      {/* 得点者（簡易） */}
                      {scf.length>0 && (() => {
                        const counts = {};
                        const order = [];
                        scf.forEach(s => {
                          const label = s.type === "og" ? `${s.name}(OG)` : s.name;
                          if (!(label in counts)) { counts[label] = 0; order.push(label); }
                          counts[label]++;
                        });
                        const text = order.map(l => counts[l] > 1 ? `${l}×${counts[l]}` : l).join("、");
                        return <div style={{marginTop:9,textAlign:"center",fontSize:10,color:"#FFB830"}}>⚽ {text}</div>;
                      })()}
                    </div>
                    {isExp&&(
                      <div onClick={(e)=>e.stopPropagation()} style={{borderTop:`1px solid ${modeColor(match.mode)}55`,padding:"11px 13px",background:`linear-gradient(180deg, ${modeColor(match.mode)}1E, ${modeColor(match.mode)}08 70%), #16281A`}}>
                        {match.mom&&<div style={{display:"flex",alignItems:"center",gap:7,background:"#2A2418",border:"1px solid #C8A020",borderRadius:8,padding:"8px 11px",marginBottom:10}}>
                          <span style={{fontSize:16}}>🏅</span>
                          <span style={{fontSize:10,color:"#C8A020",fontWeight:700}}>MOM</span>
                          <span style={{fontSize:13,fontWeight:900,color:"#F5D060"}}>{match.mom}</span>
                        </div>}
                        {match.hasPk&&(match.pkTakers||[]).filter(t=>t.name).length>0&&<div style={{marginBottom:10,background:"#1A2E18",border:"1px solid #2A4A22",borderRadius:8,padding:"9px 11px"}}>
                          <div style={{fontSize:10,fontWeight:700,color:"#C8F135",marginBottom:6}}>⚽ PK戦 {match.pkMy||0}-{match.pkOpp||0}</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:"5px 12px"}}>
                            {(match.pkTakers||[]).filter(t=>t.name).map((tk,i)=>(
                              <span key={i} style={{fontSize:11,display:"inline-flex",alignItems:"center",gap:4,color:tk.scored===true?"#C8F135":tk.scored===false?"#FF8080":"#88B088"}}>
                                <span style={{fontSize:13}}>{tk.scored===true?"⚽":tk.scored===false?"❌":"・"}</span>{tk.name}
                              </span>
                            ))}
                          </div>
                        </div>}
                        {scf.length>0&&<div style={{marginBottom:10}}>
                          <SecTitle color="#FFB830">⚽ 得点 / アシスト</SecTitle>
                          <div style={{display:"flex",flexDirection:"column",gap:4}}>
                            {scf.map((sc,i)=>(
                              <div key={i} style={{background:"#1A2E18",border:"1px solid #2A4A22",borderRadius:6,padding:"5px 9px",fontSize:11,display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                                <span style={{color:"#FFB830"}}>⚽</span>
                                <span onClick={()=>setProfilePlayer(sc.name)} style={{color:"#F2FFF2",fontWeight:700,cursor:"pointer",textDecoration:"underline",textDecorationColor:"#3C6440"}}>{sc.name}</span>
                                {GT[sc.type]&&<span style={{fontSize:9,color:"#C8F135",background:"#173820",borderRadius:3,padding:"1px 4px"}}>{GT[sc.type]}</span>}
                                {sc.minute&&<span style={{fontSize:9,color:"#88B088"}}>{sc.minute}'</span>}
                                {sc.assist&&<><span style={{color:"#5C8C66",fontSize:10}}>→</span><span style={{color:"#66CCFF",fontSize:10}}>🅰 {sc.assist}</span></>}
                              </div>
                            ))}
                          </div>
                        </div>}
                        {sf.length>0&&(()=>{
                          // 表示モードに応じた選手別データと合計を計算
                          const mode = pitchInfoMode;
                          const namesAll = [...sf.map(p=>p.name), ...subf.map(p=>p.name)];
                          const infoMap = {};
                          let summary = "";
                          if (mode === "fee") {
                            let total = 0;
                            sf.forEach(p => { const v = feeMap[p.name]; if (v) { infoMap[p.name] = formatFee(v); total += v; } });
                            subf.forEach(p => { const v = feeMap[p.name]; if (v) infoMap[p.name] = formatFee(v); });
                            summary = "総額 " + formatFee(total);
                          } else if (mode === "age") {
                            let sum = 0, cnt = 0;
                            sf.forEach(p => { const a = ageAt(rosterByName[p.name]?.birthdate, match.date); if (a!=null) { infoMap[p.name] = a + "歳"; sum += a; cnt++; } });
                            subf.forEach(p => { const a = ageAt(rosterByName[p.name]?.birthdate, match.date); if (a!=null) infoMap[p.name] = a + "歳"; });
                            summary = cnt > 0 ? "平均 " + (sum/cnt).toFixed(1) + "歳" : "";
                          } else if (mode === "market") {
                            let total = 0;
                            sf.forEach(p => { const v = parseFee(marketValueMap[p.name]); if (v) { infoMap[p.name] = formatFee(v); total += v; } });
                            subf.forEach(p => { const v = parseFee(marketValueMap[p.name]); if (v) infoMap[p.name] = formatFee(v); });
                            summary = total > 0 ? "総額 " + formatFee(total) : "";
                          }
                          return (
                          <div style={{marginBottom:10}}>
                            <SecTitle>🟢 スタメン</SecTitle>
                            {/* 表示切替ボタン */}
                            <div style={{display:"flex",gap:5,marginBottom:8,flexWrap:"wrap"}}>
                              {[["none","通常"],["fee","💰 移籍金"],["market","📈 市場価値"],["age","🎂 年齢"],["country","🏳 国籍"]].map(([k,l])=>(
                                <button key={k} onClick={()=>setPitchInfoMode(k)} style={{flex:"1 1 0",minWidth:62,background:mode===k?"#C8F135":"#173A20",color:mode===k?"#16301C":"#A6C8A6",border:"1px solid",borderColor:mode===k?"#C8F135":"#3A6248",borderRadius:8,padding:"6px 4px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{l}</button>
                              ))}
                            </div>
                            {/* 左上の合計表示 */}
                            {summary && (
                              <div style={{display:"inline-block",background:"#16301C",border:"1px solid #C8F135",color:"#C8F135",fontSize:12,fontWeight:900,borderRadius:8,padding:"4px 10px",marginBottom:6}}>{summary}</div>
                            )}
                            <FormationPitch starting={sf} ratings={match.ratings||{}} subs={subf} photoMap={photoMap} youthMap={youthMap} countryMap={countryMap} infoMap={infoMap} pitchMode={mode} scorers={scf} cardsMap={match.cards||{}} onPlayerClick={setProfilePlayer} />
                          </div>
                          );
                        })()}
                        {subf.length>0&&<div>
                          <SecTitle color="#FFD066">🔄 交代</SecTitle>
                          {subf.map((s,i)=>{
                            const rv = match.ratings?.[s.name];
                            const rs = parseFloat(rv);
                            const rc2 = ratingColorOf(rs);
                            return (
                              <div key={i} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,marginBottom:3}}>
                                {s.minute&&<span style={{fontSize:10,color:"#88B088",minWidth:22}}>{s.minute}'</span>}
                                <span onClick={()=>setProfilePlayer(s.name)} style={{color:"#C8F135",fontWeight:600,cursor:"pointer",textDecoration:"underline",textDecorationColor:"#3C6440"}}>↑ {s.name}</span>
                                {rc2&&<span style={{background:rc2,color:"#16301C",fontSize:9,fontWeight:900,borderRadius:6,padding:"0px 4px"}}>{rv}</span>}
                                {s.inFor&&<><span style={{color:"#5C8C66"}}>→</span><span style={{color:"#A6C8A6"}}>↓ {s.inFor}</span></>}
                              </div>
                            );
                          })}
                        </div>}
                        {match.ratings&&Object.keys(match.ratings).filter(k=>match.ratings[k]!=="").length>0&&<div style={{marginTop:10}}>
                          <SecTitle color="#A78BFA">⭐ 選手評価</SecTitle>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 10px"}}>
                            {Object.entries(match.ratings).filter(([,v])=>v!=="").sort((a,b)=>b[1]-a[1]).map(([name,score])=>{
                              const s=parseFloat(score);
                              const rc=ratingColorOf(s);
                              return (
                                <div key={name} style={{display:"flex",alignItems:"center",gap:5,fontSize:11}}>
                                  <span style={{flex:1,color:"#E0F4E0"}}>{name}</span>
                                  <div style={{display:"flex",gap:2}}>
                                    {[...Array(10)].map((_,i)=>{
                                      const full=i+1<=Math.floor(s);
                                      const half=i+1===Math.ceil(s)&&s%1!==0;
                                      return <div key={i} style={{width:6,height:6,borderRadius:"50%",background:full?rc:half?`linear-gradient(90deg,${rc} 50%,#274A30 50%)`:"#274A30"}} />;
                                    })}
                                  </div>
                                  <span style={{fontWeight:900,color:rc,minWidth:20,textAlign:"right"}}>{score}</span>
                                </div>
                              );
                            })}
                          </div>
                        </div>}
                        {match.cards&&Object.entries(match.cards).filter(([,c])=>c&&c.r>0).length>0&&<div style={{marginTop:9,borderTop:"1px solid #274A30",paddingTop:8}}>
                          <div style={{display:"flex",flexWrap:"wrap",gap:"5px 10px"}}>
                            {Object.entries(match.cards).filter(([,c])=>c&&c.r>0).map(([name,c])=>(
                              <span key={name} style={{fontSize:11,color:"#E0A0A0",display:"inline-flex",alignItems:"center",gap:4}}>
                                🟥 {name}{c.rMin?<span style={{color:"#E08080",fontWeight:700}}>（{c.rMin}分）</span>:null}
                              </span>
                            ))}
                          </div>
                        </div>}
                        {(() => {
                          const injured = roster.filter(p => isInjuredOn(p, match.date));
                          if (injured.length === 0) return null;
                          return (
                            <div style={{marginTop:9,borderTop:"1px solid #274A30",paddingTop:8}}>
                              <SecTitle color="#E08080">🩹 負傷離脱中</SecTitle>
                              <div style={{display:"flex",flexWrap:"wrap",gap:"5px 10px"}}>
                                {injured.map(p=>(
                                  <span key={p.id} style={{fontSize:11,color:"#E0A0A0"}}>🩹 {p.name}{p.injuredUntil?<span style={{color:"#C89090"}}>（〜{p.injuredUntil.slice(5)}）</span>:<span style={{color:"#C89090"}}>（復帰未定）</span>}</span>
                                ))}
                              </div>
                            </div>
                          );
                        })()}
                        {match.note&&<div style={{marginTop:9,fontSize:11,color:"#88B088",borderTop:"1px solid #274A30",paddingTop:7}}>📝 {match.note}</div>}
                      </div>
                    )}
                  </div>
    );
  };

  // 選手プロフィール用データ（試合履歴・通算/シーズン別集計・移籍歴）
  const profileData = useMemo(() => {
    if (!profilePlayer) return null;
    const name = profilePlayer;
    const rows = [];
    const scopedM = profileScope === "official" ? matches.filter(m => catOf(m) === "official") : matches;
    scopedM.forEach(m => {
      const started = (m.starting||[]).some(p => p.name === name);
      const subEntry = (m.subs||[]).find(s => s.name === name);
      const goals = (m.scorers||[]).filter(sc => sc.name === name && sc.type !== "og").length;
      const assists = (m.scorers||[]).filter(sc => sc.assist === name).length;
      const card = (m.cards||{})[name] || { y:0, r:0 };
      const ratingRaw = (m.ratings||{})[name];
      if (!started && !subEntry) return;
      // 出場時間
      const subOffAt = {}, subOnAt = {};
      (m.subs||[]).forEach(s => {
        const min = parseInt(s.minute);
        if (s.inFor) subOffAt[s.inFor] = isNaN(min) ? null : min;
        if (s.name)  subOnAt[s.name]   = isNaN(min) ? null : min;
      });
      let minutes = 0;
      const FT = m.extraTime ? 120 : 90; // 延長戦なら満了120分
      // レッドカードの退場時間（あればその時間で退場扱い）
      const redOffAt = {};
      Object.entries(m.cards||{}).forEach(([nm, c]) => {
        if (c && c.r > 0 && c.rMin != null && c.rMin !== "") {
          const rm = parseInt(c.rMin);
          if (!isNaN(rm)) redOffAt[nm] = rm;
        }
      });
      // 退場時間 = 交代退場とレッドカード退場のうち早い方
      const offTimeOf = (nm, fallback) => {
        const cand = [];
        if (nm in subOffAt && subOffAt[nm] != null) cand.push(subOffAt[nm]);
        if (nm in redOffAt) cand.push(redOffAt[nm]);
        return cand.length ? Math.min(...cand) : fallback;
      };
      if (started) {
        minutes = Math.min(offTimeOf(name, FT), FT);
      } else {
        const on = subOnAt[name];
        if (on != null) {
          const off = offTimeOf(name, FT);
          minutes = Math.max(0, Math.min(off, FT) - Math.min(on, FT));
        }
      }
      rows.push({
        id: m.id, date: m.date, opponent: m.opponent,
        myScore: m.myScore, opponentScore: m.opponentScore, mode: m.mode,
        season: seasonOf(m.date), started, minutes, goals, assists,
        y: card.y||0, r: card.r||0,
        cs: m.opponentScore === 0,
        rating: ratingRaw !== undefined && ratingRaw !== "" ? parseFloat(ratingRaw) : null,
        distance: (m.distances && m.distances[name] !== undefined && m.distances[name] !== "") ? parseFloat(m.distances[name]) : null,
      });
    });
    rows.sort((a,b) => new Date(b.date) - new Date(a.date));
    const agg = (list) => {
      const rated = list.filter(r => r.rating != null);
      return {
        apps: list.length,
        starts: list.filter(r => r.started).length,
        minutes: list.reduce((s,r)=>s+r.minutes,0),
        goals: list.reduce((s,r)=>s+r.goals,0),
        assists: list.reduce((s,r)=>s+r.assists,0),
        y: list.reduce((s,r)=>s+r.y,0),
        r: list.reduce((s,r)=>s+r.r,0),
        cleanSheets: list.filter(r=>r.cs).length,
        avgRating: rated.length ? rated.reduce((s,r)=>s+r.rating,0)/rated.length : null,
        avgDistance: (() => { const d = list.filter(r => r.distance != null); return d.length ? d.reduce((s,r)=>s+r.distance,0)/d.length : null; })(),
      };
    };
    const total = agg(rows);
    const seasonsP = [...new Set(rows.map(r => r.season))].sort().reverse();
    const bySeason = seasonsP.map(s => ({ season: s, ...agg(rows.filter(r => r.season === s)) }));
    const tfs = transfers.filter(t => t.playerName === name).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const rosterEntry = roster.find(p => p.name === name);
    const grp = rosterEntry ? posGroup(rosterEntry.position) : null;
    const isDefensive = grp === "GK" || grp === "DF";
    const mvHistory = [];
    if (rosterEntry && rosterEntry.marketValues) {
      Object.entries(rosterEntry.marketValues).forEach(([k, v]) => {
        const val = parseFee(v);
        if (val > 0) {
          const [y, s] = k.split("-");
          mvHistory.push({ key: k, label: `${y}年${s === "summer" ? "夏" : "冬"}`, date: new Date(`${y}-${s === "summer" ? "07" : "01"}-01`).getTime(), value: val, raw: v });
        }
      });
      mvHistory.sort((a, b) => a.date - b.date);
    }
    return { name, rows, total, bySeason, tfs, rosterEntry, isDefensive, youth: rosterEntry ? !!rosterEntry.youth : false, country: rosterEntry ? (rosterEntry.country || "") : "", birthdate: rosterEntry ? (rosterEntry.birthdate || "") : "", marketValue: marketValueMap[name] || "", mvHistory };
  }, [profilePlayer, profileScope, matches, transfers, roster]);

  // 過去に入力されたモード一覧（デフォルト + 試合履歴のユニーク値）
  const MODE_LABELS = { ranked:"ランク戦", friendly:"フレンドリー", cup:"カップ戦" };
  const usedModes = useMemo(() => {
    // 実際に試合で使われたモードのみ（試合数が多い順、同数は名前順）
    const fromMatches = matches.map(m => m.mode).filter(Boolean);
    const all = [...new Set(fromMatches)];
    const count = {};
    fromMatches.forEach(m => { count[m] = (count[m] || 0) + 1; });
    return all.sort((a, b) => {
      const ca = count[a] || 0, cb = count[b] || 0;
      if (ca !== cb) return cb - ca;
      return String(a).localeCompare(String(b), "ja");
    });
  }, [matches]);

  const rosterByGroup = useMemo(() => {
    const groups = { GK:[], DF:[], MF:[], FW:[] };
    activeRoster.forEach(p => { const g = posGroup(p.position); if (groups[g]) groups[g].push(p); });
    return groups;
  }, [activeRoster]);

  const filteredRoster = useMemo(() => {
    const list = rosterPosFilter === "ALL"
      ? [...activeRoster]
      : activeRoster.filter(p => posGroup(p.position) === rosterPosFilter);
    // FC26準拠の順: GK→LB→CB→RB→CDM→CM→LM→CAM→RM→LW→ST→RW、同ポジションは背番号順
    return list.sort((a, b) => {
      const pa = ROSTER_ORDER.indexOf(posNorm(a.position));
      const pb = ROSTER_ORDER.indexOf(posNorm(b.position));
      if (pa !== pb) return (pa === -1 ? 99 : pa) - (pb === -1 ? 99 : pb);
      const na = parseInt(a.number), nb = parseInt(b.number);
      if (!isNaN(na) && !isNaN(nb)) return na - nb;
      if (!isNaN(na)) return -1;
      if (!isNaN(nb)) return 1;
      return String(a.name).localeCompare(String(b.name), "ja");
    });
  }, [activeRoster, rosterPosFilter]);

  // シーズン一覧（新しい順）
  const seasons = useMemo(() => {
    const set = new Set(matches.map(m => seasonOf(m.date)));
    return [...set].sort().reverse();
  }, [matches]);

  // 選択シーズンの試合
  const seasonMatches = useMemo(() => {
    if (seasonFilter === "all") return matches;
    return matches.filter(m => seasonOf(m.date) === seasonFilter);
  }, [matches, seasonFilter]);

  // カテゴリ → モード → ホーム/アウェイ で絞り込み（シーズン選択後に適用）
  const scopedMatches = useMemo(() => {
    let list = seasonMatches;
    if (categoryFilter !== "all") {
      list = list.filter(m => catOf(m) === categoryFilter);
      if (modeFilter !== "all") list = list.filter(m => m.mode === modeFilter);
    }
    if (venueFilter !== "all") list = list.filter(m => m.venue === venueFilter);
    return list;
  }, [seasonMatches, categoryFilter, modeFilter, venueFilter]);

  const stats = useMemo(() => calcStats(scopedMatches), [scopedMatches]);
  const winRate = stats.total > 0 ? Math.round(stats.wins/stats.total*100) : 0;

  // シーズン別の集計一覧（全シーズン表示用）
  const seasonBreakdown = useMemo(() =>
    seasons.map(s => ({ season: s, ...calcStats(matches.filter(m => seasonOf(m.date) === s)) })),
  [seasons, matches]);

  // 歴代全選手の個人成績（通算 / シーズン別）
  const playerStats = useMemo(() => {
    let scope = playerSeason === "all" ? matches : matches.filter(m => seasonOf(m.date) === playerSeason);
    if (playerCategory !== "all") {
      scope = scope.filter(m => catOf(m) === playerCategory);
      if (playerMode !== "all") scope = scope.filter(m => m.mode === playerMode);
    }
    if (playerVenue !== "all") scope = scope.filter(m => m.venue === playerVenue);
    const map = {};
    const ensure = (name) => {
      if (!map[name]) map[name] = { name, starts:0, subApps:0, goals:0, assists:0, yellows:0, reds:0, ratingSum:0, ratingCount:0, minutes:0, cleanSheets:0, distSum:0, distCount:0 };
      return map[name];
    };
    scope.forEach(m => {
      const subsArr = (m.subs||[]).filter(s => s.name);
      // 交代退場時間マップ: 選手名 → 退場した分
      const offAt = {};
      subsArr.forEach(s => { if (s.inFor && s.minute) offAt[s.inFor] = parseInt(s.minute); });

      const isCleanSheet = m.opponentScore === 0;
      const FT = m.extraTime ? 120 : 90; // 延長戦なら満了120分
      // レッドカード退場時間を offAt に統合（交代退場と早い方を採用）
      Object.entries(m.cards||{}).forEach(([nm, c]) => {
        if (c && c.r > 0 && c.rMin != null && c.rMin !== "") {
          const rm = parseInt(c.rMin);
          if (!isNaN(rm)) offAt[nm] = (offAt[nm] != null) ? Math.min(offAt[nm], rm) : rm;
        }
      });
      (m.starting||[]).forEach(p => {
        if (!p.name) return;
        const e = ensure(p.name);
        e.starts++;
        if (isCleanSheet) e.cleanSheets++;
        // 先発: 交代/退場していればその分まで、していなければ満了まで
        e.minutes += offAt[p.name] != null ? Math.min(offAt[p.name], FT) : FT;
      });
      subsArr.forEach(s => {
        const e = ensure(s.name);
        e.subApps++;
        // 途中出場: 投入分から満了まで（さらに交代/退場していればそこまで）
        if (s.minute) {
          const on = parseInt(s.minute);
          const off = offAt[s.name] != null ? Math.min(offAt[s.name], FT) : FT;
          e.minutes += Math.max(0, off - Math.min(on, FT));
        }
      });
      (m.scorers||[]).forEach(sc => {
        if (sc.name && sc.type !== "og") ensure(sc.name).goals++;
        if (sc.assist) ensure(sc.assist).assists++;
      });
      Object.entries(m.cards||{}).forEach(([name, c]) => {
        if (!c) return;
        const e = ensure(name);
        e.yellows += c.y||0; e.reds += c.r||0;
      });
      Object.entries(m.ratings||{}).forEach(([name, v]) => {
        const n = parseFloat(v);
        if (!isNaN(n)) { const e = ensure(name); e.ratingSum += n; e.ratingCount++; }
      });
      Object.entries(m.distances||{}).forEach(([name, v]) => {
        const n = parseFloat(v);
        if (!isNaN(n)) { const e = ensure(name); e.distSum += n; e.distCount++; }
      });
    });
    const list = Object.values(map).map(p => {
      const rp = roster.find(r => r.name === p.name);
      const grp = rp ? posGroup(rp.position) : null;
      return {
        ...p,
        apps: p.starts + p.subApps,
        avgRating: p.ratingCount > 0 ? (p.ratingSum / p.ratingCount) : null,
        avgDistance: p.distCount > 0 ? (p.distSum / p.distCount) : null,
        isDefensive: grp === "GK" || grp === "DF",
        youth: rp ? !!rp.youth : false,
        country: rp ? (rp.country || "") : "",
        birthdate: rp ? (rp.birthdate || "") : "",
      };
    });
    const sorters = {
      goals:   (a,b)=> b.goals - a.goals || b.assists - a.assists,
      assists: (a,b)=> b.assists - a.assists || b.goals - a.goals,
      apps:    (a,b)=> b.apps - a.apps || b.minutes - a.minutes,
      minutes: (a,b)=> b.minutes - a.minutes,
      rating:  (a,b)=> (b.avgRating??-1) - (a.avgRating??-1),
    };
    return list.sort(sorters[playerSort] || sorters.goals);
  }, [matches, playerSeason, playerCategory, playerMode, playerVenue, playerSort, roster]);

  const filteredMatches = useMemo(() => {
    let list = [...scopedMatches].sort((a,b) => new Date(b.date)-new Date(a.date));
    if (filter !== "all") list = list.filter(m => getResult(m.myScore,m.opponentScore) === filter);
    return list;
  }, [scopedMatches, filter]);

  // ベストイレブン: 利用可能な月・年の一覧（評価のある試合から）
  const bestElevenOptions = useMemo(() => {
    const months = new Set(), years = new Set();
    matches.forEach(m => {
      if (!m.date) return;
      const hasRating = m.ratings && Object.values(m.ratings).some(v => v !== "" && v != null);
      if (!hasRating) return;
      months.add(m.date.slice(0, 7)); // YYYY-MM
      years.add(m.date.slice(0, 4));  // YYYY
    });
    return {
      months: [...months].sort().reverse(),
      years: [...years].sort().reverse(),
    };
  }, [matches]);

  // 選択された期間のベストイレブン
  const bestEleven = useMemo(() => {
    if (!bestElevenPeriod) return null;
    const { type, key } = bestElevenPeriod;
    const list = matches.filter(m => {
      if (!m.date) return false;
      return type === "month" ? m.date.slice(0, 7) === key : m.date.slice(0, 4) === key;
    });
    return computeBestEleven(list, roster);
  }, [bestElevenPeriod, matches, roster]);

  // 移籍に存在するシーズン一覧（新しい順）
  const transferSeasons = useMemo(() => {
    const set = new Set(transfers.map(t => seasonOf(t.date)));
    return [...set].sort().reverse();
  }, [transfers]);

  // 選択シーズンの移籍
  const scopedTransfers = useMemo(() => {
    if (transferSeason === "all") return transfers;
    return transfers.filter(t => seasonOf(t.date) === transferSeason);
  }, [transfers, transferSeason]);

  const sortedTransfers = useMemo(() =>
    [...scopedTransfers].sort((a,b) => new Date(b.date)-new Date(a.date)),
  [scopedTransfers]);

  // 移籍収支（支出 = 加入・ローン入の移籍金 / 収入 = 放出・ローン出の移籍金）
  const feeBalance = useMemo(() => {
    const calc = (list) => {
      let spent = 0, earned = 0;
      list.forEach(t => {
        const fee = parseFee(t.fee);
        if (!fee) return;
        if (t.type === "in" || t.type === "loan_in") spent += fee;
        else if (t.type === "out" || t.type === "loan_out") earned += fee;
      });
      return { spent, earned, net: earned - spent };
    };
    const total = calc(scopedTransfers);
    const seasonSet = [...new Set(transfers.map(t => seasonOf(t.date)))].sort().reverse();
    const bySeason = seasonSet.map(s => ({ season: s, ...calc(transfers.filter(t => seasonOf(t.date) === s)) }));
    return { total, bySeason };
  }, [transfers, scopedTransfers]);

  // ── match form helpers ─────────────────────────────────────────────────────
  const matchStartingNames = matchForm.starting.filter(p=>p.name).map(p=>p.name);
  const matchSubNames      = matchForm.subs.filter(s=>s.name).map(s=>s.name);
  const matchAllNames      = [...new Set([...matchStartingNames,...matchSubNames])];
  // 評価入力用: ポジション順（GK→DF→MF→FW）に並べた選手リスト。スタメンを先に、控えを後に。
  const matchRatingNames = useMemo(() => {
    const posOf = {};
    // スタメンのポジション
    matchForm.starting.forEach(p => { if (p.name) posOf[p.name] = posNorm(p.pos || ""); });
    // 交代選手は「交代で出る相手（inFor）」のポジションを引き継ぐ（連鎖交代にも対応するため複数回反復）
    for (let pass = 0; pass < 3; pass++) {
      matchForm.subs.forEach(s => {
        if (!s.name) return;
        if (!posOf[s.name] && s.inFor && posOf[s.inFor]) { posOf[s.name] = posOf[s.inFor]; }
      });
    }
    // それでも未設定の選手はロースターから補完
    matchAllNames.forEach(nm => {
      if (!posOf[nm]) { const rp = roster.find(r => r.name === nm); if (rp) posOf[nm] = posNorm(rp.position || ""); }
    });
    const orderIdx = (nm) => {
      const i = ROSTER_ORDER.indexOf(posOf[nm]);
      return i === -1 ? 99 : i;
    };
    // スタメン・交代の区別なく全員ポジション順
    return [...matchAllNames].sort((a, b) => {
      const d = orderIdx(a) - orderIdx(b);
      if (d !== 0) return d;
      return String(a).localeCompare(String(b), "ja");
    });
  }, [matchAllNames, matchForm.starting, matchForm.subs, roster]);

  const addScorer   = () => setMatchForm(f=>({...f, scorers:[...f.scorers,{id:Date.now(),name:"",assist:"",minute:"",type:"normal"}]}));
  const removeScorer = id => setMatchForm(f=>({...f, scorers:f.scorers.filter(s=>s.id!==id)}));
  const updateScorer = (id,k,v) => setMatchForm(f=>({...f, scorers:f.scorers.map(s=>s.id===id?{...s,[k]:v}:s)}));

  // スタメン選択用: 枠のポジションに合わせて候補選手を並べ替え
  // ① 同じポジション → ② 同じグループ（RBならDF全体など） → ③ その他
  // 各階層内は FC26順（ROSTER_ORDER）→ 背番号順
  const playersForSlot = (slotPos) => {
    const sp = posNorm(slotPos);
    const sg = posGroup(sp);
    const tier = (p) => {
      const pp = posNorm(p.position);
      if (pp === sp) return 0;
      if (posGroup(pp) === sg) return 1;
      return 2;
    };
    return [...activeRoster].sort((a, b) => {
      const ta = tier(a), tb = tier(b);
      if (ta !== tb) return ta - tb;
      const pa = ROSTER_ORDER.indexOf(posNorm(a.position));
      const pb = ROSTER_ORDER.indexOf(posNorm(b.position));
      if (pa !== pb) return (pa === -1 ? 99 : pa) - (pb === -1 ? 99 : pb);
      const na = parseInt(a.number), nb = parseInt(b.number);
      if (!isNaN(na) && !isNaN(nb)) return na - nb;
      if (!isNaN(na)) return -1;
      if (!isNaN(nb)) return 1;
      return String(a.name).localeCompare(String(b.name), "ja");
    });
  };

  // 直近の試合のフォーメーション（ポジション構成）を引き継いだ空のスタメン枠を作る
  const startingFromLastMatch = (sourceMatches = matches) => {
    const last = [...sourceMatches].sort((a, b) => new Date(b.date) - new Date(a.date))[0];
    if (last?.starting?.length === 11 && last.starting.every(p => p.pos)) {
      return last.starting.map((p, i) => ({ id: i, pos: posNorm(p.pos), name: "" }));
    }
    return EMPTY_STARTING();
  };

  // カップ戦の試合結果をトーナメント表に反映する
  const syncMatchToBracket = (m) => {
    if (!m.mode || !m.cupRound || m.cupRound === "league_phase") return;
    const def = modeStyles[m.mode];
    if (!def || !def.bracket || !(def.compType === "cup" || def.compType === "league_cup")) return;
    const myTeam = currentSave?.teamName || "";
    if (!myTeam) return;
    const roundIdx = def.bracket.rounds.findIndex(r => r.key === m.cupRound);
    // 3位決定戦
    if (m.cupRound === "third" && def.bracket.thirdPlace) {
      const tp = def.bracket.thirdPlace;
      // 自チームがA/Bどちらかにいる枠に反映、いなければAに自チーム・Bに相手
      let field = tp.teamA === myTeam ? "A" : tp.teamB === myTeam ? "B" : (tp.teamA === m.opponent ? "B" : "A");
      const myF = field, opF = field === "A" ? "B" : "A";
      updateModeBracket(m.mode, (br) => ({
        ...br,
        thirdPlace: {
          ...br.thirdPlace,
          ["team" + myF]: myTeam, ["team" + opF]: m.opponent,
          ["score" + myF]: String(m.myScore), ["score" + opF]: String(m.opponentScore),
        },
      }));
      return;
    }
    if (roundIdx === -1) return;
    // 自チームが含まれる枠を優先的に探す。なければ空き枠、それもなければ最初の枠
    updateModeBracket(m.mode, (br) => {
      const round = br.rounds[roundIdx];
      let target = round.matches.find(x => x.teamA === myTeam || x.teamB === myTeam);
      if (!target) target = round.matches.find(x => (!x.teamA || !x.teamB) || (x.scoreA === "" && x.scoreB === ""));
      if (!target) target = round.matches[0];
      if (!target) return br;
      // 自チームの位置を決める（既存配置を尊重、なければA）
      const myField = target.teamB === myTeam ? "B" : "A";
      const opField = myField === "A" ? "B" : "A";
      const legs = round.legs || 1;
      // 2試合制で第1戦が既に入力済みなら第2戦に記録
      const useLeg2 = legs === 2 && target["score" + myField] !== "" && target["score" + opField] !== "";
      const sMy = useLeg2 ? "score" + myField + "2" : "score" + myField;
      const sOp = useLeg2 ? "score" + opField + "2" : "score" + opField;
      const updatedMatch = {
        ...target,
        ["team" + myField]: myTeam,
        ["team" + opField]: m.opponent,
        [sMy]: String(m.myScore),
        [sOp]: String(m.opponentScore),
      };
      // PK戦で勝者が決まっている場合は winner も設定（1試合制 or 2試合制の最終戦）
      if (m.hasPk && m.pkMy !== "" && m.pkOpp !== "" && m.myScore === m.opponentScore) {
        updatedMatch.winner = parseInt(m.pkMy) > parseInt(m.pkOpp) ? myTeam : m.opponent;
      }
      const rounds = br.rounds.map((r, ri) => ri === roundIdx
        ? { ...r, matches: r.matches.map(x => x.slot === target.slot ? updatedMatch : x) }
        : r);
      // 勝者を次ラウンドへ伝播（setBracketMatchと同じ処理）
      const nb = { ...br, rounds };
      for (let ri = 0; ri < nb.rounds.length - 1; ri++) {
        nb.rounds[ri].matches.forEach((mm, mi) => {
          const w = bracketWinner(mm, nb.rounds[ri].legs || 1);
          const nextSlot = Math.floor(mi / 2);
          const nextField = mi % 2 === 0 ? "teamA" : "teamB";
          const nm = nb.rounds[ri + 1].matches[nextSlot];
          if (nm && w && nm[nextField] !== w) {
            nb.rounds[ri + 1] = { ...nb.rounds[ri + 1], matches: nb.rounds[ri + 1].matches.map(x => x.slot === nextSlot ? { ...x, [nextField]: w } : x) };
          }
        });
      }
      return nb;
    });
  };

  const handleMatchSubmit = () => {
    if (!matchForm.myTeam||!matchForm.opponent||matchForm.myScore===""||matchForm.opponentScore==="") return;
    const m = {
      id: editMatchId || Date.now(),
      date: matchForm.date, myTeam: matchForm.myTeam, opponent: matchForm.opponent,
      myScore: parseInt(matchForm.myScore), opponentScore: parseInt(matchForm.opponentScore),
      category: matchForm.category || "official", compType: matchForm.compType || "league", cupRound: matchForm.cupRound || "", venue: matchForm.venue || "home",
      mode: matchForm.mode, note: matchForm.note,
      starting: matchForm.starting, subs: matchForm.subs, scorers: matchForm.scorers, ratings: matchForm.ratings, cards: matchForm.cards, distances: matchForm.distances, extraTime: !!matchForm.extraTime, hasPk: !!matchForm.hasPk, pkMy: matchForm.pkMy, pkOpp: matchForm.pkOpp, mom: matchForm.mom,
    };
    if (editMatchId) {
      setMatches(prev => prev.map(x => x.id === editMatchId ? m : x));
    } else {
      setMatches(prev => [...prev, m]);
      setFlash(getResult(m.myScore, m.opponentScore));
      setTimeout(() => setFlash(null), 2000);
      // 市場価値の更新窓（夏/冬）の最初の試合なら、市場価値入力を促す
      const win = marketWindowOf(m.date);
      if (win) {
        const already = matches.some(x => marketWindowOf(x.date) === win);
        if (!already) {
          const draft = {};
          activeRoster.forEach(p => { draft[p.name] = (p.marketValues && p.marketValues[win]) || ""; });
          setMarketDraft(draft);
          setMarketPrompt({ windowKey: win });
        }
      }
    }
    // カップ戦ならトーナメント表に反映（機能削除のため無効化）
    // syncMatchToBracket(m);
    setMatchForm({
      ...INITIAL_MATCH_FORM(),
      myTeam: currentSave?.teamName || "",
      category: m.category || "official",
      venue: m.venue || "home",
      mode: m.mode || "",
      starting: m.starting?.length === 11 ? m.starting.map((p, i) => ({ id: i, pos: posNorm(p.pos), name: "" })) : EMPTY_STARTING(),
    });
    setMatchFormTab("basic");
    setIsNewMode(false);
    setEditMatchId(null);
    setShowMatchForm(false);
  };

  // 市場価値入力を確定（各選手の marketValues[windowKey] に保存）
  const saveMarketValues = () => {
    if (!marketPrompt) return;
    const win = marketPrompt.windowKey;
    setRoster(prev => prev.map(p => {
      const v = marketDraft[p.name];
      if (v === undefined) return p;
      const mv = { ...(p.marketValues || {}) };
      if (v === "" || v == null) { delete mv[win]; } else { mv[win] = v; }
      return { ...p, marketValues: mv };
    }));
    setMarketPrompt(null);
    setMarketDraft({});
  };
  const skipMarketValues = () => { setMarketPrompt(null); setMarketDraft({}); };

  const startEditMatch = (match) => {
    // 古いデータ形式でも欠けがないように補完（交代枠9・各種マップ）
    const subs = [...(match.subs || [])];
    while (subs.length < 9) subs.push({ id: subs.length, name: "", inFor: "", minute: "" });
    setMatchForm({
      date: match.date,
      myTeam: match.myTeam, opponent: match.opponent,
      myScore: String(match.myScore), opponentScore: String(match.opponentScore),
      category: match.category || "official", venue: match.venue || "home",
      mode: match.mode || "", note: match.note || "",
      starting: match.starting?.length ? match.starting : EMPTY_STARTING(),
      subs,
      scorers: match.scorers || [],
      ratings: match.ratings || {},
      distances: match.distances || {},
      extraTime: !!match.extraTime,
      hasPk: !!match.hasPk, pkMy: match.pkMy || "", pkOpp: match.pkOpp || "", pkTakers: match.pkTakers || [], mom: match.mom || "",
      compType: match.compType || "league", cupRound: match.cupRound || "",
      cards: match.cards || {},
    });
    setEditMatchId(match.id);
    setIsNewMode(false);
    setMatchFormTab("basic");
    setShowMatchForm(true);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  // ── transfer helpers ───────────────────────────────────────────────────────
  const handleTransferSubmit = () => {
    if (!tfForm.playerName || !tfForm.type) return;
    const tf = { ...tfForm, youth: tfForm.type === "youth" ? true : !!tfForm.youth, id: editTransferId || Date.now() };

    if (editTransferId) {
      setTransfers(prev => prev.map(t => t.id === editTransferId ? tf : t));
    } else {
      setTransfers(prev => [tf, ...prev]);
    }

    // sync roster
    if (tfForm.type === "in" || tfForm.type === "loan_in" || tfForm.type === "youth" || tfForm.type === "loan_back") {
      // add player if not exists
      const exists = roster.find(p => p.name === tfForm.playerName);
      if (!exists) {
        setRoster(prev => [...prev, {
          id: Date.now()+1, name: tfForm.playerName,
          position: tfForm.position, number: "", status: "active",
          photo: tfForm.photo || "", youth: !!tf.youth, country: tf.country || "", birthdate: tf.birthdate || "", fee: tf.fee || "",
        }]);
      } else {
        setRoster(prev => prev.map(p => p.name === tfForm.playerName
          ? {...p, status:"active", youth: p.youth || !!tf.youth, country: tf.country || p.country || "", birthdate: tf.birthdate || p.birthdate || "", ...(tfForm.photo ? { photo: tfForm.photo } : {})}
          : p));
      }
    } else if (tfForm.type === "out" || tfForm.type === "loan_out") {
      setRoster(prev => prev.map(p => p.name === tfForm.playerName ? {...p, status:"inactive"} : p));
    }

    setTfForm(INITIAL_TRANSFER_FORM());
    setEditTransferId(null);
    setShowTransferForm(false);
  };

  const startEditTransfer = (tf) => {
    setTfForm({ ...tf });
    setEditTransferId(tf.id);
    setShowTransferForm(true);
  };

  const deleteTransfer = (id) => setTransfers(prev => prev.filter(t => t.id !== id));

  // ── roster helpers ─────────────────────────────────────────────────────────
  const handleTfPhoto = async (file) => {
    if (!file) return;
    try {
      const dataUrl = await resizePhotoToDataURL(file);
      setTfForm(f => ({ ...f, photo: dataUrl }));

  const handleNewPlayerPhoto = async (file) => {

    try {
      const dataUrl = await resizePhotoToDataURL(file);
      setNewPlayer(p => ({ ...p, photo: dataUrl }));
    } catch (e) { console.error("photo error", e); }
  };

  const handleRosterPhotoChange = async (playerId, file) => {
    if (!file) return;
    try {
      const dataUrl = await resizePhotoToDataURL(file);
      setRoster(prev => prev.map(p => p.id === playerId ? { ...p, photo: dataUrl } : p));
    } catch (e) { console.error("photo error", e); }
  };

  const addPlayerManually = () => {
    if (!newPlayer.name) return;
    setRoster(prev => [...prev, { id: Date.now(), ...newPlayer, status: "active" }]);
    setNewPlayer({ name:"", position:"CM", number:"", photo:"", youth:false, country:"", birthdate:"", fee:"" });
    setShowAddPlayer(false);
  };
  const removeFromRoster = (id) => setRoster(prev => prev.map(p => p.id===id ? {...p,status:"inactive"} : p));

  // ── 選手編集 ──────────────────────────────────────────────────────────
  const [editingPlayerId, setEditingPlayerId] = useState(null);
  const [editPlayerForm, setEditPlayerForm] = useState({ name:"", position:"CM", number:"", youth:false, country:"", birthdate:"", fee:"" });

  const startEditPlayer = (player) => {
    setEditingPlayerId(player.id);
    setEditPlayerForm({ name: player.name, position: posNorm(player.position), number: player.number || "", youth: !!player.youth, country: player.country || "", birthdate: player.birthdate || "", fee: player.fee || "", injuredFrom: player.injuredFrom || "", injuredUntil: player.injuredUntil || "" });
  };

  // 名前変更時は過去の試合データ・移籍記録の名前もすべて更新（戦績を維持）
  const savePlayerEdit = (player) => {
    const newName = editPlayerForm.name.trim();
    if (!newName) return;
    const oldName = player.name;

    setRoster(prev => prev.map(p => p.id === player.id
      ? { ...p, name: newName, position: editPlayerForm.position, number: editPlayerForm.number, youth: !!editPlayerForm.youth, country: editPlayerForm.country || "", birthdate: editPlayerForm.birthdate || "", fee: editPlayerForm.fee || "", injuredFrom: editPlayerForm.injuredFrom || "", injuredUntil: editPlayerForm.injuredUntil || "" }
      : p));

    if (newName !== oldName) {
      const renameKeys = (obj) => {
        if (!obj || !(oldName in obj)) return obj;
        const next = { ...obj };
        next[newName] = next[oldName];
        delete next[oldName];
        return next;
      };
      setMatches(prev => prev.map(m => ({
        ...m,
        starting: (m.starting||[]).map(p => p.name === oldName ? { ...p, name: newName } : p),
        subs: (m.subs||[]).map(s => ({
          ...s,
          name: s.name === oldName ? newName : s.name,
          inFor: s.inFor === oldName ? newName : s.inFor,
        })),
        scorers: (m.scorers||[]).map(sc => ({
          ...sc,
          name: sc.name === oldName ? newName : sc.name,
          assist: sc.assist === oldName ? newName : sc.assist,
        })),
        ratings: renameKeys(m.ratings),
        cards: renameKeys(m.cards),
      })));
      setTransfers(prev => prev.map(t => t.playerName === oldName ? { ...t, playerName: newName } : t));
    }
    setEditingPlayerId(null);
  };

  // ── render: セーブ選択画面 ────────────────────────────────────────────────
  if (!currentSave) {
    return (
      <div style={{minHeight:"100vh",background:"#1E4A2C",color:"#fff",fontFamily:"'Inter','Helvetica Neue',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",padding:"0 16px"}}>
        <style>{`
          *{box-sizing:border-box}
          input{background:#274A30;border:1px solid #3A6248;color:#fff;border-radius:8px;padding:11px 13px;font-size:14px;width:100%;outline:none;font-family:inherit}
          input:focus{border-color:#C8F135;box-shadow:0 0 0 2px rgba(200,241,53,.12)}
          input::placeholder{color:#88B088}
          button{cursor:pointer;font-family:inherit}
          @keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
        `}</style>

        <div style={{maxWidth:480,width:"100%",paddingTop:56,paddingBottom:48}}>
          {/* ロゴ */}
          <div style={{textAlign:"center",marginBottom:36}}>
            <div style={{fontSize:48,marginBottom:8}}>⚽</div>
            <div style={{fontSize:10,letterSpacing:4,color:"#C8F135",textTransform:"uppercase",marginBottom:5}}>Match Tracker</div>
            <h1 style={{margin:0,fontSize:26,fontWeight:800,letterSpacing:-1}}>試合結果ログ</h1>
          </div>

          {/* 既存セーブ一覧 */}
          {saveSummaries.length > 0 && (
            <div style={{marginBottom:24}}>
              <div style={{fontSize:10,fontWeight:700,color:"#A6C8A6",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>セーブデータを選択</div>
              {saveSummaries.map(s=>(
                <div key={s.id} style={{marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <button onClick={()=>selectSave(s)} style={{flex:1,background:"#1E3A28",border:"1px solid #3A6248",borderRadius:12,padding:"14px 16px",textAlign:"left",color:"inherit",transition:"all .15s"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:5}}>
                        <span style={{fontSize:16,fontWeight:800,color:"#F2FFF2"}}>{s.teamName}</span>
                        <span style={{fontSize:11,color:"#C8F135",fontWeight:700}}>進む →</span>
                      </div>
                      <div style={{display:"flex",gap:10,fontSize:11,color:"#88B088",flexWrap:"wrap"}}>
                        <span>{s.total}試合</span>
                        <span><span style={{color:"#C8F135"}}>{s.wins}勝</span> <span style={{color:"#AAAAAA"}}>{s.draws}分</span> <span style={{color:"#FF5C5C"}}>{s.losses}敗</span></span>
                        {s.last && <span>最終: {s.last}</span>}
                      </div>
                    </button>
                    <button onClick={()=>exportSave(s)}
                      title="バックアップを書き出し" style={{background:"transparent",border:"1px solid #3A6248",color:"#A6C8A6",borderRadius:8,padding:"8px 9px",fontSize:12,flexShrink:0}}>
                      📤
                    </button>
                    <button onClick={()=>setDeleteConfirmId(deleteConfirmId===s.id?null:s.id)}
                      title="セーブ削除" style={{background:deleteConfirmId===s.id?"#3A1A1A":"transparent",border:"1px solid #3A2A2A",color:deleteConfirmId===s.id?"#FF8080":"#7A5050",borderRadius:8,padding:"8px 9px",fontSize:12,flexShrink:0}}>
                      🗑
                    </button>
                  </div>
                  {/* アプリ内の削除確認（OSダイアログ非依存） */}
                  {deleteConfirmId===s.id && (
                    <div style={{display:"flex",alignItems:"center",gap:8,background:"#2A1414",border:"1px solid #5A2A2A",borderRadius:10,padding:"10px 12px",marginTop:6,animation:"slideDown .2s ease-out"}}>
                      <span style={{flex:1,fontSize:11,color:"#FFB0B0",lineHeight:1.5}}>
                        「{s.teamName}」を削除しますか？{s.id==="legacy"&&"（旧バージョンのデータも完全に削除されます）"}この操作は取り消せません。
                      </span>
                      <button onClick={()=>setDeleteConfirmId(null)} style={{background:"#2A4030",border:"1px solid #3A6248",color:"#A6C8A6",borderRadius:8,padding:"8px 12px",fontSize:12,fontWeight:700,flexShrink:0}}>
                        やめる
                      </button>
                      <button onClick={()=>{deleteSave(s.id);setDeleteConfirmId(null);}} style={{background:"#E03A3A",border:"none",color:"#fff",borderRadius:8,padding:"8px 12px",fontSize:12,fontWeight:800,flexShrink:0}}>
                        削除する
                      </button>
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}

          {/* 新規作成 */}
          <div style={{background:"#173A20",border:"1px solid #2C5838",borderRadius:13,padding:"16px"}}>
            <div style={{fontSize:10,fontWeight:700,color:"#C8F135",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>+ 新しくはじめる</div>
            <div style={{fontSize:11,color:"#A6C8A6",marginBottom:5}}>チーム名</div>
            <input type="text" placeholder="例: レアルFC" value={newTeamName}
              onChange={e=>setNewTeamName(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter") createSave(newTeamName); }} />
            <button onClick={()=>createSave(newTeamName)} disabled={!newTeamName.trim()}
              style={{width:"100%",marginTop:10,background:"#C8F135",color:"#16301C",border:"none",borderRadius:9,padding:12,fontWeight:800,fontSize:14,opacity:newTeamName.trim()?1:.35}}>
              このチームではじめる →
            </button>
            <button onClick={()=>createSave(newTeamName.trim()||"バルセロナ", true)}
              style={{width:"100%",marginTop:8,background:"transparent",color:"#88B088",border:"1px dashed #3A6248",borderRadius:9,padding:9,fontWeight:700,fontSize:11}}>
              サンプルで試す（バルセロナ 25-26 実データ）
            </button>
            <label style={{display:"block",width:"100%",marginTop:8,background:"transparent",color:"#66AACC",border:"1px dashed #2A4050",borderRadius:9,padding:9,fontWeight:700,fontSize:11,textAlign:"center",cursor:"pointer"}}>
              📥 バックアップファイルから復元
              <input type="file" accept=".json,application/json" style={{display:"none"}}
                onChange={e=>{importSave(e.target.files?.[0]); e.target.value="";}} />
            </label>
          </div>

          <div style={{fontSize:10,color:"#5A7C60",textAlign:"center",marginTop:20,lineHeight:1.7}}>
            セーブデータはこの端末のブラウザに保存されます。Safariとホーム画面アプリは保存領域が別なので、<span style={{color:"#88B088"}}>必ず同じ開き方</span>で使ってください。<br/>
            📤でバックアップを書き出しておくと、機種変更や万一の時も📥から復元できます。
          </div>
        </div>
      </div>
    );
  }

  // ── render: アプリ本体 ───────────────────────────────────────────────────
  return (
    <div style={{minHeight:"100vh",background:"#1E4A2C",color:"#fff",fontFamily:"'Inter','Helvetica Neue',sans-serif",paddingBottom:60}}>

      {/* flash */}
      {flash && (
        <div style={{position:"fixed",inset:0,zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.75)",animation:"fadeOut 2s forwards",pointerEvents:"none"}}>
          <div style={{fontSize:88,fontWeight:900,color:RESULT_COLOR[flash],letterSpacing:-4,textShadow:`0 0 50px ${RESULT_COLOR[flash]}`,animation:"scaleIn .3s ease-out"}}>
            {flash==="win"?"WIN！":flash==="loss"?"LOSS":"DRAW"}
          </div>
        </div>
      )}

      <style>{`
        @keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
        @keyframes scaleIn{from{transform:scale(.4)}to{transform:scale(1)}}
        @keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
        *{box-sizing:border-box}
        input,select,textarea{background:#274A30;border:1px solid #3A6248;color:#fff;border-radius:8px;padding:8px 10px;font-size:13px;width:100%;outline:none;font-family:inherit}
        input:focus,select:focus,textarea:focus{border-color:#C8F135;box-shadow:0 0 0 2px rgba(200,241,53,.12)}
        input::placeholder,textarea::placeholder{color:#88B088}
        select option{background:#274A30}
        button{cursor:pointer;font-family:inherit}
      `}</style>

      {/* ── カレンダー ─────────────────────────────────────────────────── */}
      {/* 市場価値入力モーダル（夏/冬の最初の試合後に強制表示） */}
      {marketPrompt && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.78)",zIndex:1000,display:"flex",flexDirection:"column",padding:"calc(env(safe-area-inset-top) + 56px) 0 0"}}>
          <div style={{flex:1,overflowY:"auto",padding:"0 16px 16px",maxWidth:520,width:"100%",margin:"0 auto"}}>
            <div style={{textAlign:"center",marginBottom:14}}>
              <div style={{fontSize:11,letterSpacing:2,color:"#C8F135",marginBottom:4}}>📈 市場価値の更新</div>
              <div style={{fontSize:18,fontWeight:900,color:"#F2FFF2"}}>{marketWindowLabel(marketPrompt.windowKey)}の市場価値</div>
              <div style={{fontSize:11,color:"#88B088",marginTop:6}}>各選手の市場価値を入力してください（例: €200M）。<br/>入力せずに進むこともできます。</div>
            </div>
            {activeRosterSorted.map(p => (
              <div key={p.id} style={{display:"flex",alignItems:"center",gap:8,background:"#173A20",borderRadius:9,padding:"8px 11px",marginBottom:7}}>
                {photoMap[p.name]
                  ? <img src={photoMap[p.name]} alt="" style={{width:30,height:30,borderRadius:"50%",objectFit:"cover",flexShrink:0}} />
                  : <span style={{width:30,height:30,borderRadius:"50%",background:"#274A30",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#88B088",flexShrink:0}}>{p.name[0]}</span>}
                <span style={{flex:1,fontSize:13,fontWeight:700,color:"#E0F4E0",minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</span>
                <input type="text" inputMode="text" placeholder="€−" value={marketDraft[p.name] ?? ""}
                  onChange={e=>setMarketDraft(d=>({...d,[p.name]:e.target.value}))}
                  style={{width:90,flexShrink:0,textAlign:"center",fontSize:13,fontWeight:700,color:"#C8F135",padding:"6px 4px",background:"#16301C",border:"1px solid #3A6248"}} />
              </div>
            ))}
            <div style={{display:"flex",gap:8,marginTop:14,position:"sticky",bottom:0,paddingBottom:12,background:"linear-gradient(180deg,transparent,#1E4A2C 30%)"}}>
              <button onClick={skipMarketValues} style={{flex:1,background:"#173A20",color:"#A6C8A6",border:"1px solid #3A6248",borderRadius:10,padding:12,fontWeight:700,fontSize:13}}>記入せずに進む</button>
              <button onClick={saveMarketValues} style={{flex:2,background:"#C8F135",color:"#16301C",border:"none",borderRadius:10,padding:12,fontWeight:800,fontSize:13}}>保存する ✓</button>
            </div>
          </div>
        </div>
      )}

      {showCalendar && !calendarMatchId && (() => {
        const y = calMonth.getFullYear(), mo = calMonth.getMonth();
        const first = new Date(y, mo, 1);
        const startDow = first.getDay(); // 0=日
        const daysInMonth = new Date(y, mo + 1, 0).getDate();
        // 日付(YYYY-MM-DD) → その日の試合配列
        const byDate = {};
        matches.forEach(m => { (byDate[m.date] = byDate[m.date] || []).push(m); });
        const cells = [];
        for (let i = 0; i < startDow; i++) cells.push(null);
        for (let d = 1; d <= daysInMonth; d++) {
          const key = `${y}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
          cells.push({ d, key, games: byDate[key] || [] });
        }
        const venueTag = (v) => v==="home"?"H":v==="away"?"A":v==="neutral"?"N":"";
        const monthGames = matches.filter(m => { const dt=new Date(m.date); return dt.getFullYear()===y && dt.getMonth()===mo; });
        const prevMonth = () => setCalMonth(new Date(y, mo-1, 1));
        const nextMonth = () => setCalMonth(new Date(y, mo+1, 1));
        return (
          <div onClick={()=>setShowCalendar(false)} style={{position:"fixed",inset:0,zIndex:880,background:"rgba(0,0,0,.8)",display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"calc(env(safe-area-inset-top) + 56px) 0 24px"}}>
            <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:640,margin:"0 10px",background:"#193A22",border:"1px solid #3A6248",borderRadius:16,padding:"16px 14px 22px"}}>
              {/* header */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <button onClick={prevMonth} style={{background:"#1E3A28",border:"1px solid #3A6248",color:"#C8F135",borderRadius:9,padding:"7px 13px",fontSize:15,fontWeight:800}}>‹</button>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:17,fontWeight:900,color:"#F2FFF2"}}>{y}年 {mo+1}月</div>
                  <div style={{fontSize:10,color:"#88B088",marginTop:2}}>{monthGames.length}試合</div>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={nextMonth} style={{background:"#1E3A28",border:"1px solid #3A6248",color:"#C8F135",borderRadius:9,padding:"7px 13px",fontSize:15,fontWeight:800}}>›</button>
                  <button onClick={()=>setShowCalendar(false)} style={{background:"#274A30",border:"1px solid #3A6248",color:"#A6C8A6",borderRadius:9,padding:"7px 11px",fontSize:14}}>✕</button>
                </div>
              </div>
              {/* 曜日 */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:3}}>
                {["日","月","火","水","木","金","土"].map((w,i)=>(
                  <div key={w} style={{textAlign:"center",fontSize:9,fontWeight:700,color:i===0?"#FF8080":i===6?"#66AACC":"#88B088",padding:"2px 0"}}>{w}</div>
                ))}
              </div>
              {/* 日付グリッド */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
                {cells.map((c,i)=>(
                  <div key={i} style={{minHeight:54,borderRadius:7,border:c&&c.games.length?"1px solid #3A6248":"1px solid #14241622",background:c&&c.games.length?"#102016":"#0A140C",padding:"3px 2px",display:"flex",flexDirection:"column",gap:2}}>
                    {c && (<>
                      <div onClick={()=>{ setSelectedDate(c.key); if(c.games.length){ setShowCalendar(false); setCalendarMatchId(c.games[0].id); } else { setShowCalendar(false); } }}
                        style={{fontSize:9,color:c.key===selectedDate?"#16301C":(i%7===0)?"#C07070":(i%7===6)?"#6090B0":"#A6C8A6",fontWeight:c.key===selectedDate?900:600,paddingLeft:2,background:c.key===selectedDate?"#C8F135":"transparent",borderRadius:3,cursor:"pointer"}}>{c.d}</div>
                      {c.games.map(g=>{
                        const res = getResult(g.myScore, g.opponentScore);
                        return (
                          <div key={g.id} onClick={()=>{setShowCalendar(false);setCalendarMatchId(g.id);}}
                            style={{background:`${modeColor(g.mode)}33`,borderLeft:`2px solid ${RESULT_COLOR[res]}`,borderRadius:3,padding:"2px 2px 2px 3px",cursor:"pointer"}}>
                            <div style={{display:"flex",justifyContent:"center",marginBottom:1}}>
                              <Emblem name={g.opponent} src={emblems[g.opponent]} size={18} />
                            </div>
                            <div style={{display:"flex",alignItems:"center",gap:2,marginTop:1}}>
                              <span style={{fontSize:8,fontWeight:900,color:RESULT_COLOR[res]}}>{g.myScore}-{g.opponentScore}</span>
                              {g.venue && <span style={{fontSize:6.5,fontWeight:800,color:"#66AACC",background:"#16242E",borderRadius:2,padding:"0 2px"}}>{venueTag(g.venue)}</span>}
                            </div>
                          </div>
                        );
                      })}
                    </>)}
                  </div>
                ))}
              </div>
              {/* 凡例 */}
              <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:14,fontSize:9,color:"#88B088",flexWrap:"wrap"}}>
                <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:"#C8F135",marginRight:3}} />勝</span>
                <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:"#AAAAAA",marginRight:3}} />分</span>
                <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:"#FF5C5C",marginRight:3}} />負</span>
                <span>H=ホーム / A=アウェイ / N=中立地</span>
              </div>
            </div>
          </div>
        );
      })()}

      {/* カレンダーから選んだ試合の詳細（試合記録と同じ表示） */}
      {calendarMatchId && (() => {
        const gm = matches.find(m => m.id === calendarMatchId);
        const back = () => { setCalendarMatchId(null); setShowCalendar(true); };
        if (!gm) return null;
        return (
          <div onClick={back} style={{position:"fixed",inset:0,zIndex:890,background:"rgba(0,0,0,.85)",display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"calc(env(safe-area-inset-top) + 56px) 0 24px"}}>
            <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:640,margin:"0 10px"}}>
              <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
                <button onClick={back} style={{background:"#274A30",border:"1px solid #3A6248",color:"#C8F135",borderRadius:9,padding:"7px 13px",fontSize:13,fontWeight:700}}>← カレンダーに戻る</button>
              </div>
              <div key="cal-detail">{renderMatchCard(gm, { forceExpand: true, hideActions: true })}</div>
            </div>
          </div>
        );
      })()}

      {/* 一覧から開く全画面詳細（カレンダー詳細と同じ表示方法） */}
      {detailMatchId && (() => {
        const gm = matches.find(m => m.id === detailMatchId);
        const back = () => setDetailMatchId(null);
        if (!gm) return null;
        return (
          <div onClick={back} style={{position:"fixed",inset:0,zIndex:890,background:"rgba(0,0,0,.85)",display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"calc(env(safe-area-inset-top) + 56px) 0 24px"}}>
            <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:640,margin:"0 10px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <button onClick={()=>{ startEditMatch(gm); setDetailMatchId(null); }} style={{background:"#173A20",border:"1px solid #3A6248",color:"#A6C8A6",borderRadius:9,padding:"7px 13px",fontSize:13,fontWeight:700}}>✏️ 編集</button>
                <button onClick={back} style={{background:"#274A30",border:"1px solid #3A6248",color:"#C8F135",borderRadius:9,padding:"7px 13px",fontSize:13,fontWeight:700}}>← 一覧に戻る</button>
              </div>
              <div key="list-detail">{renderMatchCard(gm, { forceExpand: true, hideActions: true })}</div>
            </div>
          </div>
        );
      })()}

      {/* ── 対戦相手の累積成績モーダル ─────────────────────────────────── */}
      {opponentRecord && (
        <div onClick={()=>setOpponentView(null)} style={{position:"fixed",inset:0,zIndex:910,background:"rgba(0,0,0,.82)",display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"calc(env(safe-area-inset-top) + 56px) 0 24px"}}>
          <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:640,margin:"0 10px",background:"#193A22",border:"1px solid #3A6248",borderRadius:16,padding:"18px 16px 24px"}}>
            {/* header */}
            <div style={{display:"flex",alignItems:"center",gap:13,marginBottom:16}}>
              <Emblem name={opponentRecord.name} src={emblems[opponentRecord.name]} size={56} />
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:18,fontWeight:900,color:"#F2FFF2",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{opponentRecord.name}</div>
                <div style={{fontSize:11,color:"#88B088",marginTop:2}}>通算 {opponentRecord.total} 試合</div>
              </div>
              <label style={{flexShrink:0,cursor:"pointer"}}>
                <input type="file" accept="image/*" style={{display:"none"}}
                  onChange={e=>{handleEmblemUpload(opponentRecord.name, e.target.files?.[0]); e.target.value="";}} />
                <span style={{fontSize:10,color:"#66AACC",border:"1px solid #2A4050",borderRadius:7,padding:"6px 9px",display:"inline-block"}}>🛡️ 画像</span>
              </label>

                      <polyline points={pts} fill="none" stroke="#A78BFA" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
                      {data.map((r,i)=>(
