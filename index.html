                const gColor={GK:"#66CCFF",DF:"#C8F135",MF:"#FFD066",FW:"#FF9966"}[g];
                return (
                  <div key={player.id} style={{background:"#15120A",border:"1px dashed #4A3A20",borderLeft:`3px solid #FFB83088`,borderRadius:11,padding:"10px 13px",marginBottom:6,display:"flex",alignItems:"center",gap:10,opacity:.92}}>
                    {player.photo
                      ? <img src={player.photo} alt={player.name} style={{width:36,height:36,borderRadius:"50%",objectFit:"cover",flexShrink:0,filter:"grayscale(.35)"}} />
                      : <div style={{width:36,height:36,borderRadius:"50%",background:"#2A2418",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                          <span style={{fontSize:8,fontWeight:700,color:gColor}}>{posNorm(player.position)}</span>
                        </div>}
                    <div style={{flex:1,minWidth:0}}>
                      <div onClick={()=>setProfilePlayer(player.name)} style={{fontSize:13,fontWeight:700,color:"#C8B890",marginBottom:2,cursor:"pointer"}}>{player.name}{player.country&&flagOf(player.country)&&<span title="国籍" style={{marginLeft:5,fontSize:12}}>{flagOf(player.country)}</span>}{player.youth&&<span title="ユース出身" style={{marginLeft:4,fontSize:10}}>🎓</span>}</div>
                      <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                        <span style={{fontSize:9,fontWeight:700,color:gColor,background:`${gColor}14`,border:`1px solid ${gColor}33`,borderRadius:4,padding:"1px 5px"}}>{posNorm(player.position)}</span>
                        {player.number && <span style={{fontSize:10,color:"#7A6A4A"}}>#{player.number}</span>}
                        {player.loanTo && <span style={{fontSize:10,color:"#FFB830"}}>→ {player.loanTo}</span>}
                        {player.loanSince && <span style={{fontSize:9,color:"#6A5A3A"}}>{player.loanSince}〜</span>}
                      </div>
                    </div>
                    <span style={{fontSize:9,fontWeight:800,background:"#FFB830",color:"#1A1408",borderRadius:5,padding:"3px 7px",flexShrink:0}}>レンタル中</span>
                  </div>
                );
              })}
              <div style={{fontSize:9,color:"#88B088",marginTop:5}}>※ 移籍情報タブの「ローンバック（復帰）」で在籍に戻せます。</div>
            </div>
          )}

          {/* summary */}
          <div style={{background:"#173A20",border:"1px solid #2C5838",borderRadius:11,padding:"12px 14px",marginTop:12}}>
            <SecTitle>ロースター構成</SecTitle>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
              {["GK","DF","MF","FW"].map(g=>{
                const count={GK:activeRoster.filter(p=>posGroup(p.position)==="GK").length,DF:activeRoster.filter(p=>posGroup(p.position)==="DF").length,MF:activeRoster.filter(p=>posGroup(p.position)==="MF").length,FW:activeRoster.filter(p=>posGroup(p.position)==="FW").length}[g];
                const c={GK:"#66CCFF",DF:"#C8F135",MF:"#FFD066",FW:"#FF9966"}[g];
                return (
                  <div key={g} style={{background:"#16301C",borderRadius:8,padding:"9px 5px",textAlign:"center"}}>
                    <div style={{fontSize:20,fontWeight:900,color:c,lineHeight:1}}>{count}</div>
                    <div style={{fontSize:10,color:"#88B088",marginTop:2}}>{g}</div>
                  </div>
                );
              })}
            </div>
            <div style={{marginTop:8,fontSize:11,color:"#88B088",textAlign:"center"}}>
              合計 <span style={{color:"#C8F135",fontWeight:700}}>{activeRoster.length}</span> 人在籍
            </div>
          </div>
        </>)}

        {/* ══════════════════════ TRANSFERS TAB ════════════════════════════ */}
        {mainTab === "transfers" && (<>

          {/* season selector */}
          {transferSeasons.length > 0 && (
            <div style={{display:"flex",gap:6,marginTop:12,overflowX:"auto",paddingBottom:2}}>
              <button onClick={()=>setTransferSeason("all")} style={{flexShrink:0,background:transferSeason==="all"?"#C8F135":"#1E3A28",color:transferSeason==="all"?"#16301C":"#A6C8A6",border:"1px solid",borderColor:transferSeason==="all"?"#C8F135":"#2C5838",borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>
                通算
              </button>
              {transferSeasons.map(s=>(
                <button key={s} onClick={()=>setTransferSeason(s)} style={{flexShrink:0,background:transferSeason===s?"#C8F135":"#1E3A28",color:transferSeason===s?"#16301C":"#A6C8A6",border:"1px solid",borderColor:transferSeason===s?"#C8F135":"#2C5838",borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>
                  {s}
                </button>
              ))}
            </div>
          )}

          {/* transfer form */}
          {showTransferForm&&(
            <div style={{background:"#1E3A28",border:"1px solid #3A6248",borderRadius:13,padding:15,marginTop:12,animation:"slideDown .25s ease-out"}}>
              <SecTitle color="#C8F135">{editTransferId?"✏️ 移籍情報を編集":"+ 移籍情報を追加"}</SecTitle>
              {/* 加入・ローン入・育成昇格は顔写真を登録可能 */}
              {(tfForm.type==="in"||tfForm.type==="loan_in"||tfForm.type==="youth") && (
                <div style={{display:"flex",justifyContent:"center",marginBottom:12}}>
                  <label style={{cursor:"pointer",position:"relative",display:"block"}}>
                    <input type="file" accept="image/*" style={{display:"none"}}
                      onChange={e=>{handleTfPhoto(e.target.files?.[0]); e.target.value="";}} />
                    {tfForm.photo ? (
                      <img src={tfForm.photo} alt="顔写真" style={{width:72,height:72,borderRadius:"50%",objectFit:"cover",border:"3px solid #C8F135",display:"block"}} />
                    ) : (
                      <div style={{width:72,height:72,borderRadius:"50%",background:"#173A20",border:"2px dashed #5A7C60",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
                        <span style={{fontSize:20}}>📷</span>
                        <span style={{fontSize:8,color:"#88B088"}}>顔写真</span>
                      </div>
                    )}
                    {tfForm.photo && (
                      <div style={{position:"absolute",bottom:0,right:0,background:"#C8F135",borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,border:"2px solid #1E3A28"}}>✏️</div>
                    )}
                  </label>
                </div>
              )}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                <div><Label>日付</Label><input type="date" value={tfForm.date} onChange={e=>setTfForm(f=>({...f,date:e.target.value}))} /></div>
                <div><Label>移籍タイプ</Label>
                  <select value={tfForm.type} onChange={e=>setTfForm(f=>({...f,type:e.target.value}))}>
                    <option value="in">加入</option><option value="out">放出</option>
                    <option value="loan_in">ローン（入）</option><option value="loan_out">ローン（出）</option>
                    <option value="youth">育成チーム昇格</option>
                    <option value="loan_back">ローンバック（復帰）</option>
                  </select>
                </div>
              </div>
              <div style={{marginBottom:8}}><Label>選手名</Label>
                {(tfForm.type==="out"||tfForm.type==="loan_out") && allPlayerNames.length>0 ? (
                  <select value={tfForm.playerName} onChange={e=>{
                    const n = e.target.value;
                    const rp = roster.find(p=>p.name===n);
                    setTfForm(f=>({...f, playerName:n, position: rp ? posNorm(rp.position) : f.position}));
                  }}>
                    <option value="">選手を選択</option>
                    {allPlayerNames.map(n=><option key={n} value={n}>{n}</option>)}
                  </select>
                ) : tfForm.type==="loan_back" ? (
                  loanedOutPlayers.length>0 ? (
                    <select value={tfForm.playerName} onChange={e=>{
                      const n = e.target.value;
                      const rp = roster.find(p=>p.name===n);
                      setTfForm(f=>({...f, playerName:n, position: rp ? posNorm(rp.position) : f.position}));
                    }}>
                      <option value="">ローン中の選手を選択</option>
                      {loanedOutPlayers.map(n=><option key={n} value={n}>{n}</option>)}
                    </select>
                  ) : (
                    <div style={{fontSize:12,color:"#88B088",background:"#173A20",border:"1px solid #3A6248",borderRadius:8,padding:"10px 12px"}}>
                      現在ローン中の選手がいません（先に「ローン（出）」を記録してください）
                    </div>
                  )
                ) : (
                  <input type="text" placeholder="例: 三笘薫" value={tfForm.playerName} onChange={e=>setTfForm(f=>({...f,playerName:e.target.value}))} />
                )}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                <div><Label>ポジション</Label>
                  <select value={tfForm.position} onChange={e=>setTfForm(f=>({...f,position:e.target.value}))}>
                    {ALL_POSITIONS.map(p=><option key={p} value={p}>{p}</option>)}
                  </select>
                </div>
                <div><Label>移籍金（任意）</Label><input type="text" placeholder={(tfForm.type==="youth"||tfForm.type==="loan_back")?"−（通常なし）":"例: €25M"} value={tfForm.fee} onChange={e=>setTfForm(f=>({...f,fee:e.target.value}))} disabled={tfForm.type==="youth"||tfForm.type==="loan_back"} style={(tfForm.type==="youth"||tfForm.type==="loan_back")?{opacity:.4}:{}} /></div>
              </div>
              {tfForm.type !== "youth" ? (
                <div style={{marginBottom:8}}><Label>{tfForm.type==="loan_back"?"復帰元クラブ（ローン先）":tfForm.type==="in"||tfForm.type==="loan_in"?"前所属クラブ":"移籍先クラブ"}</Label>
                  <input type="text" placeholder="例: ブライトン" value={tfForm.fromTo} onChange={e=>setTfForm(f=>({...f,fromTo:e.target.value}))} />
                </div>
              ) : (
                <div style={{marginBottom:8}}><Label>出身（任意）</Label>
                  <input type="text" placeholder="例: U-18、ユースアカデミー" value={tfForm.fromTo} onChange={e=>setTfForm(f=>({...f,fromTo:e.target.value}))} />
                </div>
              )}
              {(tfForm.type==="in"||tfForm.type==="loan_in"||tfForm.type==="youth"||tfForm.type==="loan_back") && (
                <div style={{marginBottom:8}}><Label>生年月日</Label>
                  <input type="date" value={tfForm.birthdate} onChange={e=>setTfForm(f=>({...f,birthdate:e.target.value}))} />
                </div>
              )}
              {(tfForm.type==="in"||tfForm.type==="loan_in"||tfForm.type==="youth"||tfForm.type==="loan_back") && (
                <div style={{marginBottom:8}}><Label>国籍</Label>
                  <select value={tfForm.country} onChange={e=>setTfForm(f=>({...f,country:e.target.value}))}>
                    {COUNTRIES.map(c=><option key={c.code||"none"} value={c.code}>{c.flag} {c.name}</option>)}
                  </select>
                </div>
              )}
              {(tfForm.type==="in"||tfForm.type==="loan_in"||tfForm.type==="youth"||tfForm.type==="loan_back") && (
                <div style={{marginBottom:8}}><Label>育成（ユース出身）</Label>
                  <div style={{display:"flex",gap:6}}>
                    {[[false,"いいえ"],[true,"🎓 ユース出身"]].map(([v,l])=>{
                      const active = (tfForm.type==="youth") ? v===true : tfForm.youth===v;
                      return (
                        <button key={String(v)} onClick={()=>setTfForm(f=>({...f,youth:v}))} disabled={tfForm.type==="youth"&&v===false} style={{flex:1,background:active?(v?"#3A2C58":"#2C5838"):"#1E3A28",color:active?(v?"#C9B6FF":"#C8F135"):"#88B088",border:"1px solid",borderColor:active?(v?"#6A4AAA":"#3C6440"):"#2C5838",borderRadius:8,padding:"8px 4px",fontSize:12,fontWeight:700,opacity:(tfForm.type==="youth"&&v===false)?.4:1}}>
                          {l}
                        </button>
                      );
                    })}
                  </div>
                  {tfForm.type==="youth" && <div style={{fontSize:9,color:"#88B088",marginTop:4}}>育成昇格は自動的にユース出身になります。</div>}
                </div>
              )}
              <div style={{marginBottom:12}}><Label>メモ（任意）</Label><textarea placeholder="メモ..." value={tfForm.note} onChange={e=>setTfForm(f=>({...f,note:e.target.value}))} style={{resize:"vertical",minHeight:44}} /></div>
              <button onClick={handleTransferSubmit} disabled={!tfForm.playerName} style={{width:"100%",background:"#C8F135",color:"#16301C",border:"none",borderRadius:9,padding:10,fontWeight:800,fontSize:13,opacity:tfForm.playerName?.8:.3}}>
                {editTransferId?"更新する":"移籍を記録してロースターに反映"}
              </button>
            </div>
          )}

          {/* transfer list */}
          <div style={{marginTop:12}}>
            {sortedTransfers.length===0
              ? <div style={{textAlign:"center",padding:"40px 0",color:"#5C8C66",fontSize:13}}>移籍情報がありません</div>
              : sortedTransfers.map(tf=>{
                const tc=TRANSFER_COLOR[tf.type]||"#aaa";
                return (
                  <div key={tf.id} style={{background:"#193A20",border:"1px solid #274A30",borderLeft:`3px solid ${tc}`,borderRadius:11,padding:"11px 13px",marginBottom:7}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:34,height:34,borderRadius:7,background:`${tc}22`,border:`1px solid ${tc}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:tc,flexShrink:0}}>
                        {TRANSFER_TYPES[tf.type]}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:14,fontWeight:700,color:"#F2FFF2",marginBottom:2}}>
                          {tf.playerName}
                          <span style={{fontSize:9,fontWeight:700,color:tc,background:`${tc}18`,borderRadius:4,padding:"2px 5px",marginLeft:6}}>{tf.position}</span>
                        </div>
                        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",fontSize:10,color:"#88B088"}}>
                          <span>{tf.date}</span>
                          <span style={{fontSize:9,background:"#184A26",color:"#88BE88",padding:"1px 5px",borderRadius:4,border:"1px solid #2C5A30"}}>{seasonOf(tf.date)}</span>
                          {tf.fromTo&&<span style={{color:"#A6C8A6"}}>{tf.type==="out"||tf.type==="loan_out"?"→":"←"} {tf.fromTo}</span>}
                          {tf.type==="youth"&&!tf.fromTo&&<span style={{color:"#A78BFA"}}>🎓 育成チームから昇格</span>}
                          {tf.fee&&<span style={{color:"#FFB830"}}>{parseFee(tf.fee)?formatFee(parseFee(tf.fee)):tf.fee}</span>}
                        </div>
                        {tf.note&&<div style={{fontSize:10,color:"#88B088",marginTop:3}}>📝 {tf.note}</div>}
                      </div>
                      <div style={{display:"flex",gap:4,flexShrink:0}}>
                        <button onClick={()=>startEditTransfer(tf)} style={{background:"transparent",border:"1px solid #3A6248",color:"#A6C8A6",borderRadius:6,padding:"4px 7px",fontSize:10}}>✏️</button>
                        <button onClick={()=>deleteTransfer(tf.id)} style={{background:"transparent",border:"none",color:"#5A7C60",fontSize:14,padding:"3px 4px"}}>✕</button>
                      </div>
                    </div>
                  </div>
                );
              })
            }
          </div>

          {/* 移籍収支 */}
          <div style={{background:"linear-gradient(135deg,#1E3A28,#0E1A10)",border:"1px solid #2C5838",borderRadius:11,padding:"12px 14px",marginTop:12}}>
            <SecTitle color="#FFB830">€ 移籍収支{transferSeason==="all"?"（通算）":`（${transferSeason}）`}</SecTitle>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:(transferSeason==="all"&&feeBalance.bySeason.length>1)?10:0}}>
              <div style={{background:"#16301C",borderRadius:8,padding:"9px 8px",textAlign:"center"}}>
                <div style={{fontSize:9,color:"#88B088",marginBottom:3}}>支出</div>
                <div style={{fontSize:14,fontWeight:900,color:"#FF5C5C"}}>{formatFee(feeBalance.total.spent)}</div>
              </div>
              <div style={{background:"#16301C",borderRadius:8,padding:"9px 8px",textAlign:"center"}}>
                <div style={{fontSize:9,color:"#88B088",marginBottom:3}}>収入</div>
                <div style={{fontSize:14,fontWeight:900,color:"#C8F135"}}>{formatFee(feeBalance.total.earned)}</div>
              </div>
              <div style={{background:"#16301C",borderRadius:8,padding:"9px 8px",textAlign:"center",border:`1px solid ${feeBalance.total.net>=0?"#3C6440":"#502A2A"}`}}>
                <div style={{fontSize:9,color:"#88B088",marginBottom:3}}>収支</div>
                <div style={{fontSize:14,fontWeight:900,color:feeBalance.total.net>=0?"#C8F135":"#FF5C5C"}}>
                  {feeBalance.total.net>0?"+":""}{formatFee(feeBalance.total.net)}
                </div>
              </div>
            </div>
            {/* シーズン別収支 */}
            {transferSeason==="all" && feeBalance.bySeason.length > 1 && (<>
              <div style={{display:"flex",fontSize:9,color:"#88B088",paddingBottom:4,borderBottom:"1px solid #274A30",marginBottom:4}}>
                <span style={{flex:1.2}}>シーズン</span>
                <span style={{flex:1,textAlign:"right"}}>支出</span>
                <span style={{flex:1,textAlign:"right"}}>収入</span>
                <span style={{flex:1,textAlign:"right"}}>収支</span>
              </div>
              {feeBalance.bySeason.map(fb=>(
                <div key={fb.season} style={{display:"flex",fontSize:11,padding:"5px 0",borderBottom:"1px solid #1E3A28",alignItems:"center"}}>
                  <span style={{flex:1.2,fontWeight:700,color:"#C8F135"}}>{fb.season}</span>
                  <span style={{flex:1,textAlign:"right",color:"#FF8080"}}>{fb.spent?formatFee(fb.spent):"−"}</span>
                  <span style={{flex:1,textAlign:"right",color:"#A0D880"}}>{fb.earned?formatFee(fb.earned):"−"}</span>
                  <span style={{flex:1,textAlign:"right",fontWeight:800,color:fb.net>=0?"#C8F135":"#FF5C5C"}}>{fb.net>0?"+":""}{formatFee(fb.net)}</span>
                </div>
              ))}
            </>)}
            <div style={{fontSize:9,color:"#5A7C60",marginTop:7}}>※「€25M」「25M」「500K」のような表記の移籍金を自動計算します（M=百万, K=千）。育成昇格は対象外です。</div>
          </div>

          {/* summary */}
          <div style={{background:"#173A20",border:"1px solid #2C5838",borderRadius:11,padding:"12px 14px",marginTop:12}}>
            <SecTitle>移籍サマリー{transferSeason!=="all"&&`（${transferSeason}）`}</SecTitle>
            <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:6}}>
              {[["in","加入"],["out","放出"],["loan_in","ローン入"],["loan_out","ローン出"],["youth","育成昇格"],["loan_back","ローン復帰"]].map(([type,label])=>{
                const count=scopedTransfers.filter(t=>t.type===type).length;
                const c=TRANSFER_COLOR[type];
                return (
                  <div key={type} style={{background:"#16301C",borderRadius:8,padding:"9px 11px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:11,color:"#88B088"}}>{label}</span>
                    <span style={{fontSize:18,fontWeight:900,color:c}}>{count}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </>)}

      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<SoccerTracker />);
</script>
</body>
</html>
